*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:100%;overflow:hidden;
}
body{
  background:linear-gradient(160deg,#ffe0f0 0%,#f0d0ff 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:'Press Start 2P',monospace;
  user-select:none;
  touch-action:none;
  overflow:hidden;
}
/* 手機自動縮放：讓 shell 填滿螢幕寬度 */
@media (max-width: 400px) {
  #shell{
    transform-origin: top center;
    transform: scale(var(--shell-scale, 1));
    margin-top: calc(var(--shell-top-margin, 28px));
  }
}

/* 憭挺嚗??剝? */
#shell{
  position:relative;
  width:240px;
  height:auto;
  background:radial-gradient(ellipse at 38% 32%, #ffe8f4 0%, #ffb6d9 50%, #f07ab0 100%);
  border-radius: 46% 46% 44% 44%;
  box-shadow:
    inset -6px -8px 16px rgba(200,60,120,0.18),
    inset 4px 4px 12px rgba(255,255,255,0.55),
    0 0 0 4px #e8709a,
    0 8px 0 3px #c04878,
    0 10px 30px rgba(180,60,120,0.35);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:28px;
  padding-bottom:20px;
  gap:8px;
  margin-top:28px;
}
/* ?單 */
#shell::before,
#shell::after{
  content:'';
  position:absolute;
  top:-26px;
  width:54px;height:54px;
  background:radial-gradient(ellipse at 40% 35%, #ffcce8 0%, #f07ab0 60%, #c04878 100%);
  border-radius:50%;
  box-shadow:0 0 0 4px #e8709a;
  z-index:-1;
}
#shell::before{ left:14px; }
#shell::after{  right:14px; }

/* ?嚙?嚙?霅衣內???嚙?嚙?*/
#alert-row{
  display:flex;
  width:200px;
  justify-content:flex-end;
  align-items:center;
}
#alert-light{
  width:12px;height:12px;
  border-radius:50%;
  background:transparent;
  box-shadow:none;
  transition:background 0.15s, box-shadow 0.15s;
}
#alert-light.on{
  background:#ff6eb4;
  box-shadow:0 0 10px #ff6eb4, 0 0 20px #ff69b455;
}

/* ?嚙?嚙??嚙踝蕭?憭蕭? ?嚙?嚙?*/
#screen-frame{
  width:196px;height:176px;
  background:#2a1a2e;
  border-radius:14px;
  border:5px solid #d070a0;
  box-shadow:
    inset 0 3px 10px rgba(0,0,0,0.6),
    0 2px 8px rgba(255,150,200,0.3);
  display:flex;
  align-items:center;
  justify-content:center;
}
#screen{
  width:168px;height:152px;
  background:#fde8f0;
  image-rendering:pixelated;
  display:block;
  border-radius:6px;
}

/* ?嚙?嚙??嚙?嚙踝蕭? ?嚙?嚙?*/
#status-bar{
  display:flex;
  width:200px;
  justify-content:space-around;
  align-items:center;
}
.stat-group{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
}
.stat-label{
  font-size:5px;
  color:#b04070;
  letter-spacing:1px;
}
.hearts{display:flex;gap:2px;}
.heart{
  width:9px;height:9px;
  background:#ff6eb4;
  clip-path:polygon(50% 90%,0% 35%,15% 0%,50% 20%,85% 0%,100% 35%);
}
.heart.empty{background:#f0c0d8;opacity:0.6;}
.heart.energy{background:#60c8ff;}
.heart.energy.empty{background:#c0e8ff;opacity:0.5;}

/* ?嚙?嚙??嚙賢 icon ???嚙?嚙?*/
#menu-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:4px;
  width:200px;
}
.menu-icon{
  width:23px;height:23px;
  border-radius:8px;
  background:#ffcce8;
  border:2px solid #e890c0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;
  cursor:pointer;
  position:relative;
  transition:transform 0.08s;
  box-shadow:0 2px 0 #c060a0;
}
.menu-icon:active{transform:translateY(2px);box-shadow:none;}
.menu-icon.selected{
  background:#fff0f8;
  border-color:#ff6eb4;
  box-shadow:0 0 0 1px #ff6eb4, 0 2px 0 #c060a0;
}
.menu-icon.selected::after{
  content:'';
  position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
  border:4px solid transparent;border-top-color:#ff6eb4;
}

/* ?嚙?嚙?銝蕭??嚙踝蕭? ?嚙?嚙?*/
#btn-row{
  display:flex;
  gap:16px;
  align-items:center;
  margin-top:2px;
}
.btn{
  border:none;cursor:pointer;
  font-family:'Press Start 2P',monospace;
  color:#fff;
  border-radius:50%;

}
.btn:active{transform:translateY(3px);}
#btn-a{width:34px;height:34px;background:#ff8ec8;box-shadow:0 5px 0 #c0508a;}
#btn-a:active{box-shadow:0 2px 0 #c0508a;}
#btn-b{width:42px;height:42px;background:#c878e8;font-size:8px;box-shadow:0 5px 0 #8840b0;}

#btn-c{width:34px;height:34px;background:#80d8f0;box-shadow:0 5px 0 #3898b8;}
#btn-c:active{box-shadow:0 2px 0 #3898b8;}

/* ?嚙?嚙?摨蕭? ?嚙?嚙?*/
#bottom-row{

}
.small-btn{
  font-size:5px;padding:3px 5px;

.small-btn:active{transform:translateY(2px);box-shadow:none;}

/* ?嚙?嚙??嚙賜 hint ?嚙?嚙?*/

const S = 10; // 瘥蕭?蝝憭批嚙?4*10=140px嚙?

function activePAL(){
  if(pet&&pet.eggType!=null&&!pet.dead&&pet.stage!=='egg')return PET_PAL[pet.eggType]||PAL;
  return PAL;
}
function drawSprite(key, dx, dy, scale){
  scale = scale||S;
  const rows=SP[key];
  if(!rows)return;
  const pal=activePAL();
  for(let r=0;r<rows.length;r++){
    const row=rows[r];
    for(let c=0;c<row.length;c++){
      const v=parseInt(row[c]);
      if(!v||!pal[v])continue;
      ctx.fillStyle=pal[v];
      ctx.fillRect(dx+c*scale,dy+r*scale,scale,scale);
    }
  }
}

const SC_PX=[0,7,10,14,18];
function drawText(str,px,py,sc,col){
  sc=sc||1;col=col||'#6b1a40';
  const sz=SC_PX[sc]||sc*6;
  ctx.save();
  ctx.font=sz+'px "Press Start 2P",monospace';
  ctx.fillStyle=col;
  ctx.textBaseline='top';
  ctx.fillText(str,px,py);
  ctx.restore();
}
function textW(str,sc){
  sc=sc||1;
  const sz=SC_PX[sc]||sc*6;
  ctx.save();
  ctx.font=sz+'px "Press Start 2P",monospace';
  const w=ctx.measureText(str).width;
  ctx.restore();
  return w;
}

function drawTextC(str,cy,sc,col){
  const w=textW(str,sc);
  drawText(str,Math.floor((W-w)/2),cy,sc,col);
}

const isSleepTime=()=>{const h=new Date().getHours();return h>=SLEEP_START||h<SLEEP_END;};

// ?嚙?嚙??嚙踝蕭?鋆蕭? ?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?
function applyOffline(){
  if(!pet||pet.dead||pet.stage==='egg')return;
  const now=Date.now();
  const raw=now-(pet.lastTs||now);
  if(raw<=0){pet.lastTs=now;return;}
  // 頞蕭? grace ?嚙踝蕭?嚙?
  const eff=Math.max(0,raw-OFFLINE_GRACE);
  if(eff<=0){pet.lastTs=now;return;}
  const gm=(eff/1000/60)*0.6;
  pet.ageMin+=gm;
  pet.hungerAcc+=gm;
  const hT=Math.floor(pet.hungerAcc/HUNGER_DECAY);
  pet.hungerAcc%=HUNGER_DECAY;
  pet.hunger=Math.min(4,pet.hunger+hT);
  pet.happyAcc+=gm;
  const aT=Math.floor(pet.happyAcc/HAPPY_DECAY);
  pet.happyAcc%=HAPPY_DECAY;
  pet.happy=Math.max(0,pet.happy-aT);
  recalcAttn();
  pet.lastTs=now;
}

// ?嚙?嚙?嚙?Tick ?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?嚙?
function tick(){
  animF++;
  blinkT++;
  if(blinkT>=14){blinkOn=!blinkOn;blinkT=0;}

  if(!pet){render();return;}
  if(pet.dead){animF%2===0&&save();render();return;}

  // ??摮拙?
  if(pet.stage==='egg'){
    pet.ageMin+=mpt();
    if(pet.ageMin>=3){
      // 蝣箔? progress bar ? 100%嚗?摮萄?
      pet.ageMin=3;
      if(eggRafId){cancelAnimationFrame(eggRafId);eggRafId=null;}
      render(); // ?餅??急遛餈?
      sfx('hatch');
      setTimeout(()=>{
        hatch();
        render();renderHUD();
      },600);
    } else { startEggRaf(); save(); }
    return;
  }

  if(pet.stage!=='baby'){
    if(isSleepTime()) { if(!pet.sleeping){ pet.sleeping=true; startSleepRaf(); } }  // ?芸??亦
    else if(pet.sleeping&&!pet.manualSleep){ pet.sleeping=false; stopSleepRaf(); startIdleRaf(); } // ?拐??芸???
  }
  // ??撠嚗???閮?????擃??遛 ??韏瑕?嚗???畾萇??拍嚗?
  if(pet.manualSleep&&pet.sleeping){
    const elapsed=pet.sleepStartMs?Date.now()-pet.sleepStartMs:0;
    const timerDone = elapsed>=180000;
    // 擃?皛輯絲摨??喳?閬30蝘?蝞憌踝??踹??犖銝停頝唾絲靘?
    const staminaFull = pet.stamina>=4 && elapsed>=30000;
    if(timerDone||staminaFull){
      // 手動睡覺結束，補滿3格體力
      if(timerDone) pet.stamina=Math.min(4,pet.stamina+3);
      pet.sleeping=false;pet.manualSleep=false;pet.sleepStartMs=0;stopSleepRaf();sfx('yawn');
      render();renderHUD();startIdleRaf();
    }
  }

  const sleeping=pet.sleeping;
  if(!sleeping){
    const m=mpt();
    pet.ageMin+=m;
    // 擃?銵唳?
    pet.staminaAcc+=m;
    if(pet.staminaAcc>=STAMINA_DECAY){
      pet.staminaAcc-=STAMINA_DECAY;
      if(pet.stamina>0) pet.stamina--;
    }
    // 擃?=0 蝬脫?∴?蝝舐??脣?閮?
    if(pet.stamina<=0){
      // 體力歸零 → 強制入睡（自動睡覺補體力）
      if(!pet.sleeping){
        pet.sleeping=true;
        pet.manualSleep=false;
        pet.sleepStartMs=0;
        startSleepRaf();
        sfx('yawn');
        render();renderHUD();
      }
      pet.tiredAcc+=m;
      if(!pet.sick&&pet.tiredAcc>=TIRED_SICK_TTL){
        pet.tiredAcc=0;
        pet.sick=true;
        pet.sickPresses=1+Math.floor(Math.random()*2);
        recalcAttn();
      }
    } else {
      pet.tiredAcc=0;
    }

    // 摮斤銵唳?
    pet.lonelyAcc+=m;
    if(pet.lonelyAcc>=LONELY_DECAY){
      pet.lonelyAcc-=LONELY_DECAY;
      if(pet.lonely>0) pet.lonely--;
      if(pet.lonely<=0){ pet.callAttn=true; pet.careMiss++; }
    }
    if(pet.lonely<=0){
      pet.lonelySickAcc+=m;
      if(!pet.sick&&pet.lonelySickAcc>=LONELY_SICK_TTL){
        pet.lonelySickAcc=0;
        pet.sick=true; pet.sickPresses=1+Math.floor(Math.random()*2);
        recalcAttn();
      }
    } else { pet.lonelySickAcc=0; }

    // 擃情蝝舐?
    pet.dirtyAcc+=m;
    if(pet.dirtyAcc>=DIRTY_ACCUM){
      pet.dirtyAcc-=DIRTY_ACCUM;
      if(pet.dirty<4) pet.dirty++;
      if(pet.dirty>=3){ pet.callAttn=true; }
    }
    if(pet.dirty>=4){
      pet.dirtySickAcc+=m;
      if(!pet.sick&&pet.dirtySickAcc>=DIRTY_SICK_TTL){
        pet.dirtySickAcc=0;
        pet.sick=true; pet.sickPresses=1+Math.floor(Math.random()*2);
        recalcAttn();
      }
    } else { pet.dirtySickAcc=0; }

    // 憌ａ?
    pet.hungerAcc+=m;
    if(pet.hungerAcc>=HUNGER_DECAY){
      pet.hungerAcc-=HUNGER_DECAY;
      if(pet.hunger<4){pet.hunger++;}
      if(pet.hunger>=4){pet.callAttn=true;pet.careMiss++;}
    }
    // 擗香閮?嚗unger=4 蝝舐?頞? STARVE_TTL ???撠梢?甇?
    if(pet.hunger>=4){
      pet.starveAcc+=m;
      if(pet.starveAcc>=STARVE_TTL){die(false);return;}
    } else {
      pet.starveAcc=0;
    }

    // 敹恬蕭?
    pet.happyAcc+=m;
    if(pet.happyAcc>=HAPPY_DECAY){
      pet.happyAcc-=HAPPY_DECAY;
      if(pet.happy>0){pet.happy--;}
      if(pet.happy<=0){pet.callAttn=true;pet.careMiss++;}
    }

    // 靘蹂噶瘚蕭?
    pet.poopAcc+=m;
    if(!pet.poopWarn&&pet.poopAcc>=POOP_INTERVAL&&pet.poop<3){
      pet.poopAcc=0;
      pet.poopWarn=true;
      pet.poopWarnAge=0;
      pet.callAttn=true;
      sfx('alert');
    }
    if(pet.poopWarn){
      pet.poopWarnAge+=m;
      if(pet.poopWarnAge>=POOP_WARN_TTL){
        // ?嚙踝蕭??嚙踝蕭?
        pet.poopWarn=false;
        pet.poopWarnAge=0;
        pet.poop=Math.min(pet.poop+1,3);
        // ?嚙賭噶靘踹停?嚙踝蕭??嚙踝蕭???
        if(pet.poop>=2&&!pet.sick){
          pet.sick=true;
          pet.sickPresses=1+Math.floor(Math.random()*2);
        }
        recalcAttn();
      }
    }

    // ?嚙踝蕭?閮蕭?
    if(pet.sick){
      pet.sickAcc+=m;
      if(pet.sickAcc>=240){die(false);return;}
    }else{
      pet.sickAcc=0;
    }

    // 擃蕭??嚙踝蕭??嚙踝蕭?
    if(pet.weight>WEIGHT_CFG[pet.eggType||0].obese&&!pet.sick&&Math.random()<0.003){
      pet.sick=true;
      pet.sickPresses=1+Math.floor(Math.random()*2);
      recalcAttn();
    }

    // ?嚙賢?嚙踝蕭?蝝敺蕭??嚙踝蕭?
    pet.fakeAcc+=m;
    if(!pet.fakeAttn&&!pet.callAttn&&pet.fakeAcc>180+Math.random()*120){
      pet.fakeAcc=0;
      pet.fakeAttn=true;
      pet.callAttn=true;
      sfx('alert');
    }

    // ?嚙賡
    // 心情需求佇列系統
    // 非法值防護（舊存檔或bug）
    if(pet.need&&!NEED_POOL.includes(pet.need))pet.need=null;
    // needAcc 無論有無需求都在計時
    pet.needAcc+=m;
    if(pet.need){
      // 需求超時 → 過期，清空等待下輪
      if(pet.needAcc>=NEED_INTERVAL){
        pet.needAcc=0;
        pet.need=null;
        pet.needQueue=[];
      }
    } else {
      // 冷卻期滿 → 從佇列取出（或先生成）
      if(pet.needAcc>=NEED_INTERVAL){
        pet.needAcc=0;
        if(pet.needQueue.length===0){
          const pool=NEED_POOL.filter(n=>!(n==='snack'&&pet.hunger>=3)&&!(n==='feed'&&pet.hunger===0));
          pet.needQueue.push(pool[Math.floor(Math.random()*pool.length)]||'hug');
        }
        pet.need=pet.needQueue.shift();
      }
    }
    checkGrowth();
  } else {
    // ?∟死銝剜敺拚???
    const m=mpt();
    pet.staminaRestAcc+=m;
    if(pet.staminaRestAcc>=STAMINA_RESTORE){
      pet.staminaRestAcc-=STAMINA_RESTORE;
      if(pet.stamina<4){ pet.stamina++; renderHUD(); }
    }
  }

  save();
  render();
  renderHUD();
}

function hatch(){
  pet.stage='baby';
  pet.ageMin=0;
  pet.hunger=2;pet.happy=2;pet.stamina=3;
  pet.weight=WEIGHT_CFG[pet.eggType||0].initial;
  pet.lonely=4;pet.lonelyAcc=0;pet.lonelySickAcc=0;
  pet.dirty=0;pet.dirtyAcc=0;pet.dirtySickAcc=0;
  pet.staminaAcc=0;pet.staminaRestAcc=0;pet.tiredAcc=0;
  sfx('hatch');save();
  renderHUD();
  startIdleRaf();
}

function checkGrowth(){
  const ageDays=pet.ageMin/(60*8 );
  const next=NEXT_STAGE[pet.stage];
  if(!next)return;
  const need=STAGE_DAYS[next];
  if(need===undefined)return;
  if(ageDays>=need){
    // Senior 憯賢嚗憿批末 ??+8?憭抬??折“撌???+3?憭?
    if(pet.stage==='senior'){
      const bonusDays = pet.variant==='good' ? 8 : 3;
      if(ageDays>=STAGE_DAYS.senior+bonusDays){ die(true); return; }
    }
    if(pet.stage!=='senior'){
      const good=pet.careMiss<=CARE_MISS_MAX;
      pet.variant=good?'good':'bad';
      pet.stage=next;
      pet.careMiss=0;
      sfx('evolve');
    }
  }
}

function die(natural){
  pet.dead=true;
  pet.angel=natural;
  sfx('dead');
  save();
  render();
}

function recalcAttn(){
  pet.callAttn=(pet.hunger>=4||pet.happy<=0||pet.sick||pet.poop>0||pet.poopWarn||pet.fakeAttn||pet.lonely<=0||pet.dirty>=3);
}

function actFeed(snack){
  if(!pet||pet.dead||pet.sleeping||pet.sick)return;
  const wcfg=WEIGHT_CFG[pet.eggType||0];
  if(snack){
    if(pet.need==='snack'){pet.need=null;pet.needAcc=0;pet.needQueue=[];if(pet.happy<4)pet.happy++;} // 滿足零食需求
    if(pet.hunger>0) pet.hunger--; // 點心降1格飢餓（但加體重懲罰）
    pet.weight+=wcfg.snack;
    // 擗???敹??亙熒銝末嚗?????憒?敺?嚗unger>=3嚗???憭抒?????
    if(pet.hunger>=2){
      pet.weight+=wcfg.snack;
      if(pet.hunger>=3&&!pet.sick&&Math.random()<0.35){
        pet.sick=true;
        pet.sickPresses=1+Math.floor(Math.random()*2);
        recalcAttn();
      }
    }
  } else {
    if(pet.need==='feed'){pet.need=null;pet.needAcc=0;pet.needQueue=[];if(pet.happy<4)pet.happy++;} // 滿足白飯需求
    if(pet.hunger>0){pet.hunger--;pet.weight+=wcfg.meal;}
    // 吃正餐加速排便時鐘
    pet.poopAcc+=POOP_INTERVAL*0.25;
  }
  // 吃零食也稍微加速
  if(snack) pet.poopAcc+=POOP_INTERVAL*0.15;
  sfx('eat');
  recalcAttn();save();
  feedAnim={snack:snack,startMs:performance.now(),durationMs:5000,frame:0};
  menuOpen=false;
  render();renderHUD();
  // ??RAF 頝??怎?啁???
  function rafFeed(now){
    if(!feedAnim)return;
    feedAnim.frame++;
    const elapsed=now-feedAnim.startMs;
    if(elapsed>=feedAnim.durationMs){ feedAnim=null; render(); startIdleRaf(); return; }
    render();
    requestAnimationFrame(rafFeed);
  }
  requestAnimationFrame(rafFeed);
}

function startPlay(){
  if(!pet||pet.dead||pet.sleeping||pet.sick)return;
  playState={phase:'choose',pChoice:0,cChoice:0,result:null};
  subIdx=0;menuOpen=false;
  render();
}
function resolvePlay(){
  const p=playState.pChoice;
  const c=Math.floor(Math.random()*3);
  playState.cChoice=c;
  // 0=Paper 1=Rock 2=Scissors嚗aper>Rock, Rock>Scissors, Scissors>Paper
  let res='draw';
  if((p===0&&c===1)||(p===1&&c===2)||(p===2&&c===0))res='win';
  else if(p!==c)res='lose';
  playState.result=res;
  playState.phase='result';
  if(res==='win'){
    if(pet.need==='play'){pet.need=null;pet.needAcc=0;pet.needQueue=[];} // 滿足玩耍需求
    if(pet.happy<4)pet.happy++; // 贏了一定加快樂，不管有無 play need
    sfx('win');
  }
  else sfx(res==='lose'?'lose':'click');
  pet.dirtyAcc+=DIRTY_ACCUM*0.2; // play adds some dirt
  pet.dirtyAcc+=DIRTY_ACCUM*0.2; // 玩耍後稍微變髒
  recalcAttn();save();renderHUD();
}

function sprKey(){
  if(!pet)return'egg';
  if(pet.dead)return pet.angel?'angel':'skull';
  if(pet.stage==='egg')return'egg';
  const tp=pet.eggType||0;
  const fam=['chick','cat','bear'][tp];
  if(pet.stage==='baby')return fam+'_baby';
  return fam+'_'+(pet.variant||'good');
}

function bg(dark){
  ctx.fillStyle=dark?LCD_DARK:LCD_LIGHT;
  ctx.fillRect(0,0,W,H);
}

function drawLCDGrid(){
  const CELL=4; // 瘥 4px
  ctx.save();
  ctx.strokeStyle='rgba(180,80,130,0.09)';
  ctx.lineWidth=0.5;
  for(let x=0;x<=W;x+=CELL){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  for(let y=0;y<=H;y+=CELL){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
  ctx.restore();
}

function drawCleanAnim(){
  bg();

  const elapsed=performance.now()-cleanAnim.startMs;

      ctx.beginPath();ctx.ellipse(bx,by,10,7,0,0,Math.PI*2);ctx.fill();

      ctx.fillStyle='#c09060';
      ctx.beginPath();ctx.ellipse(bx,by-13,4,3,0,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    // ???桀?
    const bAngle=Math.sin(f*0.4)*0.5;
    ctx.save();
    ctx.translate(cx+30, cy+20);
    ctx.rotate(bAngle);
    // ????
    ctx.fillStyle='#a06028';
    ctx.fillRect(-2,-40,4,45);
    // ?琿
    ctx.fillStyle='#e8c060';
    for(let i=-3;i<=3;i++){
      ctx.fillRect(i*4-2,4,3,12);
    }
    ctx.restore();
    // 憌蕩撠?摮?
    ctx.fillStyle='#c0c0a0';
    for(let i=0;i<5;i++){
      const px2=cx+20+Math.sin(f*0.3+i*1.3)*18;

      ctx.beginPath();ctx.arc(px2,py2,2,0,Math.PI*2);ctx.fill();

    drawTextC('CLEANING!',H-22,1,'#a06030');
  } else {
    // --- phase 2: 撖萇?? ---
    const sk=sprKey();
    // ??頝唾絲
    const bounce=Math.abs(Math.sin((pct-0.5)*Math.PI*4))*14;
    const ex=Math.floor((W-14*8)/2);
    drawSprite(sk, ex, Math.floor(cy-50-bounce), 8);
    // 瘜⊥部/?????
    const sparkCount=8;
    for(let i=0;i<sparkCount;i++){
      const angle=(i/sparkCount)*Math.PI*2;
      const dist=30+((pct-0.5)*120);
      const sx2=cx+Math.cos(angle)*dist;
      const sy2=cy+Math.sin(angle)*dist*0.6;
      const a=Math.max(0,1-(pct-0.5)*2);
      ctx.globalAlpha=a;
      ctx.fillStyle=i%2===0?'#ff69b4':'#ffe066';
      // 撠?敶?
      ctx.save();
      ctx.translate(sx2,sy2);
      ctx.beginPath();
      for(let s=0;s<5;s++){
        const sa=s*Math.PI*2/5-Math.PI/2;
        const sa2=sa+Math.PI/5;
        ctx.lineTo(Math.cos(sa)*5,Math.sin(sa)*5);
        ctx.lineTo(Math.cos(sa2)*2,Math.sin(sa2)*2);
      }
      ctx.closePath();ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha=1;
    // 憭扳?敹?
    if(f%20<12){
      ctx.save();
      ctx.fillStyle='#ff3e88';
      ctx.font='bold 20px serif';
      ctx.textBaseline='middle';
      ctx.textAlign='center';
      ctx.fillText('✪',cx,cy-70);
      ctx.restore();
    }
    drawTextC('SQUEAKY CLEAN!',H-22,1,'#e040a0');
  }
}

function render(){
  if(shopPhase){drawShop();drawLCDGrid();return;}
  if(!pet){drawStart();drawLCDGrid();return;}
  if(pet.dead){pet.angel?drawAngel():drawDead();drawLCDGrid();return;}
  if(pet.stage==='egg'){drawEgg();drawLCDGrid();return;}
  if(feedAnim){drawFeedAnim();drawLCDGrid();return;}
  if(refuseAnim){drawRefuse();drawLCDGrid();return;}
  if(hugAnim){drawHugAnim();drawLCDGrid();return;}
  if(bathAnim){drawBathAnim();drawLCDGrid();return;}
  if(exerciseAnim){drawExerciseAnim();drawLCDGrid();return;}
  if(cleanAnim){drawCleanAnim();drawLCDGrid();return;}
  if(lightMenu){drawLightMenu();drawLCDGrid();return;}
  if(pet.sleeping){drawSleep();drawLCDGrid();return;}
  if(playState){drawPlay();drawLCDGrid();return;}
  if(showStat){drawStatus();drawLCDGrid();return;}
  if(menuOpen){drawSubMenu();drawLCDGrid();return;}
  drawMain();drawLCDGrid();
}

function drawEggShape(cx,cy,rw,rh,typeIdx){
  const t=EGG_TYPES[typeIdx||0];
  ctx.save();
  // ?嚙賢蔣
  ctx.beginPath();
  ctx.ellipse(cx,cy+rh+4,rw*0.7,5,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.13)';ctx.fill();
  // ?嚙賢耦 4 畾蛛蕭??嚙踝蕭?銝蕭?瞏扎葉撖研蕭???
  const top=cy-rh, bot=cy+rh;
  ctx.beginPath();
  ctx.moveTo(cx, top);
  // ?嚙踝蕭?嚗蕭?暺蕭??嚙踝蕭??嚙踝蕭??嚙賢暺蕭??嚙踝蕭??嚙賡?嚙踝蕭?
  ctx.bezierCurveTo(cx+rw*0.75, top,         cx+rw,      cy-rh*0.1,   cx+rw,      cy+rh*0.2);
  // ?嚙踝蕭?嚗蕭?撖穿蕭??嚙踝蕭??嚙賣
  ctx.bezierCurveTo(cx+rw,      cy+rh*0.65,  cx+rw*0.55, bot,         cx,         bot);
  // 撌佗蕭?嚗蕭?摨椰??
  ctx.bezierCurveTo(cx-rw*0.55, bot,         cx-rw,      cy+rh*0.65,  cx-rw,      cy+rh*0.2);
  // 撌佗蕭?嚗蝒蕭??嚙踝蕭?嚗?嚙踝蕭?憭霈蕭??嚙踝蕭?嚙?
  ctx.bezierCurveTo(cx-rw,      cy-rh*0.1,   cx-rw*0.75, top,         cx,         top);
  ctx.closePath();
  ctx.fillStyle=t.fill;ctx.fill();
  ctx.strokeStyle=t.stroke;ctx.lineWidth=3;ctx.stroke();
  // 鋆ˇ
  if(t.deco==='spots'){
    ctx.fillStyle=t.stroke;
    [[cx-rw*.25,cy-rh*.1,4],[cx+rw*.2,cy+rh*.15,5],[cx-rw*.05,cy+rh*.35,3]]
      .forEach(([x,y,r])=>{ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();});
  }else if(t.deco==='stars'){
    ctx.fillStyle=t.stroke;
    [[cx+rw*.2,cy-rh*.2],[cx-rw*.25,cy+rh*.1],[cx+rw*.05,cy+rh*.35]]
      .forEach(([x,y])=>{
        ctx.beginPath();
        ctx.moveTo(x,y-5);ctx.lineTo(x+3,y);ctx.lineTo(x,y+5);ctx.lineTo(x-3,y);
        ctx.closePath();ctx.fill();
      });
  }
  // ?嚙賣黎
  ctx.beginPath();
  ctx.ellipse(cx-rw*.22,cy-rh*.3,rw*.15,rh*.11,-0.4,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.fill();
  ctx.restore();
}

function drawExerciseAnim(){
  const elapsed=performance.now()-exerciseAnim.startMs;
  const dur=3000;
  if(elapsed>=dur){exerciseAnim=null;render();return;}
  bg();

  const t=elapsed/1000; // seconds
  const spd=6;          // belt scroll speed (px per frame equiv)

  // ── Treadmill base ──────────────────────────────────────────
  const bx=18, by=88, bw=W-36, bh=18;
  const legH=22;

  // Treadmill legs
  ctx.fillStyle='#604030';
  ctx.fillRect(bx+4,       by+bh, 8, legH);
  ctx.fillRect(bx+bw-12,   by+bh, 8, legH);

  // Belt track (dark base)
  ctx.fillStyle='#333';
  ctx.fillRect(bx, by, bw, bh);

  // Scrolling belt stripes
  ctx.save();
  ctx.beginPath();
  ctx.rect(bx+2, by+2, bw-4, bh-4);
  ctx.clip();
  ctx.fillStyle='#555';
  ctx.fillRect(bx+2, by+2, bw-4, bh-4);
  const stripeW=16, stripeGap=24;
  const offset=(t*spd*40)%(stripeW+stripeGap);
  ctx.fillStyle='#777';
  for(let x=bx-stripeW+offset; x<bx+bw+stripeW; x+=stripeW+stripeGap){
    ctx.beginPath();
    ctx.moveTo(x,        by+2);
    ctx.lineTo(x+stripeW,by+2);
    ctx.lineTo(x+stripeW-4,by+bh-2);
    ctx.lineTo(x-4,      by+bh-2);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  // Belt edge highlight
  ctx.strokeStyle='#888';ctx.lineWidth=1.5;
  ctx.strokeRect(bx,by,bw,bh);

  // Handrail poles
  ctx.strokeStyle='#b06040';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(bx+8,by);ctx.lineTo(bx+8,by-36);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx+bw-8,by);ctx.lineTo(bx+bw-8,by-36);ctx.stroke();
  // Handrail bar
  ctx.strokeStyle='#d08060';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(bx+8,by-36);ctx.lineTo(bx+bw-8,by-36);ctx.stroke();

  // ── Running pet (bobbing on belt) ────────────────────────────
  const frame=Math.floor(t*8)%2; // 0 or 1 at 8fps
  const bobY=frame===0?-1:1;
  const legSwing=frame===0?1:-1;
  const petCX=W/2, petTopY=by-38+bobY;
  const sk=sprKey();
  drawSprite(sk, petCX-10, petTopY);

  // Running legs overlay (simple pixel legs swinging)
  ctx.fillStyle='#c04878';
  // left leg
  ctx.fillRect(petCX-7, petTopY+16, 4, 6+legSwing*3);
  // right leg
  ctx.fillRect(petCX+3,  petTopY+16, 4, 6-legSwing*3);

  // ── Sweat drops ─────────────────────────────────────────────
  const sw=[
    {x:petCX+14, y:petTopY+2,  phase:0},
    {x:petCX+18, y:petTopY+10, phase:0.4},
    {x:petCX+12, y:petTopY+18, phase:0.8},
  ];
  sw.forEach(s=>{
    const fly=(t*2+s.phase)%1;
    const sy=s.y + fly*14;
    const alpha=1-fly;
    ctx.globalAlpha=alpha;
    ctx.fillStyle='#40b0ff';
    ctx.beginPath();
    ctx.moveTo(s.x,sy);
    ctx.lineTo(s.x-3,sy+6);ctx.lineTo(s.x+3,sy+6);
    ctx.closePath();ctx.fill();
  });
  ctx.globalAlpha=1;

  // ── Speed lines ─────────────────────────────────────────────
  ctx.strokeStyle='rgba(80,80,80,0.25)';ctx.lineWidth=1.5;
  for(let i=0;i<4;i++){
    const ly=petTopY+6+i*8;
    const lx=bx+4;
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+18,ly);ctx.stroke();
  }

  // ── Label ────────────────────────────────────────────────────
  drawTextC('EXERCISE!',H-14,1,'#e06020');
}

function drawEgg(){

  let ox=0,oy=0;
  if(eggShake.active){
    const f=eggShake.frames;
    const amp=pct>0.8?(f>6?9:5):(f>6?6:3);

    oy=(f%4<2)?-2:1;

  // 心情需求像素動畫泡泡
  if(pet.need&&NEED_POOL.includes(pet.need)&&!pet.sleeping){
    const t=Date.now();
    // 泡泡位置（寵物右上方）
    const bw=30, bh=30;
    const bx=W-bw-2, by=ey;
    // 泡泡本體
    ctx.fillStyle='rgba(255,255,255,0.94)';

    ctx.beginPath();ctx.arc(bx+2,by+bh+9,1.2,0,Math.PI*2);ctx.fill();

    const cx=bx+bw/2, cy=by+bh/2;

    if(pet.need==='hug'){
      // 心形像素動畫（脈動）
      const pulse=0.85+Math.sin(t/300)*0.15;
      ctx.save();ctx.translate(cx,cy);ctx.scale(pulse,pulse);
      ctx.fillStyle='#ff3377';
      // 像素心形 (7x6 pixel)
      const H7=[[1,0],[2,0],[4,0],[5,0],[0,1],[1,1],[2,1],[3,1],[4,1],[5,1],[6,1],
                 [0,2],[1,2],[2,2],[3,2],[4,2],[5,2],[6,2],
                 [1,3],[2,3],[3,3],[4,3],[5,3],[2,4],[3,4],[4,4],[3,5]];
      H7.forEach(([px,py])=>ctx.fillRect((px-3)*2,(py-3)*2,2,2));
      ctx.restore();

    } else if(pet.need==='play'){
      // 球彈跳動畫
      const bounce=Math.abs(Math.sin(t/220))*8;
      const ballY=cy+4-bounce;
      // 影子（球越高越淡）
      ctx.globalAlpha=0.3*(1-bounce/8);
      ctx.fillStyle='#888';
      ctx.beginPath();ctx.ellipse(cx,cy+5,4,1.5,0,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
      // 球本體
      ctx.fillStyle='#e82020';
      ctx.beginPath();ctx.arc(cx,ballY,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff6060';
      ctx.beginPath();ctx.arc(cx-1.5,ballY-1.5,2,0,Math.PI*2);ctx.fill();
      // 反光
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(cx-1,ballY-2,1.2,0,Math.PI*2);ctx.fill();

    } else if(pet.need==='snack'){
      // 棒棒糖：同心圓＋棒子，緩慢旋轉讓顏色看起來轉動
      const swing=Math.sin(t/500)*0.14;
      ctx.save();ctx.translate(cx,cy+4);ctx.rotate(swing);
      // 棒子
      ctx.strokeStyle='#b89060';ctx.lineWidth=2;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(0,2);ctx.lineTo(0,12);ctx.stroke();
      // 同心圓（由外到內）
      const rings=[
        {r:8, c:'#ff2255'},
        {r:6, c:'#ffffff'},
        {r:4, c:'#ff2255'},
        {r:2, c:'#ffffff'},
      ];
      rings.forEach(({r,c})=>{
        ctx.fillStyle=c;
        ctx.beginPath();ctx.arc(0,-4,r,0,Math.PI*2);ctx.fill();
      });
      // 旋轉扇形覆蓋做色圈效果
      const rot=(t/800)%(Math.PI*2);
      const sectors=[
        {start:rot,           end:rot+Math.PI,   c:'rgba(255,160,0,0.55)'},
        {start:rot+Math.PI,   end:rot+Math.PI*2, c:'rgba(255,60,180,0.45)'},
      ];
      ctx.save();
      ctx.beginPath();ctx.arc(0,-4,8,0,Math.PI*2);ctx.clip();
      sectors.forEach(({start,end,c})=>{
        ctx.fillStyle=c;
        ctx.beginPath();
        ctx.moveTo(0,-4);
        ctx.arc(0,-4,8,start,end);
        ctx.closePath();ctx.fill();
      });
      ctx.restore();
      // 反光
      ctx.fillStyle='rgba(255,255,255,0.55)';
      ctx.beginPath();ctx.arc(-2,-6,2.5,0,Math.PI*2);ctx.fill();
      ctx.restore();

    } else if(pet.need==='feed'){
      // 白飯碗動畫（冒煙）
      // 碗體
      ctx.fillStyle='#e0d8c8';
      ctx.beginPath();ctx.ellipse(cx,cy+4,9,5,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#c8bea8';
      ctx.beginPath();ctx.ellipse(cx,cy+6,9,4,0,Math.PI,Math.PI*2);ctx.fill();
      // 飯
      ctx.fillStyle='#fffef8';
      ctx.beginPath();ctx.ellipse(cx,cy,9,5,0,Math.PI,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx,cy,9,4,0,0,Math.PI);ctx.fill();
      // 飯粒質感
      ctx.fillStyle='#f0ece0';
      [[cx-3,cy-1],[cx+2,cy-2],[cx-1,cy+1],[cx+4,cy]].forEach(([dx,dy])=>{
        ctx.beginPath();ctx.arc(dx,dy,1.2,0,Math.PI*2);ctx.fill();
      });
      // 熱氣（往上飄）
      for(let i=0;i<2;i++){
        const phase=(t/600+i*0.5)%1;
        const sx=cx-3+i*6;
        const sy=cy-8-phase*10;
        ctx.globalAlpha=Math.max(0,1-phase*1.3)*0.6;
        ctx.strokeStyle='#d0c8b0';ctx.lineWidth=1.5;ctx.lineCap='round';
        ctx.beginPath();
        ctx.moveTo(sx,sy+5);
        ctx.quadraticCurveTo(sx+3,sy+2,sx,sy);
        ctx.stroke();
      }
      ctx.globalAlpha=1;
    }
  }
  drawText((pet.ageMin/(60*8)).toFixed(1)+'d',4,4,1);
}

let AC=null, muted=false;
function getAC(){
  if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  return AC;
}
// iOS Safari：每次 touch 都嘗試 resume，因為閒置後會再次 suspend
function unlockAudio(){
  const ac=getAC();if(!ac)return;
  if(ac.state==='suspended'){
    ac.resume().catch(()=>{});
    // 播放靜音 buffer 強制解鎖（iOS 必須）
    try{
      const buf=ac.createBuffer(1,1,22050);
      const src=ac.createBufferSource();
      src.buffer=buf;src.connect(ac.destination);
      src.start(0);
    }catch(e){}
  }
}
// 每次 touch 都 resume，不移除監聽，確保閒置後回來也有聲音
document.addEventListener('touchstart',unlockAudio,true);
document.addEventListener('touchend',unlockAudio,true);
function _playBeep(ac,freq,dur,v,type){
  try{
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=type||'square';o.frequency.value=freq;
    g.gain.setValueAtTime(v||0.05,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.connect(g);g.connect(ac.destination);
    o.start();o.stop(ac.currentTime+dur+0.02);
  }catch(e){}
}
function beep(freq,dur,v,type){
  if(muted)return;
  try{
    const ac=getAC();if(!ac)return;
    if(ac.state==='suspended'){
      // resume 是 async，等完成後再播
      ac.resume().then(()=>_playBeep(ac,freq,dur,v,type)).catch(()=>{});
    } else {
      _playBeep(ac,freq,dur,v,type);
    }
  }catch(e){}
}
function sfx(t){
  if(muted)return;
  const seq=(arr,d,tp)=>arr.forEach(([f,delay])=>setTimeout(()=>beep(f,d,0.05,tp),delay));
  switch(t){
    case 'eat':    beep(880,0.07);break;
    case 'yawn':   beep(300,0.12);setTimeout(()=>beep(220,0.18),120);setTimeout(()=>beep(180,0.14),260);break;
    case 'evolve': seq([[523,0],[659,90],[784,180],[1047,270],[1319,360]],0.13);break;
    case 'dead':   seq([[440,0],[330,160],[220,320],[147,480]],0.28,'sawtooth');break;
    case 'hatch':  seq([[523,0],[659,100],[784,200],[1047,300]],0.12);break;
    case 'meds':   beep(660,0.08);setTimeout(()=>beep(880,0.1),110);break;
    case 'clean':  beep(440,0.06);setTimeout(()=>beep(660,0.06),90);break;
    case 'scold':  beep(200,0.15,0.06,'sawtooth');break;
    case 'win':    seq([[784,0],[1047,70],[1319,140]],0.1);break;
    case 'click':  beep(600,0.04);break;
    case 'lose':   beep(294,0.2,'sawtooth');break;
    case 'alert':  [0,150].forEach(d=>setTimeout(()=>beep(880,0.06),d));break;
  }
}

function eggBump(){
  if(!pet||pet.stage!=='egg')return false;
  eggShake.active=true;
  eggShake.frames=10+Math.floor(Math.random()*6);
  sfx('click');
  startEggRaf();
  return true;
}

function pressA(){
  unlockAudio();
  if(lightMenu){lightMenu=false;render();return;}
  // 動畫播放中不允許切換選單
  if(feedAnim||cleanAnim||exerciseAnim||hugAnim||refuseAnim)return;
  if(eggBump()){render();return;}
  if(shopPhase){shopIdx=(shopIdx+EGG_TYPES.length-1)%EGG_TYPES.length;sfx('click');render();return;}
  if(!pet||pet.dead)return;
  if(playState&&playState.phase==='choose'){subIdx=(subIdx+3-1)%3;sfx('click');render();return;}
  if(menuOpen){
    const m=MENUS[menuIdx];
    if(m==='food'){subIdx=(subIdx+1)%2;sfx('click');}
    render();return;
  }
  menuIdx=(menuIdx+MENUS.length-1)%MENUS.length;
  renderIcons();render();
}
function pressB(){
  unlockAudio();
  if(lightMenu){lightMenu=false;pet.sleeping=true;pet.manualSleep=true;pet.sleepStartMs=Date.now();startSleepRaf();sfx('click');render();return;}
  if(feedAnim){feedAnim=null;render();startIdleRaf();return;}
  if(cleanAnim){cleanAnim=null;render();renderHUD();startIdleRaf();return;}
  if(exerciseAnim){exerciseAnim=null;render();startIdleRaf();return;}
  if(hugAnim){hugAnim=null;render();startIdleRaf();return;}
  if(refuseAnim){refuseAnim=null;render();return;}
  if(pet&&pet.stage==='egg'){eggBump();render();return;}
  if(!pet&&!shopPhase){shopPhase=true;shopIdx=0;sfx('click');render();return;}
  if(shopPhase){
    const p=newPet();p.eggType=shopIdx;pet=p;
    shopPhase=false;eggShake={active:false,frames:0,next:80};eggRafId=null;save();sfx('hatch');renderHUD();render();return;
  }
  if(pet.dead){shopPhase=true;shopIdx=0;pet=null;render();return;}
  if(playState){
    if(playState.phase==='choose'){playState.pChoice=subIdx;resolvePlay();render();}
    else{playState=null;render();}
    return;
  }
  if(showStat){showStat=false;render();return;}
  if(menuOpen){
    const m=MENUS[menuIdx];
    if(m==='food')actFeed(subIdx===1);
    menuOpen=false;render();renderHUD();return;
  }
  const m=MENUS[menuIdx];
  if(m==='status'){showStat=true;render();return;}
  if(m==='play'){startPlay();return;}
  if(m==='food'){menuOpen=true;subIdx=0;sfx('click');render();return;}
  if(m==='light'){
    if(pet.sleeping){
      // ???恍?
      // 任何時候都可以強制喚醒
        pet.sleeping=false;pet.manualSleep=false;stopSleepRaf();startIdleRaf();sfx('click');
    } else {
      // ??霈秘?拍閬綽???撠嚗?
      pet.sleeping=true;pet.manualSleep=true;pet.sleepStartMs=Date.now();startSleepRaf();sfx('click');
    }
    render();return;
  }
  if(m==='meds'){actMeds();return;}
  if(m==='toilet'){actToilet();return;}
  if(m==='discipline'){actDiscipline();return;}
  if(m==='hug'){actHug();return;}
  if(m==='bath'){actBath();return;}
  if(m==='exercise'){actExercise();return;}
  render();renderHUD();
}

  if(feedAnim||cleanAnim||exerciseAnim||hugAnim||refuseAnim)return;
  if(eggBump()){render();return;}
  if(shopPhase){shopIdx=(shopIdx+1)%EGG_TYPES.length;sfx('click');render();return;}
  if(!pet||pet.dead)return;
  if(playState&&playState.phase==='choose'){subIdx=(subIdx+1)%3;sfx('click');render();return;} // C下一個選項
  if(playState&&playState.phase==='result'){playState=null;render();return;}
  if(menuOpen){
    const m=MENUS[menuIdx];
    if(m==='food'){subIdx=(subIdx+1)%2;sfx('click');render();}
    else{menuOpen=false;render();}
    return;
  }
  if(showStat){showStat=false;render();return;}
  menuIdx=(menuIdx+1)%MENUS.length;
  renderIcons();render();
}

// 手機自動縮放：讓外殼填滿螢幕
(function autoScale(){
  const shell=document.getElementById('shell');
  function applyScale(){
    const vw=window.innerWidth;
    const vh=window.innerHeight;
    const SHELL_W=240;
    const sh=shell.offsetHeight||560;
    // 計算最大不超出螢幕的縮放比
    const scale=Math.min(vw/SHELL_W, vh/sh, 2.5);
    if(scale>1.05){
      // 縮放後高度
      const scaledH=sh*scale;
      // 讓 shell 從頂部偏移，讓整體垂直置中
      const topMargin=Math.max(0,Math.floor((vh-scaledH)/2));
      // 覆蓋 body 的 flex 垂直置中，改由 marginTop 手動控制
      document.body.style.justifyContent='flex-start';
      shell.style.transformOrigin='top center';
      shell.style.transform='scale('+scale.toFixed(3)+')';
      shell.style.marginTop=topMargin+'px';
    } else {
      document.body.style.justifyContent='';
      shell.style.transform='';
      shell.style.marginTop='';
    }
  }
  window.addEventListener('resize',applyScale);
  // 等 shell 渲染好才量高度
  requestAnimationFrame(()=>requestAnimationFrame(applyScale));
})();
