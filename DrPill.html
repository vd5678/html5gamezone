<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="font" href="https://fonts.gstatic.com/s/pressstart2p/v16/e3t4euO8T-267oIAQAu6jDQyK0nR.woff2" type="font/woff2" crossorigin>

<title>DR. PILL – Virus Buster</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100dvh;
  background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow:hidden;
  font-family:'Press Start 2P', 'Courier New', monospace;
  touch-action:none;
}
/* force font load before canvas renders */
#font-preload { position:absolute; visibility:hidden; font-family:'Press Start 2P'; font-size:4px; }
canvas {
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  border: 2px solid #1a3a66;
  box-shadow: 0 0 12px #0cf5, 0 0 32px #0cf2;
  border-radius: 4px;
}

/* ── Mobile controls ── */
#mobile-controls {
  display:none;
  flex-direction:column;
  align-items:center;
  gap:8px;
  margin-top:8px;
}
.mrow { display:grid; grid-template-columns:1fr 1fr 1fr; align-items:center; width:100%; }
.mrow > *:nth-child(1) { justify-self:start; }
.mrow > *:nth-child(2) { justify-self:center; }
.mrow > *:nth-child(3) { justify-self:end; }
.mbtn {
  background:#1a1a2e;
  border:2px solid #0cf;
  color:#0cf;
  font-size:18px;
  padding:10px 18px;
  border-radius:8px;
  user-select:none;
  -webkit-user-select:none;
  touch-action:manipulation;
  cursor:pointer;
  min-width:52px;
  text-align:center;
}
.mbtn:active { background:#0cf3; }
#mbtn-up   { border-color:#ff0; color:#ff0; }
#mbtn-drop { border-color:#f44; color:#f44; font-size:13px; padding:10px 14px; }
#mbtn-pause { border-color:#888; color:#888; font-size:11px; padding:8px 12px; }
/* ── Mobile HUD ── */
#pill-mobile-hud {
  display:none;
  width:100%;
  background:#000;
  border-bottom:1px solid #222;
  justify-content:space-around;
  align-items:center;
  padding:3px 6px;
}
.ph-item { display:flex; flex-direction:column; align-items:center; gap:1px; }
.ph-l { color:#f0a000; font-size:6px; font-family:'Press Start 2P',monospace; letter-spacing:1px; }
.ph-val { color:#fff; font-size:10px; font-family:'Press Start 2P',monospace; }
#pill-mobile-next { background:#000018; border:1px solid #333; display:block; }
@media (max-width:700px) {
  body { justify-content:flex-start; padding-top:0; }
  #pill-mobile-hud { display:flex; }
  #mobile-controls { display:flex; }
}
</style>
</head>
<body>
<div id="font-preload">.</div>
<div id="pill-mobile-hud">
  <span class="ph-item"><span class="ph-l">SCORE</span><span class="ph-val" id="ph-score">0000000</span></span>
  <span class="ph-item"><span class="ph-l">LV</span><span class="ph-val" id="ph-level">01</span></span>

<div id="mobile-controls">

  <div class="mrow">
    <button class="mbtn" id="mbtn-left">◀</button>
    <button class="mbtn" id="mbtn-down">▼</button>
    <button class="mbtn" id="mbtn-right">▶</button>

<script>
/************************************************************
 * DR. PILL – Virus Buster
 * HTML5 Canvas Puzzle Game
 * Original artwork, mechanics, and music – not a reproduction
 * Falling-capsule virus-elimination gameplay (8×16 bottle)
 ************************************************************/
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ── Dimensions ───────────────────────────────────────────
const COLS = 8, ROWS = 16;
let CELL = 16;          // pixel size of one grid cell
let CW, CH;             // canvas width/height
let BX, BY;             // bottle inner top-left (pixel coords)
let SIDEBAR_X;          // x start of sidebar
let SIDEBAR_W = 64;
const WALL = 8;         // bottle wall thickness
const BOT_PAD = 12;

// ── Colors ───────────────────────────────────────────────
const RED = 0, YEL = 1, BLU = 2;
const FILL  = ['#cc2020','#c8a800','#1845c8'];
const LITE  = ['#f07070','#f0e060','#6090f8'];
const DARK  = ['#700808','#705800','#0c2070'];
const NAMES = ['RED','YELLOW','BLUE'];

// ── State ────────────────────────────────────────────────
let STATE = 'TITLE'; // TITLE | OPENING | PLAYING | PAUSE | LEVELCLEAR | GAMEOVER
let gameLevel = 1;   // selected on title / current in game
let score = 0, hiScore = 0;
let virusLeft = 0;
let board = [];      // ROWS×COLS: null | { type:'virus'|'cap', color:0-2, paired:[r,c]|null }
let cap = null;      // { r, c, colors:[c0,c1], orient:0(H)|1(V) }
let nextCap = null;
let fallTimer = 0, fallInterval = 600;
let clearing = false, clearFlash = 0;
let clearCells = [];
let titleTimer = 0, openTimer = 0, goTimer = 0, lcTimer = 0;
let lastTS = 0;
let musicOn = true;

// ── Audio ────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();

function tone(freq, t0, dur, type='square', vol=0.12) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0, t0);
  g.gain.setValueAtTime(vol, t0 + 0.008);
  g.gain.setValueAtTime(vol, t0 + dur - 0.015);
  g.gain.linearRampToValueAtTime(0, t0 + dur);
  o.start(t0); o.stop(t0 + dur);
  return o;
}

// ── Frequencies ──────────────────────────────────────────
const F = {
  C3:130.8, D3:146.8, E3:164.8, F3:174.6, G3:196.0, A3:220.0, B3:246.9,
  Cs3:138.6,Ds3:155.6,Fs3:185.0,Gs3:207.7,As3:233.1,
  C4:261.6,D4:293.7,E4:329.6,F4:349.2,G4:392.0,A4:440.0,B4:493.9,
  C5:523.3,D5:587.3,E5:659.3,F5:698.5,G5:784.0,A5:880.0,B5:987.8,C6:1046.5,
  Cs4:277.2,Ds4:311.1,Fs4:370.0,Gs4:415.3,As4:466.2,
  Cs5:554.4,Ds5:622.3,Fs5:740.0,Gs5:830.6,As5:932.3,
};

// ── BGM: melody + harmony + bass chords ──────────────────
// Format: [[melody, harmony, bass], dur] or [single_freq, dur]
// playMelody plays index-0 louder (melody), rest softer (harmony/bass)

// MINUET – G major, Bach-style (title screen)
const MELODY_T = [
  [[F.G5,F.B4,F.G3],0.22],[[F.A5,F.C5],0.11],[[F.B5,F.D5],0.11],
  [[F.C6,F.E5,F.C4],0.22],[[F.B5,F.D5],0.11],[[F.A5,F.C5,F.A3],0.11],
  [[F.G5,F.B4,F.G3],0.44],
  [[F.D5,F.Fs4,F.D3],0.22],[[F.E5,F.G4],0.11],[[F.Fs5,F.A4,F.D3],0.11],
  [[F.G5,F.B4,F.G3],0.44],
  [[F.E5,F.G4,F.C4],0.22],[[F.Fs5,F.A4],0.11],[[F.G5,F.B4,F.G3],0.11],
  [[F.A5,F.C5,F.A3],0.22],[[F.G5,F.B4],0.11],[[F.Fs5,F.A4,F.D3],0.11],
  [[F.G5,F.B4,F.G3],0.22],[[F.Fs5,F.A4],0.11],[[F.E5,F.G4,F.C4],0.11],
  [[F.D5,F.Fs4,F.D3],0.22],[[F.C5,F.E4],0.11],[[F.B4,F.D4,F.G3],0.11],
  [[F.G5,F.B4,F.G3],0.22],[[F.A5,F.C5],0.11],[[F.B5,F.D5,F.G3],0.11],
  [[F.C6,F.E5,F.C4],0.22],[[F.D6,F.Fs5],0.11],[[F.C6,F.E5,F.A3],0.11],
  [[F.B5,F.D5,F.G3],0.22],[[F.A5,F.C5],0.11],[[F.G5,F.B4,F.A3],0.11],
  [[F.G5,F.B4,F.G3],0.44],
];

// CANON – D major, Pachelbel-inspired (levels 1-10)
// Bass: D3 A3 B3 Fs3 G3 D3 G3 A3
const MELODY_B = [
  [[F.Fs5,F.D5,F.D3],0.15],[[F.A5,F.Fs5],0.15],[[F.D5,F.A4,F.D3],0.15],[[F.Fs5,F.D5],0.15],
  [[F.E5,F.Cs5,F.A3],0.15],[[F.A5,F.E5],0.15],[[F.Cs5,F.A4,F.A3],0.15],[[F.E5,F.Cs5],0.15],
  [[F.Fs5,F.D5,F.B3],0.15],[[F.B5,F.Fs5],0.15],[[F.D5,F.B4,F.B3],0.15],[[F.Fs5,F.D5],0.15],
  [[F.Cs5,F.A4,F.Fs3],0.15],[[F.Fs5,F.Cs5],0.15],[[F.A4,F.Fs4,F.Fs3],0.15],[[F.Cs5,F.A4],0.15],
  [[F.D5,F.B4,F.G3],0.15],[[F.G5,F.D5],0.15],[[F.B4,F.G4,F.G3],0.15],[[F.D5,F.B4],0.15],
  [[F.A5,F.Fs5,F.D3],0.15],[[F.D5,F.A4],0.15],[[F.Fs5,F.D5,F.D3],0.15],[[F.A5,F.Fs5],0.15],
  [[F.B4,F.G4,F.G3],0.15],[[F.D5,F.B4],0.15],[[F.G5,F.D5,F.G3],0.15],[[F.B5,F.G5],0.15],
  [[F.Cs5,F.A4,F.A3],0.15],[[F.E5,F.Cs5],0.15],[[F.A5,F.E5,F.A3],0.15],[[F.E5,F.Cs5],0.15],
  [[F.D5,F.Fs4,F.D3],0.3],[[F.A5,F.Fs5,F.A3],0.3],
  [[F.B4,F.D4,F.G3],0.3],[[F.G5,F.B4,F.D3],0.3],
];

// NOCTURNE – A minor, Beethoven/Chopin inspired (levels 11-20)
const MELODY_A = [
  [[F.A4,F.C5,F.A3],0.18],[[F.E5,F.C5],0.18],[[F.A5,F.E5,F.A3],0.18],[[F.E5,F.C5],0.18],
  [[F.B4,F.D5,F.E3],0.18],[[F.E5,F.D5],0.18],[[F.Gs5,F.E5,F.E3],0.18],[[F.E5,F.D5],0.18],
  [[F.A4,F.C5,F.A3],0.18],[[F.E5,F.C5],0.18],[[F.A5,F.E5,F.A3],0.18],[[F.E5,F.C5],0.18],
  [[F.G5,F.E5,F.C4],0.18],[[F.E5,F.C5],0.18],[[F.C5,F.G4,F.C3],0.18],[[F.G4,F.E4],0.18],
  [[F.F5,F.A4,F.F3],0.18],[[F.C5,F.A4],0.18],[[F.A5,F.F5,F.F3],0.18],[[F.C5,F.A4],0.18],
  [[F.G5,F.B4,F.G3],0.18],[[F.D5,F.B4],0.18],[[F.B5,F.G5,F.G3],0.18],[[F.D5,F.B4],0.18],
  [[F.E5,F.Gs4,F.E3],0.18],[[F.Gs4,F.E4],0.18],[[F.B5,F.Gs5,F.E3],0.18],[[F.Gs4,F.E4],0.18],
  [[F.A4,F.C5,F.A3],0.18],[[F.E5,F.A4],0.18],[[F.A5,F.C5,F.A3],0.18],[[F.A4,F.E4],0.18],
  [[F.A3,F.E4,F.A3],0.54],
];

let musicHandle = null;
let musicNodes = [];

function playMelody(mel) {
  if (!musicOn) return;
  stopMusic();
  let t = AC.currentTime + 0.05;
  for (const [notes, dur] of mel) {
    if (Array.isArray(notes)) {
      musicNodes.push(tone(notes[0], t, dur * 0.82, 'square',   0.12));
      for (let i = 1; i < notes.length; i++)
        musicNodes.push(tone(notes[i], t, dur * 0.88, 'triangle', 0.07));
    } else {
      musicNodes.push(tone(notes, t, dur * 0.82, 'square', 0.12));
    }
    t += dur;
  }
  const total = mel.reduce((s,[,d]) => s+d, 0);
  musicHandle = setTimeout(() => playMelody(mel), total * 1000);
}
function stopMusic() {
  clearTimeout(musicHandle); musicHandle = null;
  const t = AC.currentTime;
  musicNodes.forEach(o => { try { o.stop(t); } catch(_) {} });
  musicNodes = [];
}

function _sfx(fn) { fn(); }

function sndRotate()     { tone(F.B5||987.8, AC.currentTime, 0.04, 'square', 0.1); }
function sndMove()       { tone(F.G4, AC.currentTime, 0.035, 'square', 0.07); }
function sndLand()       { tone(F.C4, AC.currentTime, 0.07, 'triangle', 0.18); }
function sndClear()      { [F.C5,F.E5,F.G5,F.C5*2].forEach((f,i)=>setTimeout(()=>tone(f,AC.currentTime,0.09,'square',0.15),i*65)); }
function sndLevelClear() { [F.C5,F.E5,F.G5,F.A5,F.G5,F.E5,F.C5*2].forEach((f,i)=>setTimeout(()=>tone(f,AC.currentTime,0.1,'square',0.18),i*90)); }
function sndGameOver()   { [F.G4,F.E4,F.C4,F.A4*0.5||110].forEach((f,i)=>setTimeout(()=>tone(f,AC.currentTime,0.22,'sawtooth',0.2),i*180)); }
function sndStart()      { [F.C4,F.E4,F.G4,F.C5].forEach((f,i)=>setTimeout(()=>tone(f,AC.currentTime,0.1,'square',0.18),i*80)); }

// ── Layout ───────────────────────────────────────────────
let isMobile = false;
function computeLayout() {
  const vw = window.innerWidth, vh = window.innerHeight;
  isMobile = vw <= 700;
  const mctrl = document.getElementById('mobile-controls');
  const mhud  = document.getElementById('pill-mobile-hud');
  const mctrlH = isMobile ? (mctrl.offsetHeight > 0 ? mctrl.offsetHeight : 90) : 0;
  const mhudH  = isMobile ? (mhud.offsetHeight  > 0 ? mhud.offsetHeight  : 28) : 0;
  const availH = vh - (isMobile ? 4 : 16) - mctrlH - mhudH;
  const availW = vw - (isMobile ? 4 : SIDEBAR_W + 24);

  CELL = isMobile
    ? Math.max(10, Math.min(availH / (ROWS + 2), availW / COLS))
    : Math.max(12, Math.min(Math.floor(availH / (ROWS + 2)), Math.floor(availW / (COLS + 5))));

  SIDEBAR_W = Math.round(CELL * 3.2);
  const bottleW = COLS * CELL + WALL * 2;
  const bottleH = ROWS * CELL + WALL + BOT_PAD;

  BX = WALL;
  BY = WALL;
  SIDEBAR_X = bottleW + 6;
  CW = isMobile ? Math.round(bottleW) : Math.round(bottleW + SIDEBAR_W + 6);
  CH = Math.round(bottleH + 16);

  canvas.width  = CW;
  canvas.height = CH;
  canvas.style.width  = CW + 'px';
  canvas.style.height = CH + 'px';

  if (isMobile) {
    mctrl.style.width        = CW + 'px';
    mctrl.style.paddingLeft  = '0';
    mctrl.style.paddingRight = '0';
  }
}

// ── Board helpers ─────────────────────────────────────────
function emptyBoard() {
  board = Array.from({length: ROWS}, () => Array(COLS).fill(null));
}

function virusCountForLevel(lv) {
  return Math.min(84, 4 + (lv - 1) * 4);
}

function placeViruses(lv) {
  const count = virusCountForLevel(lv);
  let placed = 0, tries = 0;
  while (placed < count && tries < 5000) {
    tries++;
    const c = Math.floor(Math.random() * COLS);
    const r = 4 + Math.floor(Math.random() * (ROWS - 4));
    if (board[r][c]) continue;
    const color = Math.floor(Math.random() * 3);
    // Don't create instant 3-in-a-row
    const h2 = c >= 2 && board[r][c-1]?.color === color && board[r][c-2]?.color === color;
    const v2 = r >= 2 && board[r-1][c]?.color === color && board[r-2][c]?.color === color;
    if (h2 || v2) continue;
    board[r][c] = { type:'virus', color, paired:null };
    placed++;
  }
  virusLeft = placed;
}

// ── Capsule ───────────────────────────────────────────────
// orient: 0=H(A,B)  1=V(B-top,A-bot)  2=H(B,A)  3=V(A-top,B-bot)
function capCells(p) {
  if (p.orient % 2 === 0) return [[p.r, p.c], [p.r, p.c+1]]; // horizontal
  return [[p.r, p.c], [p.r+1, p.c]]; // vertical
}
// Returns [colorForCell0, colorForCell1] given orient
function capColors(p) {
  switch(p.orient) {
    case 0: return [p.colors[0], p.colors[1]];
    case 1: return [p.colors[1], p.colors[0]]; // top=colors[1], bot=colors[0]
    case 2: return [p.colors[1], p.colors[0]]; // left=colors[1], right=colors[0]
    case 3: return [p.colors[0], p.colors[1]]; // top=colors[0], bot=colors[1]
  }
}

function canPlace(p) {
  for (const [r,c] of capCells(p)) {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return false;
    if (board[r][c]) return false;
  }
  return true;
}

function makeNextCap() {
  return { colors:[Math.floor(Math.random()*3), Math.floor(Math.random()*3)], orient:0 };
}

function spawnCap() {
  cap = { r:0, c:3, colors:[...nextCap.colors], orient:nextCap.orient };
  nextCap = makeNextCap();
  fallTimer = 0;
  if (!canPlace(cap)) {
    cap = null;
    triggerGameOver();
  }
}

function moveCap(dr, dc) {
  if (!cap) return false;
  const moved = {...cap, r:cap.r+dr, c:cap.c+dc};
  if (canPlace(moved)) { cap = moved; if (dc!==0) sndMove(); return true; }
  return false;
}

function rotateCap(dir) { // dir: 1=CW, -1=CCW
  if (!cap) return;
  const newOrient = (cap.orient + (dir === 1 ? 1 : 3)) % 4;
  let nc = {...cap, orient: newOrient};
  if (!canPlace(nc)) {
    // Wall-kick attempts: shift left, right, up
    const kicks = [[0,-1],[0,1],[-1,0]];
    let kicked = false;
    for (const [dr,dc] of kicks) {
      const k = {...nc, r:nc.r+dr, c:nc.c+dc};
      if (canPlace(k)) { nc = k; kicked = true; break; }
    }
    if (!kicked) return;
  }
  cap = nc;
  sndRotate();
}

function hardDrop() {
  if (!cap || clearing) return;
  let dropped = 0;
  while (moveCap(1,0)) { dropped++; score += 2; }
  lockCap();
}

function lockCap() {
  if (!cap) return;
  const cells = capCells(cap);
  const colors = capColors(cap);
  cells.forEach(([r,c], i) => {
    board[r][c] = { type:'cap', color:colors[i], paired:cells[1-i] };
  });
  sndLand();
  cap = null;
  checkMatches();
}

// ── Match detection ───────────────────────────────────────
function checkMatches() {
  clearCells = [];
  // Horizontal
  for (let r = 0; r < ROWS; r++) {
    let run = 1;
    for (let c = 1; c <= COLS; c++) {
      if (c < COLS && board[r][c] && board[r][c-1] && board[r][c].color === board[r][c-1].color) {
        run++;
      } else {
        if (run >= 4) for (let k=c-run; k<c; k++) clearCells.push([r,k]);
        run = 1;
      }
    }
  }
  // Vertical
  for (let c = 0; c < COLS; c++) {
    let run = 1;
    for (let r = 1; r <= ROWS; r++) {
      if (r < ROWS && board[r][c] && board[r-1][c] && board[r][c].color === board[r-1][c].color) {
        run++;
      } else {
        if (run >= 4) for (let k=r-run; k<r; k++) clearCells.push([k,c]);
        run = 1;
      }
    }
  }
  // Deduplicate
  const seen = new Set();
  clearCells = clearCells.filter(([r,c]) => { const k=r*100+c; if(seen.has(k)) return false; seen.add(k); return true; });

  if (clearCells.length > 0) {
    clearing = true;
    clearFlash = 0;
    sndClear();
  } else {
    afterClear();
  }
}

function finishClear() {
  let virusCleared = 0;
  for (const [r,c] of clearCells) {
    const cell = board[r][c];
    if (!cell) continue;
    if (cell.type === 'virus') virusCleared++;
    // Orphan the paired half
    if (cell.paired) {
      const [pr,pc] = cell.paired;
      if (board[pr]?.[pc]) board[pr][pc].paired = null;
    }
    board[r][c] = null;
  }
  const lineBonus = clearCells.length >= 8 ? 2 : 1;
  score += (clearCells.length * 100 + virusCleared * 800) * lineBonus;
  virusLeft -= virusCleared;
  if (score > hiScore) hiScore = score;
  clearCells = [];
  clearing = false;

  if (virusLeft <= 0) {
    triggerLevelClear();
    return;
  }
  afterClear();
}

function afterClear() {
  // Apply gravity to orphaned cap halves
  let fell = false;
  for (let r = ROWS-2; r >= 0; r--) {
    for (let c = 0; c < COLS; c++) {
      const cell = board[r][c];
      if (!cell || cell.type === 'virus' || cell.paired) continue;
      // Orphaned (single) half
      if (!board[r+1][c]) {
        board[r+1][c] = cell;
        board[r][c] = null;
        fell = true;
      }
    }
  }
  if (fell) { setTimeout(checkMatches, 250); return; }
  spawnCap();
}

// ── Game flow ─────────────────────────────────────────────
function initLevel(lv) {
  gameLevel = lv;
  score = score; // carry score between levels
  emptyBoard();
  placeViruses(lv);
  nextCap = makeNextCap();
  spawnCap();
  fallInterval = Math.max(80, 650 - (lv-1)*30);
  STATE = 'PLAYING';
  stopMusic();
  playMelody(lv >= 11 ? MELODY_A : MELODY_B);
}

function goToTitle() {
  STATE = 'TITLE';
  titleTimer = 0;
  stopMusic();
  if (AC.state==='suspended') AC.resume();
  playMelody(MELODY_T);
}

function startNewGame() {
  score = 0;
  STATE = 'OPENING';
  openTimer = 0;
  stopMusic();
  sndStart();
}

function triggerGameOver() {
  STATE = 'GAMEOVER';
  goTimer = 0;
  stopMusic();
  sndGameOver();
}

function triggerLevelClear() {
  STATE = 'LEVELCLEAR';
  lcTimer = 0;
  stopMusic();
  sndLevelClear();
}

function advanceLevel() {
  if (gameLevel >= 20) { goToTitle(); gameLevel=1; return; }
  initLevel(gameLevel + 1);
}

// ── Drawing helpers ───────────────────────────────────────
function px(c) { return BX + c * CELL; }
function py(r) { return BY + r * CELL; }

function drawCapsuleHalf(x, y, colorIdx, alpha=1) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = FILL[colorIdx];
  const r = Math.max(2, Math.round(CELL * 0.18));
  ctx.beginPath(); ctx.roundRect(x+1, y+1, CELL-2, CELL-2, r); ctx.fill();
  ctx.fillStyle = LITE[colorIdx];
  ctx.fillRect(x+2, y+2, CELL-5, 2);
  ctx.fillRect(x+2, y+2, 2, CELL-5);
  ctx.globalAlpha = 1;
}

function drawVirus(x, y, colorIdx, flash=false) {
  if (flash) {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(x+CELL/2, y+CELL/2, CELL/2-1, CELL/2-1, 0, 0, Math.PI*2); ctx.fill();
    return;
  }
  const cx = x+CELL/2, cy = y+CELL/2;
  ctx.fillStyle = FILL[colorIdx];
  ctx.beginPath(); ctx.ellipse(cx, cy, CELL/2-1, CELL/2-1, 0, 0, Math.PI*2); ctx.fill();
  // Spikey outline
  ctx.fillStyle = DARK[colorIdx];
  for (let a=0; a<8; a++) {
    const ang = a * Math.PI/4;
    ctx.beginPath();
    ctx.arc(cx+Math.cos(ang)*(CELL/2-2), cy+Math.sin(ang)*(CELL/2-2), 1.5, 0, Math.PI*2);
    ctx.fill();
  }
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx-3, cy-3, 2, 2); ctx.fillRect(cx+1, cy-3, 2, 2);
  ctx.fillStyle = '#111';
  ctx.fillRect(cx-2, cy-2, 1, 1); ctx.fillRect(cx+2, cy-2, 1, 1);
  // Mouth
  ctx.fillStyle = DARK[colorIdx];
  ctx.fillRect(cx-2, cy+2, 4, 1);
}

function drawCapHalf(x, y, colorIdx, flash=false) {
  if (flash) {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.roundRect(x+1,y+1,CELL-2,CELL-2,Math.max(2,Math.round(CELL*0.18))); ctx.fill();
    return;
  }
  drawCapsuleHalf(x, y, colorIdx);
}

function drawBottle() {
  const bw = COLS*CELL + WALL*2;
  const bh = ROWS*CELL + WALL + BOT_PAD;
  // Glass outer
  const g = ctx.createLinearGradient(0, 0, bw, 0);
  g.addColorStop(0,   '#99ccff');
  g.addColorStop(0.08,'#1a3a66');
  g.addColorStop(0.92,'#1a3a66');
  g.addColorStop(1,   '#99ccff');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.roundRect(0, WALL-2, bw, bh, 6); ctx.fill();
  // Inner black playfield
  ctx.fillStyle = '#000';
  ctx.fillRect(BX, BY, COLS*CELL, ROWS*CELL);
  // Subtle grid
  ctx.strokeStyle = '#0d0d22'; ctx.lineWidth = 0.5;
  for (let c=1; c<COLS; c++) {
    ctx.beginPath(); ctx.moveTo(BX+c*CELL, BY); ctx.lineTo(BX+c*CELL, BY+ROWS*CELL); ctx.stroke();
  }
  for (let r=1; r<ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(BX, BY+r*CELL); ctx.lineTo(BX+COLS*CELL, BY+r*CELL); ctx.stroke();
  }
  // Bottle neck
  const nw = Math.round(COLS*CELL*0.42);
  const nx = BX + Math.round((COLS*CELL - nw)/2);
  ctx.fillStyle = '#1a3a66';
  ctx.fillRect(nx-WALL, 0, nw+WALL*2, WALL);
  ctx.fillStyle = '#99ccff'; ctx.fillRect(nx-WALL, 0, WALL, WALL);
  ctx.fillStyle = '#99ccff'; ctx.fillRect(nx+nw, 0, WALL, WALL);
  // Glass shine
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(BX+1, BY+2, 2, ROWS*CELL-4);
}

function drawSidebar() {
  if (CW <= COLS*CELL + WALL*2 + 10) return; // no room (mobile)
  const sx = SIDEBAR_X + 2;
  const mid = sx + SIDEBAR_W/2;
  const fL = Math.max(4, Math.round(CELL*0.24));   // label font
  const fV = Math.max(5, Math.round(CELL*0.30));  // value font

  function label(txt, y) {
    ctx.fillStyle='#556'; ctx.font=`${fL}px "Press Start 2P"`; ctx.textAlign='center';
    ctx.fillText(txt, mid, y);
  }
  function val(txt, y, col) {
    ctx.fillStyle=col||'#fff'; ctx.font=`${fV}px "Press Start 2P"`; ctx.textAlign='center';
    ctx.fillText(txt, mid, y);
  }

  // Layout: each row = label + value, spaced by CELL
  const row = CELL * 1.3;   // vertical gap between sections
  let y = BY + fL;

  // NEXT capsule — draw at 75% of CELL size
  const nCell = Math.round(CELL * 0.75);
  label('NEXT', y);
  if (nextCap) {
    const nx = sx + Math.round((SIDEBAR_W - nCell*2)/2);
    ctx.save();
    const savedCell = CELL;
    // temporarily override CELL for drawCapsuleHalf sizing
    // draw manually at nCell size instead
    const nr2 = Math.max(2, Math.round(nCell * 0.18));
    ctx.fillStyle = FILL[nextCap.colors[0]];
    ctx.beginPath(); ctx.roundRect(nx+1, y+4, nCell-2, nCell-2, nr2); ctx.fill();
    ctx.fillStyle = LITE[nextCap.colors[0]];
    ctx.fillRect(nx+2, y+5, nCell-5, 1); ctx.fillRect(nx+2, y+5, 1, nCell-5);
    ctx.fillStyle = FILL[nextCap.colors[1]];
    ctx.beginPath(); ctx.roundRect(nx+nCell+1, y+4, nCell-2, nCell-2, nr2); ctx.fill();
    ctx.fillStyle = LITE[nextCap.colors[1]];
    ctx.fillRect(nx+nCell+2, y+5, nCell-5, 1); ctx.fillRect(nx+nCell+2, y+5, 1, nCell-5);
    ctx.restore();
  }
  y += nCell + fL + Math.round(CELL * 0.8);

  label('SCORE', y); y += fL + 4;
  val(String(score).padStart(7,'0'), y, '#ff0'); y += row;

  label('BEST', y); y += fL + 4;
  val(String(hiScore).padStart(7,'0'), y, '#0cf'); y += row;

  label('LEVEL', y); y += fL + 4;
  val(String(gameLevel).padStart(2,'0'), y, '#0f0'); y += row;

  label('VIRUS', y); y += fL + 4;
  val(String(Math.max(0,virusLeft)).padStart(2,'0'), y, '#f44'); y += row;

  label('SPEED', y); y += fL + 4;
  const spd = Math.min(10, Math.ceil(gameLevel/2));
  val('▮'.repeat(spd) + '▯'.repeat(10-spd), y, '#f80');
}

// ── Doctor pixel sprite ───────────────────────────────────
function drawDoctor(x, y, walkPhase) {
  const t = walkPhase;
  // White coat
  ctx.fillStyle='#eeeeff'; ctx.fillRect(x+1,y+10,16,18);
  // Collar/lapels
  ctx.fillStyle='#ccc'; ctx.fillRect(x+5,y+10,3,6); ctx.fillRect(x+10,y+10,3,6);
  // Skin - head
  ctx.fillStyle='#f0b080'; ctx.fillRect(x+3,y+1,12,11);
  // Hair
  ctx.fillStyle='#2a1a0a'; ctx.fillRect(x+3,y+1,12,4);
  // Eyes
  ctx.fillStyle='#111';
  ctx.fillRect(x+5,y+6,2,2); ctx.fillRect(x+11,y+6,2,2);
  // Glasses
  ctx.strokeStyle='#555'; ctx.lineWidth=0.8;
  ctx.strokeRect(x+4,y+5,4,3); ctx.strokeRect(x+10,y+5,4,3);
  ctx.beginPath(); ctx.moveTo(x+8,y+6); ctx.lineTo(x+10,y+6); ctx.stroke();
  // Smile
  ctx.fillStyle='#b06040'; ctx.fillRect(x+6,y+10,6,1);
  // Stethoscope
  ctx.fillStyle='#888'; ctx.fillRect(x+8,y+12,1,7); ctx.fillRect(x+5,y+19,7,1);
  ctx.beginPath(); ctx.arc(x+5,y+21,2,0,Math.PI*2);
  ctx.fillStyle='#aaa'; ctx.fill();
  // Arms
  ctx.fillStyle='#eeeeff';
  ctx.fillRect(x-1, y+11, 3, 10); // left arm
  ctx.fillRect(x+16, y+11, 3, 10); // right arm (holding capsule)
  // Hands
  ctx.fillStyle='#f0b080';
  ctx.fillRect(x-1, y+21, 3, 3);
  ctx.fillRect(x+16, y+21, 3, 3);
  // Capsule in right hand — small horizontal pill (RED left, BLU right)
  ctx.save();
  const ph = 5, pw = 4, pr = 2;
  // Left half (red)
  ctx.fillStyle = FILL[RED]; ctx.beginPath(); ctx.roundRect(x+18, y+17, pw, ph, pr); ctx.fill();
  ctx.fillStyle = LITE[RED]; ctx.fillRect(x+19, y+18, pw-2, 1);
  // Right half (blue/yellow)
  ctx.fillStyle = FILL[BLU]; ctx.beginPath(); ctx.roundRect(x+18+pw, y+17, pw, ph, pr); ctx.fill();
  ctx.fillStyle = LITE[BLU]; ctx.fillRect(x+19+pw, y+18, pw-2, 1);
  ctx.restore();
  // Legs (walking animation)
  ctx.fillStyle='#334';
  ctx.fillRect(x+2,  y+28, 5, 8 + (t?2:-1));
  ctx.fillRect(x+11, y+28, 5, 8 + (t?-1:2));
  // Shoes
  ctx.fillStyle='#111';
  ctx.fillRect(x+1,  y+36+(t?2:-1), 6, 3);
  ctx.fillRect(x+10, y+36+(t?-1:2), 6, 3);
}

// ── Screen renderers ──────────────────────────────────────
function drawTitle() {
  const TW = 224, TH = 320;
  const tScale = isMobile ? CW / TW : Math.min(CW / TW, CH / TH);
  const tOffX = Math.round((CW - TW * tScale) / 2);
  const tOffY = isMobile ? 0 : Math.round((CH - TH * tScale) / 2);
  const iTH = isMobile ? Math.round(CH / tScale) : TH;

  ctx.fillStyle='#000'; ctx.fillRect(0,0,CW,CH);
  ctx.save();
  ctx.translate(tOffX, tOffY);
  ctx.scale(tScale, tScale);

  // Stars (in internal coords)
  for (let i=0;i<35;i++) {
    const sx=((i*79+titleTimer*0.012)%TW);
    const sy=((i*53+titleTimer*0.007*(i%3+1))%TH);
    ctx.fillStyle=`rgba(255,255,255,${0.15+(i%5)*0.08})`;
    ctx.beginPath(); ctx.arc(sx,sy,i%4===0?1.5:0.8,0,Math.PI*2); ctx.fill();
  }

  // Title box — fixed position
  const tx = TW/2;
  ctx.fillStyle='#0a0a30';
  ctx.beginPath(); ctx.roundRect(12, 12, TW-24, 58, 8); ctx.fill();
  ctx.strokeStyle='#0cf'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(12, 12, TW-24, 58, 8); ctx.stroke();
  ctx.textAlign='center';
  ctx.fillStyle='#f44'; ctx.font='20px "Press Start 2P"';
  ctx.shadowColor='#f44'; ctx.shadowBlur=16;
  ctx.fillText('DR. PILL', tx, 46);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ff0'; ctx.font='8px "Press Start 2P"';
  ctx.fillText('VIRUS BUSTER', tx, 62);

  // Viruses — fixed position
  const virusSize = 28;
  const vGap = virusSize + 10;
  const vTop = 82;
  function drawVirusLg(px, py, col) {
    const s = virusSize, cx = px+s/2, cy = py+s/2;
    ctx.fillStyle=FILL[col];
    ctx.beginPath(); ctx.ellipse(cx,cy,s/2-1,s/2-1,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=DARK[col];
    for(let a=0;a<8;a++){const ang=a*Math.PI/4;ctx.beginPath();ctx.arc(cx+Math.cos(ang)*(s/2-2),cy+Math.sin(ang)*(s/2-2),2.2,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='#fff'; ctx.fillRect(cx-4,cy-4,3,3); ctx.fillRect(cx+1,cy-4,3,3);
    ctx.fillStyle='#111'; ctx.fillRect(cx-3,cy-3,2,2); ctx.fillRect(cx+2,cy-3,2,2);
    ctx.fillStyle=DARK[col]; ctx.fillRect(cx-3,cy+3,6,1);
  }
  drawVirusLg(tx - vGap - virusSize/2, vTop, RED);
  drawVirusLg(tx - virusSize/2,        vTop, YEL);
  drawVirusLg(tx + vGap - virusSize/2, vTop, BLU);

  // PRESS START — fixed position
  // On mobile: vertically center between bottom of viruses (vTop+virusSize=110) and top of doctor (iTH-135)
  const startY = isMobile ? Math.round((110 + (iTH - 135)) / 2) : 136;
  ctx.fillStyle = Math.floor(titleTimer/480)%2===0 ? '#ff0' : '#554400';
  ctx.font='7px "Press Start 2P"'; ctx.textAlign='center';
  ctx.fillText(isMobile ? '- TAP TO START -' : '- PRESS SPACE -', tx, startY);
  if (!isMobile) {
    ctx.fillStyle='#555'; ctx.font='5px "Press Start 2P"';
    ctx.fillText('Z/X/UP:ROTATE  DOWN:FASTER', tx, startY+15);
    ctx.fillText('SPACE:DROP  P:PAUSE ESC:QUIT', tx, startY+27);
  }

  // Doctor — 3× scale inside the tScale context
  // doctor sprite: 18px wide, shoe bottom at y+41 (unscaled), so at 3×: y + 123
  // feet at iTH-12 → top = (iTH - 12) - 3*41 = iTH - 135
  ctx.save();
  ctx.translate(85, iTH - 135);
  ctx.scale(3, 3);
  drawDoctor(0, 0, Math.floor(titleTimer/300)%2===0);
  ctx.restore();

  ctx.restore();
}

function drawOpening() {
  ctx.fillStyle='#000'; ctx.fillRect(0,0,CW,CH);
  drawBottle();
  const t = openTimer;

  // Doctor walks in from right → center
  const docScale = 2.5;
  const docW = Math.round(18 * docScale);
  const docH = Math.round(42 * docScale); // sprite height ~42px
  const docYBase = Math.round(CH * 0.72); // feet land ~72% down canvas
  const targetX = Math.round(CW/2 - docW/2);
  const startX = CW + 40;
  const docX = t < 1200
    ? Math.round(startX + (targetX - startX) * Math.min(1, t/1000))
    : targetX;

  ctx.save();
  ctx.translate(docX, docYBase - docH);
  ctx.scale(docScale, docScale);
  drawDoctor(0, 0, Math.floor(t/200)%2===0);
  ctx.restore();

  // At 1.4s, throw capsule arc into bottle neck
  if (t > 1400) {
    const p = Math.min(1, (t-1400)/700);
    const startCapX = docX + Math.round(docW * 0.6), startCapY = docYBase - Math.round(docH * 0.55);
    const endCapX = BX + Math.round(COLS*CELL/2) - CELL;
    const endCapY = BY - CELL;
    const capX = Math.round(startCapX + (endCapX - startCapX)*p);
    const capY = Math.round(startCapY + (endCapY - startCapY)*p - Math.sin(p*Math.PI)*30);
    drawCapsuleHalf(capX, capY, RED);
    drawCapsuleHalf(capX+CELL, capY, BLU);
  }

  // Fade to black after 2.4s → start game
  if (t > 2300) {
    ctx.fillStyle=`rgba(0,0,0,${Math.min(1,(t-2300)/500)})`;
    ctx.fillRect(0,0,CW,CH);
  }
  if (t > 2800) initLevel(gameLevel);
}

function drawGame() {
  ctx.fillStyle='#000'; ctx.fillRect(0,0,CW,CH);
  drawBottle();

  // Board
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const cell = board[r][c];
      if (!cell) continue;
      const isClearing = clearCells.some(([cr,cc])=>cr===r&&cc===c);
      const flash = isClearing && Math.floor(clearFlash/5)%2===0;
      if (cell.type==='virus') drawVirus(px(c), py(r), cell.color, flash);
      else drawCapHalf(px(c), py(r), cell.color, flash);
    }
  }

  // Active capsule + ghost
  if (cap && STATE==='PLAYING') {
    const cols = capColors(cap);
    // Ghost — outline only (no fill) so it won't be confused with real capsule
    let ghost = {...cap};
    while (canPlace({...ghost, r:ghost.r+1})) ghost.r++;
    if (ghost.r !== cap.r) {
      ctx.save();
      ctx.setLineDash([2,2]);
      ctx.lineWidth = 1;
      capCells(ghost).forEach(([r,c],i) => {
        ctx.strokeStyle = FILL[cols[i]];
        ctx.strokeRect(px(c)+2, py(r)+2, CELL-4, CELL-4);
      });
      ctx.setLineDash([]);
      ctx.restore();
    }
    // Capsule
    capCells(cap).forEach(([r,c],i)=>drawCapsuleHalf(px(c),py(r),cols[i]));
    // Connector bar between halves
    ctx.fillStyle=FILL[cols[0]];
    if (cap.orient%2===0) ctx.fillRect(px(cap.c)+CELL-1, py(cap.r)+3, 2, CELL-6);
    else                  ctx.fillRect(px(cap.c)+3, py(cap.r)+CELL-1, CELL-6, 2);
  }

  drawSidebar();
  updateMobileHUD();
}

function updateMobileHUD() {
  if (!isMobile) return;
  const ps = document.getElementById('ph-score');
  const pl = document.getElementById('ph-level');
  const pv = document.getElementById('ph-virus');
  if (ps) ps.textContent = String(score).padStart(7,'0');
  if (pl) pl.textContent = String(gameLevel).padStart(2,'0');
  if (pv) pv.textContent = String(Math.max(0,virusLeft)).padStart(2,'0');
  const mnc = document.getElementById('pill-mobile-next');
  if (!mnc) return;
  const mc = mnc.getContext('2d');
  mc.fillStyle = '#000018'; mc.fillRect(0,0,mnc.width,mnc.height);
  if (nextCap) {
    const nc = Math.round(mnc.height * 0.85);
    const ox = Math.round((mnc.width - nc*2) / 2);
    const oy = Math.round((mnc.height - nc) / 2);
    const rr = Math.max(2, Math.round(nc * 0.18));
    mc.fillStyle = FILL[nextCap.colors[0]];
    mc.beginPath(); mc.roundRect(ox+1, oy+1, nc-2, nc-2, rr); mc.fill();
    mc.fillStyle = LITE[nextCap.colors[0]];
    mc.fillRect(ox+2, oy+2, nc-5, 1); mc.fillRect(ox+2, oy+2, 1, nc-5);
    mc.fillStyle = FILL[nextCap.colors[1]];
    mc.beginPath(); mc.roundRect(ox+nc+1, oy+1, nc-2, nc-2, rr); mc.fill();
    mc.fillStyle = LITE[nextCap.colors[1]];
    mc.fillRect(ox+nc+2, oy+2, nc-5, 1); mc.fillRect(ox+nc+2, oy+2, 1, nc-5);
  }
}

function drawPause() {
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,CW,CH);
  const mx = BX + COLS*CELL/2;
  const my = BY + ROWS*CELL/2;
  const f1 = Math.round(CELL*0.9), f2 = Math.round(CELL*0.45);
  ctx.fillStyle='#fff'; ctx.font=`${f1}px "Press Start 2P"`; ctx.textAlign='center';
  ctx.fillText('PAUSE', mx, my-f1*0.3);
  if (!isMobile) {
    ctx.fillStyle='#888'; ctx.font=`${f2}px "Press Start 2P"`;
    ctx.fillText('P / ENTER : RESUME', mx, my+f1*0.9);
    ctx.fillText('ESC : QUIT TO TITLE', mx, my+f1*0.9+f2*1.6);
  }
}

function drawLevelClear() {
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,CW,CH);
  const mx = BX + COLS*CELL/2;
  const my = BY + ROWS*CELL/2;
  const f1 = Math.round(CELL*0.9), f2 = Math.round(CELL*0.45);
  ctx.fillStyle='#0f0'; ctx.font=`${f1}px "Press Start 2P"`; ctx.textAlign='center';
  ctx.shadowColor='#0f0'; ctx.shadowBlur=14;
  ctx.fillText('STAGE', mx, my-f1*1.1);
  ctx.fillText('CLEAR!', mx, my-f1*0.1);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ff0'; ctx.font=`${f2}px "Press Start 2P"`;
  ctx.fillText('LEVEL ' + gameLevel + ' COMPLETE', mx, my+f1*0.9);
  ctx.fillStyle='#0cf';
  ctx.fillText('SCORE: ' + score, mx, my+f1*0.9+f2*1.6);
  if (lcTimer > 1600) {
    ctx.fillStyle=Math.floor(lcTimer/400)%2===0?'#fff':'#555';
    ctx.fillText(gameLevel>=20?'CONGRATULATIONS!':'PRESS ANY KEY', mx, my+f1*0.9+f2*3.4);
  }
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,CW,CH);
  const mx = BX + COLS*CELL/2;
  const my = BY + ROWS*CELL/2;
  const f1 = Math.round(CELL*0.9), f2 = Math.round(CELL*0.45);
  ctx.fillStyle='#f44'; ctx.font=`${f1}px "Press Start 2P"`; ctx.textAlign='center';
  ctx.shadowColor='#f44'; ctx.shadowBlur=14;
  ctx.fillText('GAME', mx, my-f1*1.1);
  ctx.fillText('OVER', mx, my-f1*0.1);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ff0'; ctx.font=`${f2}px "Press Start 2P"`;
  ctx.fillText('SCORE: ' + score, mx, my+f1*0.9);
  ctx.fillStyle='#0cf';
  ctx.fillText('BEST:  ' + hiScore, mx, my+f1*0.9+f2*1.6);
  ctx.fillStyle=Math.floor(goTimer/480)%2===0?'#ff0':'#664';
  ctx.fillText(isMobile ? 'TAP TO RETRY' : 'PRESS SPACE', mx, my+f1*0.9+f2*3.4);
}

// ── Main render ───────────────────────────────────────────
function draw() {
  ctx.textAlign='center';
  if (STATE==='TITLE')      { drawTitle(); }
  else if (STATE==='OPENING') { drawOpening(); }
  else {
    drawGame();
    if (STATE==='PAUSE')      drawPause();
    if (STATE==='LEVELCLEAR') drawLevelClear();
    if (STATE==='GAMEOVER')   drawGameOver();
  }
}

// ── Game loop ─────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min(80, ts - lastTS);
  lastTS = ts;

  if (STATE==='TITLE')      titleTimer += dt;
  if (STATE==='OPENING')    openTimer  += dt;
  if (STATE==='GAMEOVER')   goTimer    += dt;
  if (STATE==='LEVELCLEAR') lcTimer    += dt;

  if (STATE==='PLAYING' && !clearing && cap) {
    fallTimer += dt;
    if (fallTimer >= fallInterval) {
      fallTimer = 0;
      if (!moveCap(1,0)) lockCap();
    }
  }

  if (clearing) {
    clearFlash++;
    if (clearFlash >= 28) finishClear();
  }

  draw();
  requestAnimationFrame(loop);
}

// ── Keyboard input ────────────────────────────────────────
// ── Keyboard input ─────────────────────────────────────────
const DAS_DELAY = 150;  // ms before auto-repeat starts
const DAS_REPEAT = 50;  // ms between repeats
let dasTimer = null;
let dasRepeat = null;

function dasStart(fn) {
  fn();
  clearTimeout(dasTimer); clearInterval(dasRepeat);
  dasTimer = setTimeout(() => { dasRepeat = setInterval(fn, DAS_REPEAT); }, DAS_DELAY);
}
function dasStop() {
  clearTimeout(dasTimer); clearInterval(dasRepeat);
  dasTimer = null; dasRepeat = null;
}

window.addEventListener('keydown', e => {
  // Resume AudioContext on every interaction (browser autoplay policy)
  if (AC.state==='suspended') {
    AC.resume().then(() => {
      // If still on title after AC resumes and nothing is playing, start title BGM
      if (STATE==='TITLE' && !musicHandle) playMelody(MELODY_T);
    });
  }

  if (STATE==='TITLE') {
    if (e.code==='Space'||e.code==='Enter') { startNewGame(); return; }
  }
  if (STATE==='GAMEOVER' && (e.code==='Space'||e.code==='Enter'||e.code==='Escape')) {
    goToTitle(); return;
  }
  if (STATE==='LEVELCLEAR' && lcTimer > 1600) { advanceLevel(); return; }
  if (STATE==='PAUSE') {
    if (e.code==='Escape') { goToTitle(); return; }
    if (e.code==='KeyP'||e.code==='Space'||e.code==='Enter') {
      STATE='PLAYING'; playMelody(gameLevel>=11?MELODY_A:MELODY_B);
    }
    return;
  }
  if (STATE!=='PLAYING') return;
  if (e.code==='Escape') { goToTitle(); return; }
  if (e.code==='KeyP') { STATE='PAUSE'; stopMusic(); return; }
  if (!cap||clearing) return;
  if (e.code==='ArrowLeft')  { e.preventDefault(); dasStart(()=>moveCap(0,-1)); return; }
  if (e.code==='ArrowRight') { e.preventDefault(); dasStart(()=>moveCap(0,1));  return; }
  if (e.code==='ArrowDown')  { e.preventDefault(); dasStart(()=>{ if(moveCap(1,0)){fallTimer=0;score+=1;} }); return; }
  if (e.code==='ArrowUp'||e.code==='KeyX') rotateCap(1);
  if (e.code==='KeyZ') rotateCap(-1);
  if (e.code==='Space') hardDrop();
  e.preventDefault();
});

window.addEventListener('keyup', e => {
  if (e.code==='ArrowLeft'||e.code==='ArrowRight'||e.code==='ArrowDown') dasStop();
});

// ── Mobile buttons ────────────────────────────────────────
const DEBOUNCE_MS = 120;
function mBtn(id, onDown, onUp) {
  const el = document.getElementById(id);
  if (!el) return;
  const fn = (e) => {
    e.preventDefault();
    if (AC.state==='suspended') AC.resume();
    onDown();
  };
  el.addEventListener('touchstart', fn, {passive:false});
  if (onUp) el.addEventListener('touchend', e=>{e.preventDefault();onUp();},{passive:false});
  // Also mouse for desktop testing
  el.addEventListener('mousedown', fn);
  if (onUp) el.addEventListener('mouseup', onUp);
}
let leftHeld=false, rightHeld=false, downHeld=false;
let moveInterval=null;
let moveDelay=null;

function startHold(fn) {
  fn(); // fire once immediately
  clearTimeout(moveDelay); clearInterval(moveInterval);
  moveDelay = setTimeout(() => {
    moveInterval = setInterval(fn, 100); // auto-repeat after delay
  }, 200); // DAS delay
}
function stopHold() {
  clearTimeout(moveDelay); clearInterval(moveInterval);
  moveDelay = null; moveInterval = null;
}

function unlockOrStart() {
  if (STATE!=='TITLE') return false;
  if (AC.state==='suspended') {
    AC.resume().then(() => startNewGame());
  } else {
    startNewGame();
  }
  return true;
}

mBtn('mbtn-left',  ()=>{ if(STATE==='PLAYING'&&cap&&!clearing){startHold(()=>moveCap(0,-1));} }, stopHold);
mBtn('mbtn-right', ()=>{ if(STATE==='PLAYING'&&cap&&!clearing){startHold(()=>moveCap(0,1));} }, stopHold);
mBtn('mbtn-down',  ()=>{ if(STATE==='PLAYING'&&cap&&!clearing){startHold(()=>{if(moveCap(1,0)){fallTimer=0;score+=1;}});} }, stopHold);
mBtn('mbtn-up',    ()=>{ if(unlockOrStart()) return; if(STATE==='PLAYING'&&cap&&!clearing)rotateCap(1); });
mBtn('mbtn-drop',  ()=>{
  if(unlockOrStart()) return;
  if(STATE==='GAMEOVER'){goToTitle();return;}
  if(STATE==='LEVELCLEAR'&&lcTimer>1600){advanceLevel();return;}
  if(STATE==='PLAYING')hardDrop();
});
mBtn('mbtn-pause', ()=>{
  if(STATE==='PLAYING'){STATE='PAUSE';stopMusic();}
  else if(STATE==='PAUSE'){STATE='PLAYING';playMelody(gameLevel>=11?MELODY_A:MELODY_B);}
});

// ── Init ─────────────────────────────────────────────────
computeLayout();
requestAnimationFrame(()=>requestAnimationFrame(computeLayout));
window.addEventListener('resize', computeLayout);
requestAnimationFrame(ts => { lastTS = ts; requestAnimationFrame(loop); });

// Unified click handler — 'click' fires exactly once on both desktop and mobile
function handleInteract(e) {
  if (e.target.closest && e.target.closest('#mobile-controls')) return;
  if (STATE==='TITLE') {
    if (AC.state==='suspended') {
      AC.resume().then(() => startNewGame());
    } else {
      startNewGame();
    }
    return;
  }
  if (STATE==='GAMEOVER') { goToTitle(); return; }
  if (STATE==='LEVELCLEAR' && lcTimer > 1600) { advanceLevel(); return; }
}
window.addEventListener('click', handleInteract);
</script>
