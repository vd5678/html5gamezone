<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="font" href="https://fonts.gstatic.com/s/pressstart2p/v16/e3t4euO8T-267oIAQAu6jDQyK0nR.woff2" type="font/woff2" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <title>Puzzle Bobble</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#1a1a1a; display:flex; flex-direction:column;
      align-items:center; justify-content:center; min-height:100vh;
      font-family:'Press Start 2P','Courier New',monospace;
    }
    #game-container {
      display:flex; flex-direction:column; align-items:center;
    }
    #hud {
      display:flex; justify-content:space-between; align-items:center;
      width:300px; background:#111; padding:5px 10px; font-size:8px; color:#ccc;
      border:2px solid #333; border-bottom:none; border-radius:4px 4px 0 0;
      white-space:nowrap; height:30px;
    }
    #game-wrapper { position:relative; border:2px solid #333; line-height:0; }
    canvas { display:block; cursor:crosshair; }

    /* ── Mobile: scale up to fill screen ── */
    @media (max-width:600px) {
      body { justify-content:flex-start; padding-top:0; }
      #game-container {
        /* scale the whole container so total height fits viewport */
        transform-origin: top center;
        /* actual scaling calculated by JS; fallback below */
      }
    }
  </style>
</head>
<body>
<div style="position:absolute;visibility:hidden;font-family:'Press Start 2P';font-size:4px">.</div>
<div id="game-container">
<div id="hud">
  <span>LV <span id="h-lv">1</span></span>
  <span>SCORE: <span id="h-score">0</span></span>
  <span>❤ <span id="h-lives">3</span></span>
</div>
<div id="game-wrapper">
  <canvas id="canvas" style="width:300px;height:480px;"></canvas>
</div>
</div>
<script>
'use strict';
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const W = 300, H = 480;

// ── HiDPI / Retina support ────────────────────
const DPR = Math.min(window.devicePixelRatio || 1, 3); // cap at 3× to save memory
canvas.width  = Math.round(W * DPR);
canvas.height = Math.round(H * DPR);
ctx.scale(DPR, DPR);

// ── Grid constants ────────────────────────────
const WALL_L = 10, WALL_R = 290;    // wall inner edges
const BR = 14, DIA = 28;             // bubble radius, diameter
const ROW_H = Math.round(BR * Math.sqrt(3)); // =24 (hex row height)
const GX0   = 38;                    // center-x of row-0 col-0 bubble
const GY0   = 22;                    // center-y of row-0 bubbles
const CEIL_Y = GY0 - BR;             // =8 (ceiling)
const MAX_ROWS   = 15;
const DANGER_ROW = 12;               // game over if bubble placed here
const CANNON_X = W >> 1;             // 150
const CANNON_Y = H - 60;             // 420

// ── Palette ─────────────────────────────────────────────
const PAL   = ['#e84040','#f07020','#e8e020','#40c040','#3068e0','#9040d0'];
const PAL_D = ['#901010','#a84010','#a0a000','#108010','#1038a0','#5a0098'];
const PAL_L = ['#ffaaaa','#ffcc88','#ffff88','#aaffaa','#88aaff','#dd88ff'];
const C2N   = {r:0,o:1,y:2,g:3,b:4,p:5};

// ── Level data ───────────────────────────────────────────
// even rows → 9 chars, odd rows → 8 chars, '.' = empty
const LEVELS = [
  // 1: rainbow stripes
  ['rrrrrrrrr','oooooooo','yyyyyyyyy','gggggggg','bbbbbbbbb'],
  // 2: columns
  ['rrooyygbb','rooyygbb','rrooyygbb','rooyygbb','rrooyygbb','rooyygbb'],
  // 3: checkerboard
  ['rgrgrgrgg','grgrgrg.','rgrgrgrgg','grgrgrg.','bypbyp.bb','bypbyp..','bbbbbbbbb','bbbbbbbb'],
  // 4: clustered
  ['rrroooppp','rroooppp','rrrooopp.','rrooop..','yyyyyyyyy','yyggyyyy','yyggggyyy','ygggggyy'],
  // 5: chaos
  ['rpgborypp','pgborypp','rpgboryyy','pgboryyy','rrrooobbb','rrooobbb','oobbpprrr','obbpprrr'],
];

// ── Audio ────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function unlockAudio() { if (AC.state === 'suspended') AC.resume(); }
function beep(f0, f1, type, dur, vol) {
  try {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = type;
    o.frequency.setValueAtTime(f0, AC.currentTime);
    if (f1) o.frequency.exponentialRampToValueAtTime(f1, AC.currentTime + dur);
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
    o.start(); o.stop(AC.currentTime + dur);
  } catch(e){}
}
const sfx = {
  shoot:   () => beep(500, 700, 'square',   0.07, 0.10),
  bounce:  () => beep(300, 300, 'square',   0.04, 0.05),
  snap:    () => beep(220, 220, 'sine',     0.04, 0.07),
  pop:     () => { beep(880,1320,'sine',0.12,0.18); setTimeout(()=>beep(660,440,'sine',0.09,0.12),55); },
  drop:    () => beep(350, 80,  'sawtooth', 0.18, 0.14),
  clear:   () => [523,659,784,1047].forEach((f,i) => setTimeout(()=>beep(f,f*1.01,'triangle',0.2,0.2),i*90)),
  die:     () => [440,330,220,110].forEach((f,i) => setTimeout(()=>beep(f,f*0.8,'sawtooth',0.12,0.2),i*100)),
  gameover:() => beep(220,55,'sawtooth',1.0,0.3),
};

// ── BGM: Vivaldi – The Four Seasons "Spring" Op.8 No.1  public domain ──
const BPM  = 160;   // Allegro
const BEAT = 60 / BPM;
const N = {
  _:0,
  E3:164.81, A3:220.00, B3:246.94,
  E4:329.63, Fs4:369.99, Gs4:415.30, A4:440.00, B4:493.88,
  Cs5:554.37, Ds5:622.25, E5:659.25, Fs5:739.99, Gs5:830.61, A5:880.00, B5:987.77, Cs6:1108.73,
};

// Melody – main ritornello theme + development (4/4, eighth=0.5)
const BGM_MELODY = [
  // ── Ritornello A ──────────────────────────────
  [N.E5,0.5],[N.E5,0.5],[N.E5,0.5],[N.E5,0.5],   // m1  E E E E
  [N.Cs5,0.5],[N.B4,0.5],[N.A4,0.5],[N.B4,0.5],  // m2  Cs B A B
  [N.E5,0.5],[N.E5,0.5],[N.E5,0.5],[N.E5,0.5],   // m3  repeat
  [N.Cs5,0.5],[N.B4,0.5],[N.A4,1.0],             // m4  Cs B A.
  // ── Phrase B ──────────────────────────────────
  [N.Fs5,0.5],[N.E5,0.5],[N.Ds5,0.5],[N.Cs5,0.5],// m5  Fs E Ds Cs
  [N.B4,0.5],[N.Cs5,0.5],[N.Ds5,0.5],[N.E5,0.5], // m6  B Cs Ds E
  [N.A4,0.5],[N.B4,0.5],[N.Cs5,0.5],[N.B4,0.5],  // m7  A B Cs B
  [N.A4,1.0],[N.E5,0.5],[N.E5,0.5],              // m8  A. | E E
  // ── Phrase C (upper) ──────────────────────────
  [N.A5,0.5],[N.Gs5,0.5],[N.Fs5,0.5],[N.E5,0.5], // m9  A Gs Fs E
  [N.Ds5,0.5],[N.Cs5,0.5],[N.B4,0.5],[N.A4,0.5], // m10 Ds Cs B A
  [N.B4,0.5],[N.Cs5,0.5],[N.Ds5,0.5],[N.E5,0.5], // m11 B Cs Ds E
  [N.E5,1.0],[N.E5,0.5],[N.E5,0.5],              // m12 E. | E E
  // ── Phrase D (ornament run) ────────────────────
  [N.Gs5,0.5],[N.Fs5,0.5],[N.E5,0.5],[N.Ds5,0.5],// m13 Gs Fs E Ds
  [N.Cs5,0.5],[N.B4,0.5],[N.A4,0.5],[N.Gs4,0.5], // m14 Cs B A Gs
  [N.Fs4,0.5],[N.Gs4,0.5],[N.A4,0.5],[N.B4,0.5], // m15 Fs Gs A B
  [N.E4,1.0],[N.E5,0.5],[N.E5,0.5],              // m16 E. | back home
];

// Arpeggio – 8th notes, chords: I=E, IV=A, V=B (E major)
const BGM_ARP = [
  // m1-4  I
  [N.E4,0.5],[N.Gs4,0.5],[N.B4,0.5],[N.Gs4,0.5],[N.E4,0.5],[N.Gs4,0.5],[N.B4,0.5],[N.Gs4,0.5],
  [N.E4,0.5],[N.Gs4,0.5],[N.B4,0.5],[N.Gs4,0.5],[N.E4,0.5],[N.Gs4,0.5],[N.B4,0.5],[N.Gs4,0.5],
  [N.E4,0.5],[N.Gs4,0.5],[N.B4,0.5],[N.Gs4,0.5],[N.E4,0.5],[N.Gs4,0.5],[N.B4,0.5],[N.Gs4,0.5],
  [N.E4,0.5],[N.Gs4,0.5],[N.B4,0.5],[N.Gs4,0.5],[N.E4,0.5],[N.Gs4,0.5],[N.B4,0.5],[N.Gs4,0.5],
  // m5-8  V→IV→I
  [N.B3,0.5],[N.Ds5,0.5],[N.Fs5,0.5],[N.Ds5,0.5],[N.B3,0.5],[N.Ds5,0.5],[N.Fs5,0.5],[N.Ds5,0.5],
  [N.B3,0.5],[N.Ds5,0.5],[N.Fs5,0.5],[N.Ds5,0.5],[N.B3,0.5],[N.Ds5,0.5],[N.Fs5,0.5],[N.Ds5,0.5],
  [N.A3,0.5],[N.Cs5,0.5],[N.E5,0.5],[N.Cs5,0.5],[N.A3,0.5],[N.Cs5,0.5],[N.E5,0.5],[N.Cs5,0.5],
  [N.A3,0.5],[N.Cs5,0.5],[N.E5,0.5],[N.Cs5,0.5],[N.A3,0.5],[N.Cs5,0.5],[N.E5,0.5],[N.Cs5,0.5],
  // m9-12  IV→V→I
  [N.A3,0.5],[N.Cs5,0.5],[N.E5,0.5],[N.Cs5,0.5],[N.A3,0.5],[N.Cs5,0.5],[N.E5,0.5],[N.Cs5,0.5],
  [N.A3,0.5],[N.Cs5,0.5],[N.E5,0.5],[N.Cs5,0.5],[N.A3,0.5],[N.Cs5,0.5],[N.E5,0.5],[N.Cs5,0.5],
  [N.B3,0.5],[N.Ds5,0.5],[N.Fs5,0.5],[N.Ds5,0.5],[N.B3,0.5],[N.Ds5,0.5],[N.Fs5,0.5],[N.Ds5,0.5],
  [N.E4,0.5],[N.Gs4,0.5],[N.B4,0.5],[N.Gs4,0.5],[N.E4,0.5],[N.Gs4,0.5],[N.B4,0.5],[N.Gs4,0.5],
  // m13-16  I→IV→V→I
  [N.E4,0.5],[N.Gs4,0.5],[N.B4,0.5],[N.Gs4,0.5],[N.E4,0.5],[N.Gs4,0.5],[N.B4,0.5],[N.Gs4,0.5],
  [N.A3,0.5],[N.Cs5,0.5],[N.E5,0.5],[N.Cs5,0.5],[N.A3,0.5],[N.Cs5,0.5],[N.E5,0.5],[N.Cs5,0.5],
  [N.B3,0.5],[N.Ds5,0.5],[N.Fs5,0.5],[N.Ds5,0.5],[N.B3,0.5],[N.Ds5,0.5],[N.Fs5,0.5],[N.Ds5,0.5],
  [N.E4,0.5],[N.Gs4,0.5],[N.B4,0.5],[N.Gs4,0.5],[N.E4,0.5],[N.Gs4,0.5],[N.B4,0.5],[N.Gs4,0.5],
];

// Bass – quarter notes, root movement
const BGM_BASS = [
  [N.E3,1],[N.E3,1],[N.E3,1],[N.E3,1],  // m1-4  I
  [N.B3,1],[N.B3,1],[N.A3,1],[N.A3,1],  // m5-8  V IV
  [N.A3,1],[N.A3,1],[N.B3,1],[N.E3,1],  // m9-12 IV V I
  [N.E3,1],[N.A3,1],[N.B3,1],[N.E3,1],  // m13-16 I IV V I
];

const bgm = (() => {
  let mGain, aGain, bGain, masterGain;
  let melodyIdx = 0, arpIdx = 0, bassIdx = 0;
  let nextMelodyTime = 0, nextArpTime = 0, nextBassTime = 0;
  let schedId = null;
  let running = false;

  function init() {
    masterGain = AC.createGain(); masterGain.gain.value = 0.18;
    masterGain.connect(AC.destination);
    mGain = AC.createGain(); mGain.gain.value = 0.55; mGain.connect(masterGain);
    aGain = AC.createGain(); aGain.gain.value = 0.25; aGain.connect(masterGain);
    bGain = AC.createGain(); bGain.gain.value = 0.40; bGain.connect(masterGain);
  }

  function scheduleNote(freq, startTime, dur, gainNode, type) {
    if (!freq) return;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0.001, startTime);
    g.gain.linearRampToValueAtTime(1, startTime + 0.008);
    g.gain.setValueAtTime(1, startTime + dur * BEAT * 0.60);
    g.gain.linearRampToValueAtTime(0.001, startTime + dur * BEAT * 0.88);
    o.connect(g); g.connect(gainNode);
    o.start(startTime); o.stop(startTime + dur * BEAT);
  }

  function schedule() {
    if (!running) return;
    const ahead = AC.currentTime + 0.4;
    while (nextMelodyTime < ahead) {
      const [f, d] = BGM_MELODY[melodyIdx % BGM_MELODY.length];
      scheduleNote(f, nextMelodyTime, d, mGain, 'square');
      nextMelodyTime += d * BEAT;
      melodyIdx++;
    }
    while (nextArpTime < ahead) {
      const [f, d] = BGM_ARP[arpIdx % BGM_ARP.length];
      scheduleNote(f, nextArpTime, d, aGain, 'sine');
      nextArpTime += d * BEAT;
      arpIdx++;
    }
    while (nextBassTime < ahead) {
      const [f, d] = BGM_BASS[bassIdx % BGM_BASS.length];
      scheduleNote(f, nextBassTime, d, bGain, 'triangle');
      nextBassTime += d * BEAT;
      bassIdx++;
    }
    schedId = setTimeout(schedule, 100);
  }

  return {
    start() {
      if (running) return;
      if (!masterGain) init();
      running = true;
      melodyIdx = 0; arpIdx = 0; bassIdx = 0;
      nextMelodyTime = AC.currentTime + 0.05;
      nextArpTime    = AC.currentTime + 0.05;
      nextBassTime   = AC.currentTime + 0.05;
      schedule();
    },
    stop() {
      running = false;
      clearTimeout(schedId);
    },
    setVol(v) { if (masterGain) masterGain.gain.value = v; },
  };
})();

// ── State variables ──────────────────────────────────────
let grid;           // grid[row][col] = colorIndex | null
let bullet;         // { x,y,vx,vy,color,active } | null
let nextColor;      // upcoming bubble color
let cannonAngle = -Math.PI / 2;
let score, lives, lv;
let drops = [];     // falling bubble animations
let pops  = [];     // pop particles
let flashMsg = '';
let flashTimer = 0;
let transTimer = 0;
let STATE = 'title';   // title | playing | clear | dead | gameover
let prevTs = 0;
let rafId  = 0;

// ── Grid helpers ─────────────────────────────────────────
function colCount(r) { return r % 2 === 0 ? 9 : 8; }
function bXY(r, c) {
  return {
    x: GX0 + c * DIA + (r % 2 ? BR : 0),
    y: GY0 + r * ROW_H,
  };
}
function neighbors(r, c) {
  const odd = r % 2;
  return [
    [r, c-1], [r, c+1],
    [r-1, odd ? c : c-1], [r-1, odd ? c+1 : c],
    [r+1, odd ? c : c-1], [r+1, odd ? c+1 : c],
  ].filter(([nr,nc]) => nr>=0 && nr<MAX_ROWS && nc>=0 && nc<colCount(nr));
}
function initGrid() {
  grid = Array.from({length: MAX_ROWS}, (_,r) => Array(colCount(r)).fill(null));
}
function loadLevel(n) {
  initGrid();
  const rows = LEVELS[(n - 1) % LEVELS.length];
  rows.forEach((rowStr, r) => {
    [...rowStr].forEach((ch, c) => {
      if (c < colCount(r) && ch !== '.') grid[r][c] = C2N[ch] ?? null;
    });
  });
}
function randomColor() {
  const present = new Set();
  for (let r = 0; r < MAX_ROWS; r++)
    for (let c = 0; c < colCount(r); c++)
      if (grid[r][c] !== null) present.add(grid[r][c]);
  const pool = present.size > 0 ? [...present] : [...Array(6).keys()];
  return pool[Math.floor(Math.random() * pool.length)];
}
function isGridEmpty() {
  return grid.every(row => row.every(v => v === null));
}

// ── Snap ─────────────────────────────────────────────────
function findSnapCell(bx, by) {
  // Direct coordinate conversion first
  let r = Math.round((by - GY0) / ROW_H);
  r = Math.max(0, Math.min(MAX_ROWS - 1, r));
  const offset = r % 2 ? BR : 0;
  let c = Math.round((bx - GX0 - offset) / DIA);
  c = Math.max(0, Math.min(colCount(r) - 1, c));
  if (grid[r][c] === null) return [r, c];
  // Try neighbors of that cell
  for (const [nr, nc] of neighbors(r, c))
    if (grid[nr][nc] === null) return [nr, nc];
  // Brute-force nearest empty
  let best = null, bestDist = Infinity;
  for (let rr = 0; rr < MAX_ROWS; rr++)
    for (let cc = 0; cc < colCount(rr); cc++) {
      if (grid[rr][cc] !== null) continue;
      const {x,y} = bXY(rr,cc);
      const d = Math.hypot(bx-x, by-y);
      if (d < bestDist) { bestDist = d; best = [rr,cc]; }
    }
  return best;
}

// ── Match / float detection ───────────────────────────────
function findMatch(r, c) {
  const color = grid[r][c];
  if (color === null) return [];
  const visited = new Set([`${r},${c}`]), queue = [[r,c]];
  while (queue.length) {
    const [cr,cc] = queue.shift();
    for (const [nr,nc] of neighbors(cr,cc)) {
      const key = `${nr},${nc}`;
      if (!visited.has(key) && grid[nr][nc] === color) {
        visited.add(key); queue.push([nr,nc]);
      }
    }
  }
  return [...visited].map(k => k.split(',').map(Number));
}
function findFloating() {
  const connected = new Set();
  const queue = [];
  for (let c = 0; c < colCount(0); c++)
    if (grid[0][c] !== null) { connected.add(`0,${c}`); queue.push([0,c]); }
  while (queue.length) {
    const [r,c] = queue.shift();
    for (const [nr,nc] of neighbors(r,c)) {
      const key = `${nr},${nc}`;
      if (!connected.has(key) && grid[nr][nc] !== null) {
        connected.add(key); queue.push([nr,nc]);
      }
    }
  }
  const fl = [];
  for (let r = 0; r < MAX_ROWS; r++)
    for (let c = 0; c < colCount(r); c++)
      if (grid[r][c] !== null && !connected.has(`${r},${c}`)) fl.push([r,c]);
  return fl;
}

// ── Particles ────────────────────────────────────────────
function spawnPop(x, y, color) {
  for (let i=0;i<12;i++) {
    const a = Math.random()*Math.PI*2, spd = 1.5 + Math.random()*3;
    pops.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd - 1,color,life:1,size:2+Math.random()*3});
  }
}

// ── Place bubble after travel ─────────────────────────────
function placeBullet(bx, by, bColor) {
  const snap = findSnapCell(bx, by);
  if (!snap) { loseLife(); return; }
  const [sr, sc] = snap;
  grid[sr][sc] = bColor;
  sfx.snap();

  if (sr >= DANGER_ROW) { grid[sr][sc] = null; loseLife(); return; }

  const matched = findMatch(sr, sc);
  if (matched.length >= 3) {
    sfx.pop();
    matched.forEach(([r,c]) => {
      const {x,y} = bXY(r,c); spawnPop(x,y,grid[r][c]);
      score += 10 * lv;
      grid[r][c] = null;
    });
    const floating = findFloating();
    if (floating.length) {
      sfx.drop();
      floating.forEach(([r,c]) => {
        const {x,y} = bXY(r,c);
        drops.push({x,y,color:grid[r][c],vy:-1,vx:(Math.random()-.5)*2,life:1});
        spawnPop(x,y,grid[r][c]);
        score += 20 * lv;
        grid[r][c] = null;
      });
      flashMsg = 'DROP x' + floating.length + '!';
      flashTimer = 1400;
    }
    updateHUD();
    if (isGridEmpty()) { sfx.clear(); STATE='clear'; transTimer=2000; return; }
  }

  setTimeout(() => {
    if (STATE === 'playing') spawnBullet();
  }, 250);
}

// ── Bullet spawn / shoot ─────────────────────────────────
function spawnBullet() {
  if (STATE !== 'playing') return;
  bullet = { x: CANNON_X, y: CANNON_Y, vx:0, vy:0, color: nextColor, active: false };
  nextColor = randomColor();
}
function shoot() {
  if (!bullet || bullet.active || STATE !== 'playing') return;
  unlockAudio();
  const spd = 6;
  bullet.vx = Math.cos(cannonAngle) * spd;
  bullet.vy = Math.sin(cannonAngle) * spd;
  bullet.active = true;
  sfx.shoot();
}

// ── Aim limits (upward cone only) ───────────────────────
const ANGLE_MIN = -(Math.PI - 0.25);  // ≈ −2.89 rad, upper-left dead stop
const ANGLE_MAX = -0.25;              // ≈ −0.25 rad, upper-right dead stop
function clampAngle(a) { return Math.max(ANGLE_MIN, Math.min(ANGLE_MAX, a)); }

let kbInput = false;   // true briefly after arrow key; suppresses mousemove
let kbTimer = 0;

function setAim(mx, my) {
  if (STATE !== 'playing') return;
  if (kbInput) return;                // keyboard has priority
  let a = Math.atan2(my - CANNON_Y, mx - CANNON_X);
  if (Math.sin(a) > Math.sin(ANGLE_MAX)) {
    a = mx < CANNON_X ? ANGLE_MIN : ANGLE_MAX;
  }
  cannonAngle = clampAngle(a);
}

// ── HUD ──────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('h-lv').textContent    = lv;
  document.getElementById('h-score').textContent = score;
  document.getElementById('h-lives').textContent = lives;
}

// ── Game flow ─────────────────────────────────────────────
function loseLife() {
  lives--;
  updateHUD();
  sfx.die();
  bullet = null;
  if (lives <= 0) {
    bgm.stop();
    STATE = 'gameover'; transTimer = 3000;
    sfx.gameover();
  } else {
    STATE = 'dead'; transTimer = 1500;
  }
}

function startGame() {
  score = 0; lives = 3; lv = 1;
  cannonAngle = -Math.PI / 2;
  drops = []; pops = [];
  loadLevel(lv);
  nextColor = randomColor();
  STATE = 'playing';   // must be set before spawnBullet
  spawnBullet();
  updateHUD();
  bgm.start();
}

function nextLevel() {
  lv++;
  drops = []; pops = [];
  loadLevel(lv);
  cannonAngle = -Math.PI / 2;
  nextColor = randomColor();
  STATE = 'playing';   // must be set before spawnBullet
  spawnBullet();
  updateHUD();
}

// ── Update ───────────────────────────────────────────────
function update(dt) {
  // Particles
  for (let i = pops.length-1; i>=0; i--) {
    const p = pops[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.08;
    p.life -= dt * 0.0025;
    if (p.life <= 0) pops.splice(i,1);
  }
  for (let i = drops.length-1; i>=0; i--) {
    const d = drops[i];
    d.x += d.vx; d.y += d.vy; d.vy += 0.2;
    d.life -= dt * 0.002;
    if (d.life <= 0 || d.y > H + 30) drops.splice(i,1);
  }
  if (flashTimer > 0) flashTimer -= dt;
  if (kbTimer  > 0) { kbTimer -= dt; if (kbTimer <= 0) kbInput = false; }

  if (STATE === 'dead') {
    transTimer -= dt;
    if (transTimer <= 0) {
      initGrid(); loadLevel(lv);
      cannonAngle = -Math.PI / 2;
      nextColor = randomColor();
      STATE = 'playing';   // must be set before spawnBullet
      spawnBullet();
      return;
    }
    return;
  }
  if (STATE === 'clear') {
    transTimer -= dt;
    if (transTimer <= 0) nextLevel();
    return;
  }
  if (STATE === 'gameover') {
    transTimer -= dt;
    return;
  }
  if (STATE !== 'playing') return;

  if (!bullet || !bullet.active) return;

  // Move bullet
  bullet.x += bullet.vx;
  bullet.y += bullet.vy;

  // Wall bounce
  if (bullet.x - BR < WALL_L)  { bullet.x = WALL_L + BR;  bullet.vx =  Math.abs(bullet.vx); sfx.bounce(); }
  if (bullet.x + BR > WALL_R)  { bullet.x = WALL_R - BR;  bullet.vx = -Math.abs(bullet.vx); sfx.bounce(); }

  // Ceiling hit
  if (bullet.y - BR < CEIL_Y) {
    const bx = bullet.x, by = bullet.y, bc = bullet.color;
    bullet.active = false; bullet = null;
    placeBullet(bx, by, bc);
    return;
  }

  // Collision with grid bubbles
  for (let r = 0; r < MAX_ROWS; r++) {
    for (let c = 0; c < colCount(r); c++) {
      if (grid[r][c] === null) continue;
      const {x,y} = bXY(r,c);
      if (Math.hypot(bullet.x-x, bullet.y-y) < DIA - 1) {
        const bx = bullet.x, by = bullet.y, bc = bullet.color;
        bullet.active = false; bullet = null;
        placeBullet(bx, by, bc);
        return;
      }
    }
  }

  // Ball fell out (shouldn't happen with ceiling, safety)
  if (bullet.y > H + 20) {
    bullet = null;
    setTimeout(() => { if (STATE==='playing') spawnBullet(); }, 250);
  }
}

// ── Draw helpers ─────────────────────────────────────────
function drawBubble(x, y, color, alpha) {
  if (alpha !== undefined) ctx.globalAlpha = alpha;
  const c = PAL[color], cd = PAL_D[color], cl = PAL_L[color];
  // Shadow
  ctx.shadowColor = c; ctx.shadowBlur = 4;
  // Main circle
  ctx.fillStyle = c;
  ctx.beginPath(); ctx.arc(x, y, BR, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  // Dark bottom
  const grd = ctx.createRadialGradient(x, y+BR*0.3, 1, x, y, BR);
  grd.addColorStop(0, cd); grd.addColorStop(1, c);
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(x, y, BR, 0, Math.PI*2); ctx.fill();
  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.ellipse(x - BR*0.28, y - BR*0.3, BR*0.38, BR*0.22, -0.5, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawAimLine() {
  if (!bullet || bullet.active) return;
  let ax = CANNON_X, ay = CANNON_Y;
  let avx = Math.cos(cannonAngle), avy = Math.sin(cannonAngle);
  const step = 4;
  ctx.save();
  ctx.setLineDash([4, 6]);
  ctx.strokeStyle = 'rgba(255,255,255,0.65)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(ax, ay);
  let dotCount = 0;
  for (let i = 0; i < 400; i++) {
    ax += avx * step; ay += avy * step;
    if (ax - BR < WALL_L)  { ax = WALL_L + BR;  avx =  Math.abs(avx); dotCount++; }
    if (ax + BR > WALL_R)  { ax = WALL_R - BR;  avx = -Math.abs(avx); dotCount++; }
    if (ay < CEIL_Y) break;
    ctx.lineTo(ax, ay);
    if (dotCount >= 2) break;
    // Stop if near a grid bubble
    let nearBubble = false;
    for (let r = 0; r < MAX_ROWS && !nearBubble; r++)
      for (let c = 0; c < colCount(r); c++) {
        if (grid[r][c] === null) continue;
        const {x,y} = bXY(r,c);
        if (Math.hypot(ax-x, ay-y) < DIA + 3) { nearBubble = true; break; }
      }
    if (nearBubble) break;
  }
  ctx.stroke();
  ctx.restore();
}

function drawCannon() {
  // Barrel
  ctx.save();
  ctx.translate(CANNON_X, CANNON_Y);
  ctx.rotate(cannonAngle + Math.PI / 2);  // barrel natural dir = up (-y), offset by 90°
  // Barrel shadow
  ctx.fillStyle = '#222';
  ctx.fillRect(-6, -(BR + 18), 12, BR + 18);
  // Barrel body
  const bGrd = ctx.createLinearGradient(-6, 0, 6, 0);
  bGrd.addColorStop(0, '#888'); bGrd.addColorStop(0.5, '#bbb'); bGrd.addColorStop(1, '#666');
  ctx.fillStyle = bGrd;
  ctx.fillRect(-5, -(BR + 16), 10, BR + 16);
  ctx.restore();
  // Base
  ctx.fillStyle = '#444';
  ctx.beginPath(); ctx.arc(CANNON_X, CANNON_Y, BR + 2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#777';
  ctx.beginPath(); ctx.arc(CANNON_X, CANNON_Y, BR, 0, Math.PI*2); ctx.fill();
  // Current bubble in cannon
  if (bullet && !bullet.active)
    drawBubble(CANNON_X, CANNON_Y, bullet.color);
}

function drawNextBubble() {
  if (nextColor === undefined || nextColor === null) return;
  // "NEXT" label + preview bubble, bottom-right area
  ctx.fillStyle = '#555';
  ctx.font = '5px "Press Start 2P",monospace';
  ctx.textAlign = 'left';
  ctx.fillText('NEXT', W - 48, CANNON_Y - 8);
  drawBubble(W - 28, CANNON_Y + 14, nextColor);
}

function drawWalls() {
  // Left wall
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(0, 0, WALL_L, H);
  // Right wall
  ctx.fillRect(WALL_R, 0, W - WALL_R, H);
  // Ceiling
  ctx.fillStyle = '#1e1e2e';
  ctx.fillRect(0, 0, W, CEIL_Y);
  // Danger line
  ctx.save();
  ctx.strokeStyle = 'rgba(255,60,60,0.3)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  const dangerY = GY0 + DANGER_ROW * ROW_H + BR;
  ctx.beginPath(); ctx.moveTo(WALL_L, dangerY); ctx.lineTo(WALL_R, dangerY); ctx.stroke();
  ctx.restore();
}

function drawGrid() {
  for (let r = 0; r < MAX_ROWS; r++)
    for (let c = 0; c < colCount(r); c++) {
      if (grid[r][c] === null) continue;
      const {x,y} = bXY(r,c);
      drawBubble(x, y, grid[r][c]);
    }
}

function drawParticles() {
  ctx.save();
  pops.forEach(p => {
    const sz = Math.max(1, Math.round(p.size * p.life));
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = PAL[p.color];
    ctx.shadowColor = PAL[p.color]; ctx.shadowBlur = 3;
    ctx.fillRect(p.x - sz/2, p.y - sz/2, sz, sz);
  });
  drops.forEach(d => {
    ctx.globalAlpha = Math.max(0, d.life);
    drawBubble(d.x, d.y, d.color);
  });
  ctx.restore();
  ctx.shadowBlur = 0;
}

// ── Full draw ─────────────────────────────────────────────
function draw() {
  // Background
  ctx.fillStyle = '#0d0d18';
  ctx.fillRect(0, 0, W, H);

  drawWalls();

  if (STATE === 'title') {
    drawTitleScreen();
    return;
  }
  if (STATE === 'gameover') {
    drawGameOverScreen();
    return;
  }

  drawGrid();
  drawParticles();
  drawAimLine();
  drawCannon();
  drawNextBubble();

  // Moving bullet
  if (bullet && bullet.active)
    drawBubble(bullet.x, bullet.y, bullet.color);

  // Overlays
  if (STATE === 'clear') {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffe040';
    ctx.textAlign = 'center';
    ctx.font = '12px "Press Start 2P",monospace';
    ctx.shadowColor = '#ffe040'; ctx.shadowBlur = 14;
    ctx.fillText('STAGE CLEAR!', W/2, H/2 - 10);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#aaa';
    ctx.font = '6px "Press Start 2P",monospace';
    ctx.fillText('SCORE: ' + score, W/2, H/2 + 18);
  }
  if (STATE === 'dead') {
    const t = Math.max(0, transTimer / 1500);
    ctx.fillStyle = `rgba(0,0,0,${(0.65 * t).toFixed(2)})`;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = t;
    ctx.fillStyle = '#ff4040';
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 22;
    ctx.textAlign = 'center';
    ctx.font = '18px "Press Start 2P",monospace';
    ctx.fillText('MISS!', W/2, H/2);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
  // Flash message (chain drop, etc.)
  if (flashMsg && flashTimer > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, flashTimer / 500);
    ctx.fillStyle = '#ffe040';
    ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 10;
    ctx.textAlign = 'center';
    ctx.font = '8px "Press Start 2P",monospace';
    ctx.fillText(flashMsg, W/2, CANNON_Y - 40);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawTitleScreen() {
  ctx.textAlign = 'center';
  // Title
  ctx.fillStyle = '#ffe040';
  ctx.shadowColor = '#ffe040'; ctx.shadowBlur = 16;
  ctx.font = '14px "Press Start 2P",monospace';
  ctx.fillText('PUZZLE', W/2, 90);
  ctx.fillText('BOBBLE', W/2, 116);
  ctx.shadowBlur = 0;
  // Sample bubbles decoration
  const bPos = [
    [50,175,0],[90,158,2],[140,175,4],[190,158,1],[240,175,5],
    [70,200,3],[120,185,0],[170,200,2],[220,185,4],
  ];
  bPos.forEach(([x,y,c]) => drawBubble(x,y,c));
  // Blink prompt
  if (Math.floor(Date.now()/600)%2===0) {
    ctx.fillStyle = '#fff';
    ctx.font = '7px "Press Start 2P",monospace';
    ctx.fillText(window.innerWidth<=600 ? '[ TAP TO START ]' : '[ CLICK / ENTER  TO START ]', W/2, 240);
  }
  ctx.fillStyle = '#888';
  ctx.font = '6px "Press Start 2P",monospace';
  if (window.innerWidth <= 600) {
    ctx.fillText('TOUCH & DRAG — AIM', W/2, 296);
    ctx.fillText('RELEASE — FIRE', W/2, 314);
  } else {
    ctx.fillText('MOUSE — AIM    CLICK / SPC — FIRE', W/2, 300);
    ctx.fillText('← → KEYS — FINE ADJUST', W/2, 318);
  }
  ctx.textAlign = 'start';
}

function drawGameOverScreen() {
  ctx.textAlign = 'center';
  ctx.fillStyle = '#e84040';
  ctx.shadowColor = '#e84040'; ctx.shadowBlur = 12;
  ctx.font = '13px "Press Start 2P",monospace';
  ctx.fillText('GAME OVER', W/2, 140);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#aaa';
  ctx.font = '8px "Press Start 2P",monospace';
  ctx.fillText('SCORE: ' + score, W/2, 180);
  ctx.fillText('LEVEL: ' + lv, W/2, 202);
  if (Math.floor(Date.now()/600)%2===0) {
    ctx.fillStyle = '#fff';
    ctx.font = '7px "Press Start 2P",monospace';
    ctx.fillText(window.innerWidth<=600 ? '[ TAP TO RETRY ]' : '[ PRESS ENTER ]', W/2, 250);
  }
  ctx.textAlign = 'start';
}

// ── Game loop ─────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min(ts - prevTs, 50);
  prevTs = ts;
  update(dt);
  draw();
  rafId = requestAnimationFrame(loop);
}

// ── Input ─────────────────────────────────────────────────
function canvasPos(e) {
  const r = canvas.getBoundingClientRect();
  const scaleX = W / r.width, scaleY = H / r.height;
  return {
    x: (e.clientX - r.left) * scaleX,
    y: (e.clientY - r.top)  * scaleY,
  };
}
canvas.addEventListener('mousemove', e => {
  const {x,y} = canvasPos(e);
  setAim(x, y);
});
canvas.addEventListener('click', e => {
  unlockAudio();
  if (STATE === 'title' || STATE === 'gameover') { startGame(); return; }
  if (STATE === 'playing') shoot();
});

// Touch: touchmove aims, touchend shoots
let touchAiming = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); unlockAudio();
  if (STATE === 'title' || STATE === 'gameover') { startGame(); return; }
  if (STATE !== 'playing') return;
  const t = e.touches[0];
  const {x,y} = canvasPos(t);
  setAim(x, y);
  touchAiming = true;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchAiming || STATE !== 'playing') return;
  const {x,y} = canvasPos(e.touches[0]);
  setAim(x, y);
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (touchAiming && STATE === 'playing') shoot();
  touchAiming = false;
}, { passive: false });

// Keyboard
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'Enter': case ' ': case 'ArrowUp':
      e.preventDefault(); unlockAudio();
      if (STATE === 'title' || STATE === 'gameover') startGame();
      else if (STATE === 'playing') shoot();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      if (STATE==='playing') {
        cannonAngle = clampAngle(cannonAngle - 0.06);
        kbInput = true; kbTimer = 600;
      }
      break;
    case 'ArrowRight':
      e.preventDefault();
      if (STATE==='playing') {
        cannonAngle = clampAngle(cannonAngle + 0.06);
        kbInput = true; kbTimer = 600;
      }
      break;
  }
});

// ── Mobile scaling ────────────────────────────────────────
(function scaleGame() {
  const GAME_W = 304;   // 300px canvas + 2px border × 2
  const GAME_H = 514;   // 30px HUD + 2px HUD border-top/sides + 480px canvas + 2px canvas border × 2
  const container = document.getElementById('game-container');
  function resize() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    // Only scale on narrow screens; desktop stays at 1×
    if (vw >= 600) {
      container.style.transform = '';
      container.style.marginTop = '';
      return;
    }
    const scale = Math.min(vw / GAME_W, vh / GAME_H);
    container.style.transformOrigin = 'top center';
    container.style.transform = `scale(${scale.toFixed(4)})`;
    // Push body so scaled container sits at top without gap
    container.style.marginTop = `${Math.max(0, (vh - GAME_H * scale) / 2).toFixed(1)}px`;
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 200));
})();

// ── Boot ──────────────────────────────────────────────────
STATE = 'title';
prevTs = performance.now();
rafId = requestAnimationFrame(loop);
</script>
</body>
