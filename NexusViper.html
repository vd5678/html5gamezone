<script>
'use strict';
try{localStorage.setItem('lastPlayed','NexusViper.html');}catch(e){}
// ── Canvas setup ──────────────────────────────────────────
const CW=320, CH=224;
const DPR=window.devicePixelRatio||1;
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
cv.width=CW*DPR; cv.height=CH*DPR;
cv.style.width=CW+'px'; cv.style.height=CH+'px';
ctx.scale(DPR,DPR);

// Scale wrap to fit screen
function resize(){
  const isTouchDevice=window.matchMedia('(pointer:coarse)').matches;
  const CTRL_H=isTouchDevice?136:0;
  const TOTAL_H=CH+CTRL_H;
  const scaleX=window.innerWidth/CW;
  const scaleY=window.innerHeight/TOTAL_H;
  const s=Math.min(scaleX,scaleY,1.8);
  const wrap=document.getElementById('wrap');
  wrap.style.width=CW+'px';
  wrap.style.height=TOTAL_H+'px';
  wrap.style.transform=`translate(-50%,-50%) scale(${s.toFixed(4)})`;
  const ctrl=document.getElementById('ctrl');
  if(ctrl&&isTouchDevice){
    ctrl.style.height=CTRL_H+'px';
  }
}
window.addEventListener('resize',resize); resize();

// ── Audio ──────────────────────────────────────────────────
let AC=null;
function getAC(){if(!AC){AC=new(window.AudioContext||window.webkitAudioContext)();} return AC;}
function mkComp(ac){
  const c=ac.createDynamicsCompressor();
  c.threshold.value=-12; c.knee.value=6; c.ratio.value=4;
  c.attack.value=0.003; c.release.value=0.15;
  c.connect(ac.destination); return c;
}
let masterBus=null;
function getMaster(){
  const ac=getAC();
  if(!masterBus){masterBus=mkComp(ac);}
  return masterBus;
}
function beep(freq,dur,vol=0.15,type='square',detune=0){
  try{
    const ac=getAC(), g=ac.createGain(), o=ac.createOscillator();
    o.type=type; o.frequency.value=freq; o.detune.value=detune;
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.connect(g); g.connect(getMaster());
    o.start(); o.stop(ac.currentTime+dur);
  }catch(e){}
}
function sndShoot(){beep(880,0.07,0.06,'square')}
function sndExplosion(){
  try{
    const ac=getAC(),buf=ac.createBuffer(1,ac.sampleRate*0.25,ac.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
    const s=ac.createBufferSource(),g=ac.createGain();
    g.gain.setValueAtTime(0.35,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.25);
    s.buffer=buf; s.connect(g); g.connect(getMaster()); s.start();
  }catch(e){}
}
function sndDeath(){
  try{
    const ac=getAC(), master=getMaster();
    // Explosion noise burst
    const buf=ac.createBuffer(1,ac.sampleRate*1.2,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,0.8);
    const s=ac.createBufferSource(),gn=ac.createGain();
    gn.gain.setValueAtTime(0.6,ac.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+1.2);
    s.buffer=buf; s.connect(gn); gn.connect(master); s.start();
    // Descending scale: B4 A4 G4 F4 E4 D4 C4 then down to low rumble
    const scale=[494,440,392,349,330,294,262,220,165,110,82];
    scale.forEach((freq,i)=>{
      const t=ac.currentTime+i*0.1;
      const o=ac.createOscillator(), g2=ac.createGain();
      o.type='square';
      o.frequency.setValueAtTime(freq,t);
      g2.gain.setValueAtTime(0.25,t);
      g2.gain.exponentialRampToValueAtTime(0.001,t+0.18);
      o.connect(g2); g2.connect(master);
      o.start(t); o.stop(t+0.18);
    });
    // Final low fade-out drone
    const o2=ac.createOscillator(), g3=ac.createGain();
    o2.type='sawtooth'; o2.frequency.setValueAtTime(82,ac.currentTime+1.0);
    o2.frequency.exponentialRampToValueAtTime(30,ac.currentTime+2.0);
    g3.gain.setValueAtTime(0.2,ac.currentTime+1.0);
    g3.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+2.0);
    o2.connect(g3); g3.connect(master); o2.start(ac.currentTime+1.0); o2.stop(ac.currentTime+2.0);
  }catch(e){}
}
function sndPowerup(){
  [440,550,660,880].forEach((f,i)=>setTimeout(()=>beep(f,0.1,0.12,'square'),i*60));
}
function sndHit(){beep(220,0.08,0.1,'sawtooth')}
function sndSelect(){beep(660,0.06,0.1,'square')}
function sndExtraLife(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.15,0.12,'square'),i*80))}
function sndLaser(){beep(1200,0.12,0.07,'sawtooth',-200)}
function sndMissile(){beep(330,0.1,0.08,'sawtooth')}
function sndBossHit(){beep(150,0.1,0.2,'sawtooth')}

// BGM
let bgmNodes=[], bgmRunning=false;
const BGM_TEMPO=120; // BPM
const BGM_BEAT=60/BGM_TEMPO;
// Simple looping bass line + melody
const BASS=[
  [110,1],[110,0.5],[138,0.5],[110,1],[110,0.5],[123,0.5],
  [98,1],[98,0.5],[110,0.5],[98,1],[87,1]
];
const MELODY=[
  [440,0.5],[494,0.5],[523,1],[440,0.5],[392,0.5],[440,1],
  [440,0.5],[494,0.5],[523,0.5],[587,0.5],[523,1],[494,0.5],[440,0.5],
  [392,1],[349,0.5],[392,0.5],[440,2]
];
function playBGM(){
  if(bgmRunning)return;
  bgmRunning=true;
  try{
    const ac=getAC(), bus=getMaster();
    function scheduleLoop(){
      if(!bgmRunning)return;
      let t=ac.currentTime+0.05;
      // Bass
      BASS.forEach(([f,dur])=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.type='square'; o.frequency.value=f;
        g.gain.setValueAtTime(0.04,t); g.gain.setValueAtTime(0.001,t+dur*BGM_BEAT*0.9);
        o.connect(g); g.connect(bus); o.start(t); o.stop(t+dur*BGM_BEAT);
        bgmNodes.push(o);
        t+=dur*BGM_BEAT;
      });
      const loopDur=BASS.reduce((a,[,d])=>a+d,0)*BGM_BEAT;
      // Melody (offset slightly)
      let mt=ac.currentTime+0.05;
      MELODY.forEach(([f,dur])=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.type='square'; o.frequency.value=f;
        g.gain.setValueAtTime(0.035,mt); g.gain.setValueAtTime(0.001,mt+dur*BGM_BEAT*0.85);
        o.connect(g); g.connect(bus); o.start(mt); o.stop(mt+dur*BGM_BEAT);
        bgmNodes.push(o);
        mt+=dur*BGM_BEAT;
      });
      const melodyDur=MELODY.reduce((a,[,d])=>a+d,0)*BGM_BEAT;
      const nextLoop=Math.max(loopDur,melodyDur);
      bgmNodes.push(setTimeout(scheduleLoop, nextLoop*1000-100));
    }
    scheduleLoop();
  }catch(e){}
}
function stopBGM(){
  bgmRunning=false;
  bgmNodes.forEach(n=>{try{if(n&&n.stop)n.stop();if(typeof n==='number')clearTimeout(n);}catch(e){}});
  bgmNodes=[];
}

// ── Input ──────────────────────────────────────────────────
const keys={};
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
  if(e.code==='Escape') onEsc();
  if(e.code==='KeyP') onPause();
  if(e.code==='Enter' && overlayVisible()) startGame();
  if(e.code==='KeyX') trySelect();
});;
window.addEventListener('keyup',e=>{keys[e.code]=false;});

// Virtual joystick
const joystickAxis={x:0,y:0}; // normalized -1..1
(()=>{
  const wrap=document.getElementById('joystick-wrap');
  const knob=document.getElementById('joystick-knob');
  if(!wrap)return;
  const RADIUS=36;
  let active=false, tid=null;
  let cx=0, cy=0;
  function cacheCenter(){
    const r=wrap.getBoundingClientRect();
    cx=r.left+r.width/2; cy=r.top+r.height/2;
  }
  function move(clientX,clientY){
    let dx=clientX-cx, dy=clientY-cy;
    const dist=Math.hypot(dx,dy);
    if(dist>RADIUS){dx=dx/dist*RADIUS;dy=dy/dist*RADIUS;}
    knob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
    joystickAxis.x=dx/RADIUS;
    joystickAxis.y=dy/RADIUS;
  }
  function release(){
    active=false; tid=null;
    joystickAxis.x=0; joystickAxis.y=0;
    knob.style.transform='translate(-50%,-50%)';
  }
  wrap.addEventListener('touchstart',e=>{
    e.preventDefault();
    cacheCenter();
    const t=e.changedTouches[0]; tid=t.identifier; active=true;
    move(t.clientX,t.clientY);
  },{passive:false});
  wrap.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){if(t.identifier===tid){move(t.clientX,t.clientY);break;}}
  },{passive:false});
  wrap.addEventListener('touchend',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){if(t.identifier===tid){release();break;}}
  },{passive:false});
  // Mouse fallback for desktop testing
  wrap.addEventListener('mousedown',e=>{cacheCenter();active=true;move(e.clientX,e.clientY);});
  window.addEventListener('mousemove',e=>{if(active)move(e.clientX,e.clientY);});
  window.addEventListener('mouseup',()=>{if(active)release();});
  window.addEventListener('resize',()=>{if(active)cacheCenter();});
})();

// Mobile buttons (fire + select only)
const mobileState={fire:false};
function bindBtn(id,key){
  const el=document.getElementById(id);
  if(!el)return;
  el.addEventListener('touchstart',e=>{e.preventDefault();mobileState[key]=true;if(id==='btn-fire')fireHeld=true;},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();mobileState[key]=false;if(id==='btn-fire')fireHeld=false;},{passive:false});
  el.addEventListener('mousedown',e=>{mobileState[key]=true;if(id==='btn-fire')fireHeld=true;});
  el.addEventListener('mouseup',e=>{mobileState[key]=false;if(id==='btn-fire')fireHeld=false;});
}
bindBtn('btn-fire','fire');

document.getElementById('btn-select')?.addEventListener('touchstart',e=>{e.preventDefault();trySelect();},{passive:false});
document.getElementById('btn-select')?.addEventListener('click',()=>trySelect());
cv.addEventListener('click',()=>{if(gameRunning&&!overlayVisible())onPause();});

let fireHeld=false;

function isUp(){return keys['ArrowUp']||keys['KeyW']||joystickAxis.y<-0.2}
function isDown(){return keys['ArrowDown']||keys['KeyS']||joystickAxis.y>0.2}
function isLeft(){return keys['ArrowLeft']||keys['KeyA']||joystickAxis.x<-0.2}
function isRight(){return keys['ArrowRight']||keys['KeyD']||joystickAxis.x>0.2}
function isFire(){return keys['KeyZ']||keys['Enter']||fireHeld||mobileState.fire}
function trySelect(){if(gameRunning&&!paused){selectPowerup();}}

// ── Overlay ────────────────────────────────────────────────
const overlay=document.getElementById('overlay');
const overlayScore=document.getElementById('overlay-score');
document.getElementById('overlay-btn').addEventListener('click',startGame);
function overlayVisible(){return !overlay.classList.contains('hidden')}
function showOverlay(msg=''){
  overlay.classList.remove('hidden');
  overlayScore.textContent=msg;
  // darken background when showing game-over/score message
  document.getElementById('overlay-inner').style.background=
    msg ? 'rgba(0,4,16,.94)' : 'rgba(0,4,16,.80)';
}
function hideOverlay(){overlay.classList.add('hidden')}
function onEsc(){
  if(gameRunning){
    stopGame();
    const tf=document.getElementById('overlay-title-float');
    tf.textContent='NEXUS VIPER';
    tf.style.position=''; tf.style.top=''; tf.style.fontSize='';
    tf.style.color=''; tf.style.textShadow=''; tf.style.marginBottom='';
    overlay.style.background='transparent';
    overlay.style.justifyContent='space-between';
    document.getElementById('overlay-weapons').style.display='';
    document.querySelector('.desktop-hint').style.display='';
    document.querySelector('.mobile-hint').style.display='';
    document.getElementById('overlay-score').style.display='';
    document.getElementById('overlay-scoretable').style.display='none';
    document.getElementById('overlay-score').style.whiteSpace='';
    document.getElementById('overlay-score').style.fontSize='';
    document.getElementById('overlay-score').style.lineHeight='';
    document.getElementById('overlay-btn').textContent='▶ START';
    score=0; lives=3; stage=1;
    showOverlay('');
  }
}
function onPause(){
  if(!gameRunning||overlayVisible())return;
  paused=!paused;
  if(paused)stopBGM(); else playBGM();
}

// ── HUD boundaries ───────────────────────────────────────────
const HUD_TOP=18;      // top score bar height
const HUD_BOT=22;      // bottom power-up bar height
const PLAY_TOP=HUD_TOP;
const PLAY_BOT=CH-HUD_BOT;

// ── Game state ─────────────────────────────────────────────
let gameRunning=false, paused=false;
let score=0, hiScore=0, lives=3, stage=1;
try{hiScore=parseInt(localStorage.getItem('nv_hi'))||0;}catch(e){}
let gameOver=false;
let retryCountTimer=null;

// Player
let px=40, py=CH/2-8, pvx=0, pvy=0;
const PSPEED_BASE=2.4;
const MAX_CAPSULE=50;
let pSpeed=PSPEED_BASE;
let pW=24, pH=12;
let invincible=0; // frames of invincibility after hit
let shieldActive=false;
let shieldRegenTimer=0;

// Weapons
let hasDouble=false, hasLaser=false, hasMissile=false, optionCount=0;
let laserActive=false, laserTimer=0;

// Options (drones) — ring buffer for trail
let optionTrail=new Array(300).fill(null).map(()=>({x:0,y:0}));
let optionTrailHead=0;
const MAX_TRAIL=300;
const OPTION_DIST=50; // pixels behind player per option

// Power-up system — multi-level weapons
const WEAPONS=[
  {id:'NONE',   label:'---',   maxLv:0, costs:[]},
  {id:'SPEED',  label:'SPEED',  maxLv:3, costs:[1,2,3]},
  {id:'MISSILE',label:'MISSILE',maxLv:3, costs:[1,2,3]},
  {id:'DOUBLE', label:'DOUBLE', maxLv:3, costs:[1,2,3]},
  {id:'LASER',  label:'LASER',  maxLv:3, costs:[1,2,3]},
  {id:'OPTION', label:'OPTION', maxLv:3, costs:[1,2,3]},
  {id:'SHIELD', label:'SHIELD', maxLv:3, costs:[1,2,3]},
];

function initGame(){

  invincible=0; shieldActive=false; shieldRegenTimer=0;
  hasDouble=false; hasLaser=false; hasMissile=false; optionCount=0;

  optionTrail.forEach(p=>{p.x=px||40;p.y=py||CH/2;});

  weaponCursor=0; weaponLevels=[0,0,0,0,0,0,0,0]; capsuleStored=0;
  playerBullets=[]; enemyBullets=[]; missiles=[];
  capsules=[]; capsuleStored=0; enemies=[]; explosions=[]; particles=[]; scorePopups=[];
  laserActive=false; laserTimer=0; laserBeam=null;

  bossRef=null; stageClear=false; stageClearTimer=0; bossDefeated=false;

}

    lives=3; // retry: keep score & stage
  } else {

  }

// ── Wave definitions ──────────────────────────────────────
// Each wave: {delay(frames), spawn:fn}
function makeWaves(s){
  const W=[];
  const diff=1+((s-1)*0.25); // 每關速度/數量遞增
  if(s===1){
    W.push({delay:120,spawn:()=>spawnFormation('dart',5,'line_h',CW+20,60)});
    W.push({delay:200,spawn:()=>spawnFormation('dart',5,'line_h',CW+20,130)});
    W.push({delay:180,spawn:()=>spawnFormation('fighter',3,'v_line',CW+20,80)});
    W.push({delay:220,spawn:()=>spawnFormation('dart',8,'sine',CW+20,CH/2)});
    W.push({delay:200,spawn:()=>spawnFormation('fighter',4,'diamond',CW+30,CH/2)});
    W.push({delay:240,spawn:()=>spawnFormation('heavy',2,'line_h',CW+20,90)});
    W.push({delay:200,spawn:()=>spawnFormation('dart',6,'sine',CW+20,CH/2)});
    W.push({delay:180,spawn:()=>spawnFormation('fighter',5,'v_line',CW+20,60)});
    W.push({delay:300,spawn:()=>startAsteroids()});
    W.push({delay:100,spawn:()=>spawnFormation('dart',4,'line_h',CW+20,50)});
    W.push({delay:150,spawn:()=>spawnFormation('heavy',3,'v_line',CW+20,80)});
    W.push({delay:150,spawn:()=>spawnFormation('fighter',6,'sine',CW+20,CH/2)});
    W.push({delay:300,spawn:()=>enterBossApproach()});
    W.push({delay:180,spawn:()=>spawnBoss()});
  } else {
    // 第 2 關起：用 diff 縮短 delay、增加敵人數量
    const d=(n)=>Math.max(80,Math.round(n/diff));
    W.push({delay:d(100),spawn:()=>spawnFormation('dart',  Math.min(10,5+s), 'line_h',  CW+20, 55)});
    W.push({delay:d(160),spawn:()=>spawnFormation('fighter',Math.min(6,3+s),  'diamond', CW+30, CH/2)});
    W.push({delay:d(140),spawn:()=>spawnFormation('dart',  Math.min(10,6+s), 'sine',    CW+20, CH/2)});
    W.push({delay:d(180),spawn:()=>spawnFormation('heavy', Math.min(5,2+s),  'v_line',  CW+20, 80)});
    W.push({delay:d(160),spawn:()=>spawnFormation('fighter',Math.min(8,4+s), 'sine',    CW+20, 100)});
    W.push({delay:d(200),spawn:()=>spawnFormation('dart',  Math.min(10,8+s), 'line_h',  CW+20, 140)});
    W.push({delay:d(240),spawn:()=>startAsteroids()});
    W.push({delay:d(100),spawn:()=>spawnFormation('heavy', Math.min(4,2+s),  'line_h',  CW+20, 70)});
    W.push({delay:d(120),spawn:()=>spawnFormation('fighter',Math.min(8,5+s), 'v_line',  CW+20, 90)});
    W.push({delay:d(140),spawn:()=>spawnFormation('dart',  Math.min(10,6+s), 'diamond', CW+30, CH/2)});
    W.push({delay:d(160),spawn:()=>spawnFormation('heavy', Math.min(6,3+s),  'sine',    CW+20, CH/2)});
    W.push({delay:d(280),spawn:()=>enterBossApproach()});
    W.push({delay:d(180),spawn:()=>spawnBoss()});
  }
  return W;
}

}
function spawnBoss(){
  stagePhase=3;
  const di=Math.min(stage-1,BOSS_DEFS.length-1);
  const def=BOSS_DEFS[di];
  const hp=Math.round((80+stage*20)*def.hpScale);
  const b={
    x:CW+80, y:CH/2-def.h/2,
    w:def.w, h:def.h,
    hp:hp, maxHp:hp,
    vx:-0.6-stage*0.04, vy:0,
    phase:0, timer:0, shootTimer:0,
    def:def,
    coreDestroyed:false, arrived:false,
    isBoss:true,
  };
  enemies.push(b);
  bossRef=b;
}

// ── Spawn helpers ─────────────────────────────────────────
function spawnFormation(type, count, pattern, sx, sy){
  for(let i=0;i<count;i++){
    let ex=sx, ey=sy;
    if(pattern==='line_h'){ey=sy+(i-(count-1)/2)*24;}
    else if(pattern==='v_line'){ex=sx+i*28;}
    else if(pattern==='sine'){ex=sx+i*32; ey=sy;}
    else if(pattern==='diamond'){
      const ang=(i/count)*Math.PI*2;
      ex=sx+Math.cos(ang)*30; ey=sy+Math.sin(ang)*30;
    }
    setTimeout(()=>spawnEnemy(type,ex,ey,pattern,i),i*80);
  }
}

function spawnEnemy(type,x,y,pattern,idx){
  const baseShoot=Math.max(60, 160-stage*20);
  const e={type,x,y,pattern,idx,
    timer:0,birthX:x,birthY:y,
    vx:-1.2,vy:0,
    shootTimer:baseShoot+Math.floor(Math.random()*baseShoot),
    isBoss:false,
  };
  switch(type){
    case 'dart':   e.hp=1; e.score=100; e.w=14; e.h=10; e.vx=-2+Math.random()*-0.5; break;
    case 'fighter':e.hp=2; e.score=200; e.w=18; e.h=12; e.vx=-1.5; break;
    case 'heavy':  e.hp=4; e.score=500; e.w=22; e.h=16; e.vx=-1.0; break;
    case 'asteroid':e.hp=3; e.score=300; e.w=20; e.h=20; e.vx=-1.8-Math.random(); e.vy=(Math.random()-.5)*1.5; e.rot=0; e.rotSpd=(Math.random()-.5)*0.08; break;
  }
  if(pattern==='sine') e.sineAmp=Math.min(35,(PLAY_BOT-PLAY_TOP)/2-14), e.sineFreq=0.03, e.sineOffset=idx*0.5;
  // Clamp initial Y to play area
  e.y=Math.max(PLAY_TOP+e.h, Math.min(PLAY_BOT-e.h, e.y));
  e.birthY=e.y;
  enemies.push(e);
}

function spawnAsteroid(){
  spawnEnemy('asteroid', CW+20, PLAY_TOP+20+Math.random()*(PLAY_BOT-PLAY_TOP-60), 'free', 0);
}

function spawnCapsule(x,y){
  capsules.push({x,y,vy:(Math.random()-.5)*0.5,timer:0});
}

// ── Player bullets ────────────────────────────────────────
// weapon level helpers (WEAPONS index: 0=NONE,1=SPD,2=MSL,3=DBL,4=LASR,5=OPT,6=SHLD)
function wLv(id){const i=WEAPONS.findIndex(w=>w.id===id);return i>=0?weaponLevels[i]:0;}

function firePlayerWeapon(){
  sndShoot();
  const dblLv=wLv('DOUBLE');
  const lasLv=wLv('LASER');
  // Main shot
  playerBullets.push({x:px+pW,y:py+pH/2-1,vx:7,vy:0,w:8,h:3,type:'normal'});
  if(dblLv>=1){
    playerBullets.push({x:px+pW,y:py+pH/2-1,vx:6,vy:-1.8,w:6,h:2,type:'normal'});
  }
  if(dblLv>=2){
    playerBullets.push({x:px+pW,y:py+pH/2-1,vx:6,vy:1.8,w:6,h:2,type:'normal'});
  }
  if(dblLv>=3){
    // LV3: 5-way – add wider diagonal pair
    playerBullets.push({x:px+pW,y:py+pH/2-1,vx:5,vy:-3.2,w:5,h:2,type:'normal'});
    playerBullets.push({x:px+pW,y:py+pH/2-1,vx:5,vy: 3.2,w:5,h:2,type:'normal'});
  }
  if(lasLv>=1){
    sndLaser();
    laserActive=true;
    const dur=lasLv>=3?50:lasLv>=2?30:18;
    laserTimer=dur;
    laserBeam={x:px+pW,y:py+pH/2,len:CW,timer:dur,lv:lasLv};
  }
  // Options fire
  for(let i=0;i<optionCount;i++){
    const op=getOptionPos(i);
    if(op){
      playerBullets.push({x:op.x+10,y:op.y+4,vx:7,vy:0,w:6,h:2,type:'option'});
      // LV3 options fire diagonal too
      if(wLv('OPTION')>=3){
        playerBullets.push({x:op.x+10,y:op.y+4,vx:6,vy:-1.8,w:5,h:2,type:'option'});
        playerBullets.push({x:op.x+10,y:op.y+4,vx:6,vy: 1.8,w:5,h:2,type:'option'});
      }
    }
  }
}

function fireMissile(){
  if(wLv('MISSILE')<1||missileCooldown>0)return;
  sndMissile();
  const mslLv=wLv('MISSILE');
  missileCooldown=mslLv>=3?18:mslLv>=2?26:MISSILE_RATE;
  let target=null, minD=9999;
  enemies.forEach(e=>{
    if(e.isBoss&&e.coreDestroyed)return;
    const d=Math.hypot(e.x-px,e.y-py);
    if(d<minD){minD=d;target=e;}
  });
  missiles.push({x:px+pW/2,y:py+pH,  vx:2,vy: 2.5,target,phase:0,w:4,h:6,life:160});
  missiles.push({x:px+pW/2,y:py,      vx:2,vy:-2.5,target,phase:0,w:4,h:6,life:160});
  if(mslLv>=2){
    missiles.push({x:px+pW,  y:py+pH/2,vx:5,vy:0,  target,phase:0,w:4,h:6,life:160});
  }
  if(mslLv>=3){
    // LV3: 4th missile locks onto 2nd nearest enemy
    let target2=null, minD2=9999;
    enemies.forEach(e=>{
      if(e===target||e.coreDestroyed)return;
      const d=Math.hypot(e.x-px,e.y-py);
      if(d<minD2){minD2=d;target2=e;}
    });
    missiles.push({x:px+pW/2,y:py+pH/2,vx:4,vy:0,target:target2||target,phase:0,w:4,h:6,life:160});
  }
}

function getOptionPos(i){
  const dist=Math.min((i+1)*OPTION_DIST, MAX_TRAIL-1);
  const idx=(optionTrailHead - dist + MAX_TRAIL*2)%MAX_TRAIL;
  return optionTrail[idx]||null;
}

// ── Power-up system ───────────────────────────────────────
function selectPowerup(){
  const w=WEAPONS[weaponCursor];
  if(w.id==='NONE') return;
  const lv=weaponLevels[weaponCursor];
  if(lv>=w.maxLv) return; // maxed out
  if(capsuleStored<1) return; // need at least 1 capsule
  sndSelect();
  capsuleStored--;
  weaponLevels[weaponCursor]=lv+1;
  switch(w.id){
    case 'SPEED':  pSpeed=PSPEED_BASE+1.4*(lv+1); break;
    case 'MISSILE':hasMissile=true; break;
    case 'DOUBLE': hasDouble=true; break;
    case 'LASER':  hasLaser=true; break;
    case 'OPTION': optionCount=Math.min(3,lv+1); break;
    case 'SHIELD': shieldActive=true; break;
  }
  sndPowerup();
  scorePopups.push({x:CW/2,y:CH/2-30,txt:w.label+' LV'+(lv+1),color:'#0ff',life:90,vy:-0.5,big:false});
  // After upgrade: reset cursor to first non-maxed weapon from the start
  cursorReset();
}

function cursorReset(){
  for(let i=1;i<WEAPONS.length;i++){
    if(WEAPONS[i].id!=='NONE'&&weaponLevels[i]<WEAPONS[i].maxLv){
      weaponCursor=i; return;
    }
  }
  // All maxed – park on SHIELD so player can still replenish
  const si=WEAPONS.findIndex(w=>w.id==='SHIELD');
  weaponCursor=si>=0?si:0;
}

// ── Update ────────────────────────────────────────────────
let raf=null;
let lastTime=0;
function loop(ts){
  if(!gameRunning){return;}
  raf=requestAnimationFrame(loop);
  const dt=Math.min((ts-lastTime)/16.667, 2.5); // normalize to 60fps; cap at 2.5x
  lastTime=ts;
  if(!paused) update(dt);
  draw();
}

function update(dt=1){
  // Player movement – velocity with acceleration & friction
  const topSpd=pSpeed*(isFire()&&wLv('LASER')>=1?0.9:1);
  const accel=0.55, friction=0.78;
  // Analog joystick overrides digital when active
  const jx=Math.abs(joystickAxis.x)>0.1?joystickAxis.x:0;
  const jy=Math.abs(joystickAxis.y)>0.1?joystickAxis.y:0;
  if(isLeft()&&!jx)  pvx-=accel;
  if(isRight()&&!jx) pvx+=accel;
  if(isUp()&&!jy)    pvy-=accel;
  if(isDown()&&!jy)  pvy+=accel;
  if(jx) pvx+=jx*accel*1.4;
  if(jy) pvy+=jy*accel*1.4;
  pvx=Math.max(-topSpd, Math.min(topSpd, pvx)) * friction;
  pvy=Math.max(-topSpd, Math.min(topSpd, pvy)) * friction;
  if(Math.abs(pvx)<0.05) pvx=0;
  if(Math.abs(pvy)<0.05) pvy=0;
  px+=pvx*dt;
  py+=pvy*dt;
  if(px < 4)           { px=4;           if(pvx<0) pvx=0; }
  if(px > CW-pW-4)     { px=CW-pW-4;     if(pvx>0) pvx=0; }
  if(py < PLAY_TOP+2)  { py=PLAY_TOP+2;  if(pvy<0) pvy=0; }
  if(py > PLAY_BOT-pH-2){ py=PLAY_BOT-pH-2; if(pvy>0) pvy=0; }

  // Option trail (ring buffer — no alloc/shift)
  optionTrailHead=(optionTrailHead+1)%MAX_TRAIL;
  optionTrail[optionTrailHead].x=px;
  optionTrail[optionTrailHead].y=py;

  // Stars scroll
  stars.forEach(s=>{
    s.x-=s.spd*dt;
    if(s.x<0)s.x=CW+2;
  });

  bgScroll=(bgScroll+0.5*dt)%CW;

  // Invincibility
  if(invincible>0)invincible-=dt;

  // Firing
  if(fireCooldown>0)fireCooldown-=dt;
  if(isFire()&&fireCooldown<=0){
    fireCooldown=FIRE_RATE;
    firePlayerWeapon();
  }
  if(missileCooldown>0)missileCooldown-=dt;
  if(isFire()&&wLv('MISSILE')>=1&&missileCooldown<=0) fireMissile();

  // Laser beam
  if(laserTimer>0){laserTimer-=dt; laserDmgTick+=dt;}
  else {laserActive=false; laserBeam=null; laserDmgTick=0;}

  // Player bullets
  playerBullets=playerBullets.filter(b=>{
    b.x+=b.vx*dt; b.y+=b.vy*dt;
    return b.x<CW+10&&b.y>-5&&b.y<CH+5;
  });

  // Enemy bullets
  enemyBullets=enemyBullets.filter(b=>{
    b.x+=b.vx*dt; b.y+=b.vy*dt;
    if(b.x<-10||b.y<-10||b.y>CH+10)return false;
    // hit player
    if(invincible<=0&&!gameOver&&rectsOverlap(b.x,b.y,b.w||4,b.h||4,px+3,py+2,pW-6,pH-4)){
      if(shieldActive) shieldHit(); else playerHit();
      return false;
    }
    return true;
  });

  // Missiles
  missiles=missiles.filter(m=>{m.life-=dt;
    if(m.life<=0) return false;
    // Home to target only while target is alive
    if(m.target&&!m.target.coreDestroyed&&m.target.hp>0){
      const dx=m.target.x+m.target.w/2-m.x;
      const dy=m.target.y+m.target.h/2-m.y;
      const d=Math.hypot(dx,dy)||1;
      m.vx+=(dx/d)*0.3*dt; m.vy+=(dy/d)*0.3*dt;
      const spd2=Math.hypot(m.vx,m.vy);
      if(spd2>4){m.vx=m.vx/spd2*4;m.vy=m.vy/spd2*4;}
    } else {
      // No valid target: fly straight, fade out quickly
      m.vx+=0.15*dt;
      m.life=Math.min(m.life,30);
    }
    m.x+=m.vx*dt; m.y+=m.vy*dt;
    if(m.x>CW+10||m.x<-10||m.y<-10||m.y>CH+10)return false;
    // hit enemy
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      if(e.coreDestroyed)continue;
      if(rectsOverlap(m.x,m.y,m.w,m.h,e.x,e.y,e.w,e.h)){
        hitEnemy(e,2,i);
        spawnMiniExp(m.x,m.y);
        return false;
      }
    }
    return true;
  });

  // Capsules
  capsules=capsules.filter(c=>{
    c.timer++;
    if(bossDefeated){
      // Home toward player
      const dx=(px+pW/2)-(c.x+6), dy=(py+pH/2)-(c.y+6);
      const d=Math.hypot(dx,dy)||1;
      const spd=3.5;
      c.x+=dx/d*spd; c.y+=dy/d*spd;
    } else {
      c.x-=0.8;
      c.y+=c.vy;
      if(c.y<20||c.y>CH-20) c.vy*=-1;
    }
    if(c.x<-20)return false;
    // collect
    if(rectsOverlap(c.x,c.y,12,12,px,py,pW,pH)){
      sndSelect();
      addScore(50,c.x,c.y);
      // If all non-SHIELD weapons maxed, auto-invest capsule into SHIELD
      if(allOtherWeaponsMaxed()){
        const si=WEAPONS.findIndex(w=>w.id==='SHIELD');
        if(si>=0&&weaponLevels[si]<WEAPONS[si].maxLv){
          weaponLevels[si]++;
          shieldActive=true;
          scorePopups.push({x:c.x,y:c.y,txt:'SHIELD+',color:'#0cf',life:60,vy:-0.8,big:false});
        } else {
          capsuleStored=Math.min(MAX_CAPSULE,capsuleStored+1);
          scorePopups.push({x:c.x,y:c.y,txt:'CAPSULE',color:'#ff0',life:60,vy:-0.8,big:false});
        }
      } else {
        capsuleStored=Math.min(MAX_CAPSULE,capsuleStored+1);
        // advance cursor to next non-maxed real weapon (wrap around, skip NONE at 0)
        for(let n=0;n<WEAPONS.length;n++){
          const next=(weaponCursor+1)%WEAPONS.length;
          weaponCursor=next;
          const w=WEAPONS[weaponCursor];
          if(w.id!=='NONE'&&weaponLevels[weaponCursor]<w.maxLv) break;
        }
        scorePopups.push({x:c.x,y:c.y,txt:'CAPSULE',color:'#ff0',life:60,vy:-0.8,big:false});
      }
      return false;
    }
    return true;
  });

  // Edge rocks removed – terrain walls handle boundary

  // Enemies
  enemies=enemies.filter(e=>{
    if(e.isBoss) return updateBoss(e);
    e.timer++;
    if(e.pattern==='sine'){
      e.y=e.birthY+Math.sin(e.timer*e.sineFreq+e.sineOffset)*e.sineAmp;
    } else if(e.type==='asteroid'){
      e.rot+=e.rotSpd;
    }
    e.x+=e.vx*dt; e.y+=e.vy*dt;
    // Clamp to playfield (no entering HUD zones)
    if(e.y<PLAY_TOP){ e.y=PLAY_TOP; if(e.vy<0)e.vy*=-1; }
    if(e.y+e.h>PLAY_BOT){ e.y=PLAY_BOT-e.h; if(e.vy>0)e.vy*=-1; }
    if(e.x<-30)return false;

    // Enemy shoot — rate scales with stage (stage1: slow, stage2+: faster)
    if(e.type!=='asteroid'){
      e.shootTimer--;
      if(e.shootTimer<=0){
        const baseRate = Math.max(50, 160 - stage*20);
        e.shootTimer=baseRate+Math.floor(Math.random()*baseRate*0.6);
        const dx=px-e.x, dy=py-e.y, d=Math.hypot(dx,dy)||1;
        const spd2=2+stage*0.15;
        const bvx=Math.min(-0.3, dx/d*spd2); // never fire rightward
        enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:bvx,vy:dy/d*spd2,w:4,h:4});
      }
    }

    // Laser hit – tick every 45/32/22 frames by level
    if(laserBeam&&e.y<py+pH/2+4&&e.y+e.h>py+pH/2-4&&e.x>px){
      const lLv=wLv('LASER');
      const tickInt=lLv>=3?22:lLv>=2?32:45;
      if(laserDmgTick>=tickInt){
        hitEnemy(e,lLv>=3?1.5:lLv>=2?1.0:0.5);
      }
    }

    // Bullet collision
    for(let i=playerBullets.length-1;i>=0;i--){
      const b=playerBullets[i];
      if(rectsOverlap(b.x,b.y,b.w,b.h,e.x,e.y,e.w,e.h)){
        playerBullets.splice(i,1);
        hitEnemy(e,1);
        break;
      }
    }

    // Player collision
    if(invincible<=0&&!gameOver&&rectsOverlap(px+3,py+2,pW-6,pH-4,e.x,e.y,e.w,e.h)){
      if(!shieldActive) playerHit();
      else { shieldHit(); hitEnemy(e,e.hp); }
    }

    return e.hp>0;
  });

  // Reset laser damage tick after all entities processed
  if(laserActive&&laserDmgTick>0){
    const lLv=wLv('LASER');
    const tickInt=lLv>=3?22:lLv>=2?32:45;
    if(laserDmgTick>=tickInt) laserDmgTick=laserDmgTick%tickInt;
  }

  // Explosions
  explosions=explosions.filter(e=>{e.timer-=dt;return e.timer>0;});
  particles=particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.life--;
    return p.life>0;
  });
  scorePopups=scorePopups.filter(s=>{
    s.y+=s.vy; s.life--;
    return s.life>0;
  });

  // Wave spawning
  if(!bossRef){
    waveTimer+=dt;
    if(waveIndex<waves.length&&waveTimer>=waves[waveIndex].delay){
      waves[waveIndex].spawn();
      waveIndex++;
      waveTimer=0;
    }
  }

  // Stage clear: wait for bossDefeated + all capsules collected
  if(bossDefeated&&capsules.length===0&&!stageClear){
    stageClear=true; stageClearTimer=0;
  }
  if(stageClear){
    stageClearTimer+=dt;
    if(stageClearTimer>180){
      stage++;
      score+=5000+(lives*1000);
      scorePopups.push({x:CW/2,y:CH/2,txt:'STAGE '+stage+' BONUS',color:'#ff0',life:180,vy:-0.3,big:true});
      // Save weapons across stage — only need levels + derived state
      const savedSpeed=pSpeed, savedOption=optionCount, savedShield=shieldActive;
      const savedCursor=weaponCursor, savedStored=capsuleStored;
      const savedLevels=[...weaponLevels];
      initGame();
      // Restore weapons
      pSpeed=savedSpeed; optionCount=savedOption; shieldActive=savedShield;
      weaponCursor=savedCursor; capsuleStored=savedStored; weaponLevels=savedLevels;
      waves=makeWaves(stage);
      playBGM();
    }
  }
}

// ── Per-boss shoot patterns ───────────────────────────────
function bossShoot(e){
  const def=e.def, ph=e.phase;
  const cx=e.x, cy=e.y+e.h/2;
  if(def.id==='VANGUARD'){
    if(ph===0){
      for(let a=-2;a<=2;a++){
        const ang=Math.PI+a*0.18;
        enemyBullets.push({x:cx,y:cy,vx:Math.cos(ang)*3,vy:Math.sin(ang)*3,w:5,h:5});
      }
    } else {
      const dx=px-cx,dy=py-cy,d=Math.hypot(dx,dy)||1;
      for(let i=0;i<3;i++) setTimeout(()=>{
        if(gameRunning) enemyBullets.push({x:cx,y:cy,vx:Math.min(-0.3,dx/d*3.5),vy:dy/d*3.5,w:5,h:5});
      },i*120);
    }
  } else if(def.id==='BEHEMOTH'){
    // Wide diagonal volleys – top+bottom sweeps
    const angs=ph===0?[-0.65,-0.35,0,0.35,0.65,-Math.PI+0.65,-Math.PI+0.35,-Math.PI,-Math.PI-0.35,-Math.PI-0.65]
      :[-0.65,-0.35,0,0.35,0.65,-Math.PI+0.65,-Math.PI+0.35,-Math.PI,-Math.PI-0.35,-Math.PI-0.65,Math.PI/2,-Math.PI/2];
    angs.forEach(a=>enemyBullets.push({x:cx,y:cy,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5,w:5,h:5}));
  } else if(def.id==='INFERNO'){
    // Rotating circular burst
    const cnt=ph===0?8:12, rot=e.timer*0.04;
    for(let i=0;i<cnt;i++){
      const a=(i/cnt)*Math.PI*2+rot;
      const s=ph===0?2.8:3.8;
      enemyBullets.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,w:4,h:4});
    }
  } else if(def.id==='LEVIATHAN'){
    // Three-port aimed burst
    [e.y+14, cy, e.y+e.h-14].forEach(py2=>{
      const dx=px-cx,dy=py-py2,d=Math.hypot(dx,dy)||1;
      const s=2.5+stage*0.1;
      enemyBullets.push({x:cx,y:py2,vx:Math.min(-0.3,dx/d*s),vy:dy/d*s,w:5,h:5});
      // (rightward back-shot removed)
    });
  } else { // OMEGA – spiral + aimed
    const cnt=ph===0?6:10, rot=e.timer*0.05;
    for(let i=0;i<cnt;i++){
      const a=(i/cnt)*Math.PI*2+rot;
      enemyBullets.push({x:cx,y:cy,vx:Math.cos(a)*3,vy:Math.sin(a)*3,w:5,h:5});
    }
    const dx=px-cx,dy=py-cy,d=Math.hypot(dx,dy)||1;
    const s=3.5+stage*0.12;
    enemyBullets.push({x:cx,y:cy,vx:Math.min(-0.3,dx/d*s),vy:dy/d*s,w:5,h:5});
    if(ph===1) enemyBullets.push({x:cx,y:cy,vx:Math.min(-0.3,dx/d*(s+1.2)),vy:dy/d*(s+1.2),w:5,h:5});
  }
}

function updateBoss(e){
  e.timer=(e.timer||0)+1;
  const def=e.def;

  // Entry movement
  if(!e.arrived){
    e.x+=e.vx;
    if(e.x<=CW-e.w-20){e.x=CW-e.w-20; e.arrived=true; e.vy=def.vy;}
  } else {
    // Oscillate
    e.y+=e.vy;
    if(e.y<PLAY_TOP+2)  {e.y=PLAY_TOP+2;  e.vy= Math.abs(e.vy);}
    if(e.y>PLAY_BOT-e.h-2){e.y=PLAY_BOT-e.h-2; e.vy=-Math.abs(e.vy);}
    // BEHEMOTH phase 2: horizontal charge
    if(def.id==='BEHEMOTH'&&e.phase===1){
      e.x+=e.vx*0.55;
      if(e.x<CW*0.38)    {e.x=CW*0.38;      e.vx= Math.abs(e.vx);}
      if(e.x>CW-e.w-10)  {e.x=CW-e.w-10;    e.vx=-Math.abs(e.vx);}
    }
  }
  // Hard clamp: boss must always stay on screen (applies regardless of arrived state)
  if(e.x<4)        e.x=4;
  if(e.x>CW-e.w-4) {e.x=CW-e.w-4; if(!e.arrived){e.arrived=true; e.vy=def.vy; e.vx=-Math.abs(e.vx);}}

  // Shooting
  e.shootTimer=(e.shootTimer||0)+1;
  const rate=e.phase===0?def.sr1:def.sr2;
  if(e.arrived&&e.shootTimer>rate){e.shootTimer=0; bossShoot(e);}

  // Phase shift at half HP
  if(e.hp<e.maxHp/2&&e.phase===0){
    e.phase=1;
    e.vy*=(def.id==='INFERNO'?2.0:1.5);
    if(def.id==='BEHEMOTH') e.vx=(e.vx<0?-1:1)*(-1.4);
    scorePopups.push({x:e.x+e.w/2,y:e.y-14,txt:'PHASE 2',color:'#f44',life:80,vy:-0.5,big:false});
  }

  // Weakzone check helper
  const inWeak=(bx,by,bw2,bh2)=>rectsOverlap(bx,by,bw2,bh2, e.x+def.weakDx,e.y+def.weakDy,def.weakDw,def.weakDh);

  // Laser hit – tick every 45/32/22 frames by level
  if(laserBeam&&e.y<py+pH/2+4&&e.y+e.h>py+pH/2-4&&e.x>px){
    const lLv=wLv('LASER');
    const tickInt=lLv>=3?22:lLv>=2?32:45;
    if(laserDmgTick>=tickInt){
      const lasDmg=lLv>=3?1.5:lLv>=2?1.0:0.5;
      const dmg=inWeak(e.x,py+pH/2-4,e.w,8)?lasDmg*2:lasDmg;
      e.hp-=dmg; sndBossHit();
      if(e.hp<=0){bossDeath(e);return false;}
    }
  }

  // Bullet hits
  for(let i=playerBullets.length-1;i>=0;i--){
    const b=playerBullets[i];
    if(rectsOverlap(b.x,b.y,b.w,b.h,e.x,e.y,e.w,e.h)){
      playerBullets.splice(i,1);
      const dmg=inWeak(b.x,b.y,b.w,b.h)?2:1;
      e.hp-=dmg; sndBossHit(); spawnMiniExp(b.x,b.y);
      if(dmg>1) scorePopups.push({x:b.x,y:b.y-6,txt:'WEAK!',color:'#f0f',life:50,vy:-1,big:false});
      if(e.hp<=0){bossDeath(e);return false;}
      break;
    }
  }

  // Missile hits
  for(let i=missiles.length-1;i>=0;i--){
    const m=missiles[i];
    if(rectsOverlap(m.x,m.y,m.w,m.h,e.x,e.y,e.w,e.h)){
      missiles.splice(i,1);
      const dmg=inWeak(m.x,m.y,m.w,m.h)?4:2;
      e.hp-=dmg; sndBossHit(); spawnMiniExp(m.x,m.y);
      if(e.hp<=0){bossDeath(e);return false;}
    }
  }

  // Player collision
  if(invincible<=0&&!gameOver&&rectsOverlap(px+3,py+2,pW-6,pH-4,e.x,e.y,e.w,e.h)){
    if(!shieldActive) playerHit();
    else shieldHit();
  }

  return true;
}

function bossDeath(e){
  addScore(10000+stage*2000,e.x+e.w/2,e.y+e.h/2);
  // Drop a cluster of capsules
  for(let i=0;i<5;i++) spawnCapsule(e.x+8+Math.random()*(e.w-16), e.y+e.h/2+(Math.random()-.5)*20);
  // Big explosion chain
  for(let i=0;i<20;i++) setTimeout(()=>{
    spawnExplosion(e.x+Math.random()*e.w,e.y+Math.random()*e.h,true);
  },i*80);
  stopBGM();
  sndExplosion();
  bossRef=null;
  bossDefeated=true; // capsules will home; stageClear starts after all collected
  scorePopups.push({x:CW/2,y:CH/2-20,txt:'STAGE CLEAR!',color:'#0f0',life:300,vy:-0.1,big:true});
}

function hitEnemy(e,dmg){
  e.hp-=dmg;
  spawnMiniExp(e.x+e.w/2,e.y+e.h/2);
  sndHit();
  if(e.hp<=0&&!e.dying){
    e.dying=true;
    addScore(e.score||100,e.x,e.y);
    spawnExplosion(e.x+e.w/2,e.y+e.h/2,false);
    sndExplosion();
    if(Math.random()<0.25&&capsuleStored<MAX_CAPSULE) spawnCapsule(e.x,e.y);
  }
}

// Shield absorbs a hit: drop shield weapon level by 1; shieldActive stays true if level still >= 1
function allOtherWeaponsMaxed(){
  return WEAPONS.every((w,i)=>{
    if(w.id==='NONE'||w.id==='SHIELD') return true;
    return weaponLevels[i]>=w.maxLv;
  });
}

function shieldHit(){
  const si=WEAPONS.findIndex(w=>w.id==='SHIELD');
  if(si<0){shieldActive=false;return;}
  weaponLevels[si]=Math.max(0,weaponLevels[si]-1);
  shieldActive=weaponLevels[si]>0;
  // Auto-replenish: if all other weapons maxed and have capsules, spend 1 to restore +1 shield
  if(allOtherWeaponsMaxed()&&capsuleStored>0&&weaponLevels[si]<WEAPONS[si].maxLv){
    capsuleStored--;
    weaponLevels[si]++;
    shieldActive=true;
    scorePopups.push({x:px+pW/2,y:py-10,txt:'SHIELD AUTO',color:'#0cf',life:60,vy:-0.8,big:false});
  }
}

function playerHit(){
  if(invincible>0||gameOver)return;
  sndExplosion();
  spawnExplosion(px+pW/2,py+pH/2,true);
  // Reset weapons
  pSpeed=PSPEED_BASE; hasDouble=false; hasLaser=false; hasMissile=false;
  optionCount=0; shieldActive=false; weaponCursor=0; weaponLevels=[0,0,0,0,0,0,0,0];
  // capsuleStored intentionally kept across death
  laserActive=false; laserBeam=null;
  lives--;
  invincible=72; // 72 frames = ~6 blinks
    if(lives<=0){
    gameOver=true;
    gameRunning=false;
    stopBGM();
    sndDeath();
    if(score>hiScore){hiScore=score;try{localStorage.setItem('nv_hi',hiScore);}catch(e){}}
    setTimeout(()=>{
      // Game Over: full dark overlay, hide weapons box
      overlay.style.background='rgba(0,0,0,0.92)';
      overlay.style.justifyContent='center';
      document.getElementById('overlay-weapons').style.display='none';
      document.querySelector('.desktop-hint').style.display='none';
      document.querySelector('.mobile-hint').style.display='none';
      document.getElementById('overlay-score').style.display='none';
      const tbl=document.getElementById('overlay-scoretable');
      tbl.style.display='block';
      tbl.innerHTML=
        `<table style="width:auto;border-collapse:collapse;font-size:9px;margin:0 auto">`+
        `<tr><td style="color:#aaa;padding-right:20px">SCORE</td><td style="text-align:right;color:#ff0">${score}</td></tr>`+
        `<tr><td style="color:#aaa;padding-right:20px">HI</td><td style="text-align:right;color:#ff0">${hiScore}</td></tr>`+
        `</table>`;
      const tf=document.getElementById('overlay-title-float');
      tf.textContent='GAME OVER';
      tf.style.position='relative';
      tf.style.top='auto';
      tf.style.fontSize='20px';
      tf.style.color='#f44';
      tf.style.textShadow='0 0 12px #f44,0 0 30px #f44';
      tf.style.marginBottom='16px';
      document.getElementById('overlay-btn').textContent='▶ RETRY';
      overlay.classList.remove('hidden');
      // Auto-return to title after 3 seconds
      let countdown=3;
      const retryBtn=document.getElementById('overlay-btn');
      retryBtn.textContent=`▶ RETRY (${countdown})`;
      retryCountTimer=setInterval(()=>{
        countdown--;
        if(countdown>0){
          retryBtn.textContent=`▶ RETRY (${countdown})`;
        } else {
          clearInterval(retryCountTimer); retryCountTimer=null;
          // Return to title
          score=0; lives=3; stage=1;
          const tf2=document.getElementById('overlay-title-float');
          tf2.textContent='NEXUS VIPER';
          tf2.style.position=''; tf2.style.top='';
          tf2.style.fontSize=''; tf2.style.color='#0f0';
          tf2.style.textShadow='';
          tf2.style.marginBottom='';
          overlay.style.background='';
          overlay.style.justifyContent='';
          document.getElementById('overlay-weapons').style.display='';
          document.querySelector('.desktop-hint').style.display='';
          document.querySelector('.mobile-hint').style.display='';
          document.getElementById('overlay-score').style.display='';
          document.getElementById('overlay-scoretable').style.display='none';
          retryBtn.textContent='▶ START';
          gameOver=false;
        }
      },1000);
    },1000);
  }
}

function spawnExplosion(x,y,big){
  explosions.push({x,y,r:big?28:14,timer:big?40:24,big});
  for(let i=0;i<(big?20:8);i++){
    const ang=Math.random()*Math.PI*2, spd=0.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-1,
      life:20+Math.floor(Math.random()*30),
      color:['#ff0','#f80','#f44','#fff'][Math.floor(Math.random()*4)]});
  }
}
function spawnMiniExp(x,y){
  explosions.push({x,y,r:6,timer:8,big:false});
}

function addScore(v,x,y){
  score+=v;
  scorePopups.push({x,y,txt:String(v),color:'#ff0',life:50,vy:-1,big:false});
}

function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

// ── Draw ──────────────────────────────────────────────────
function draw(){
  ctx.fillStyle='#000810'; ctx.fillRect(0,0,CW,CH);

  drawBG();


  // Options
  for(let i=0;i<optionCount;i++){
    const op=getOptionPos(i);
    if(op) drawOption(op.x,op.y);
  }

  // Player
  drawPlayer();

  // Missile trails
  missiles.forEach(m=>drawMissile(m));

  // Player bullets
  playerBullets.forEach(b=>{
    ctx.fillStyle=b.type==='option'?'#0ff':'#0f0';
    ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=4;
    ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.shadowBlur=0;
  });

  // Laser beam
  if(laserActive&&laserBeam){
    const lv=laserBeam.lv||1;
    const maxDur=lv>=3?50:lv>=2?30:18;
    const alpha=Math.min(1,laserTimer/maxDur*2);
    const coreW  =lv===1?1 :lv===2?3 :6;   // LV1 thin, LV2 medium, LV3 thick
    const glowW  =lv===1?3 :lv===2?8 :14;
    const blur   =lv===1?6 :lv===2?14:22;
    const color  =lv===1?'#0ff':lv===2?'#0af':'#f0f'; // LV3 turns magenta
    ctx.save();
    ctx.globalAlpha=alpha;
    // Wide outer glow
    ctx.strokeStyle=color;
    ctx.shadowColor=color; ctx.shadowBlur=blur;
    ctx.lineWidth=glowW;
    ctx.beginPath(); ctx.moveTo(laserBeam.x,laserBeam.y); ctx.lineTo(CW,laserBeam.y); ctx.stroke();
    // Core beam
    ctx.shadowBlur=0;
    ctx.lineWidth=coreW;
    ctx.strokeStyle='#fff';
    ctx.beginPath(); ctx.moveTo(laserBeam.x,laserBeam.y); ctx.lineTo(CW,laserBeam.y); ctx.stroke();
    ctx.restore();
  }

  // Capsules
  capsules.forEach(c=>drawCapsule(c));

  // Enemies
  enemies.forEach(e=>{
    if(e.type==='asteroid') drawAsteroid(e);
    else if(e.isBoss) drawBoss(e);
    else drawEnemy(e);
  });

  // Enemy bullets
  enemyBullets.forEach(b=>{
    ctx.fillStyle='#f55';
    ctx.shadowColor='#f55'; ctx.shadowBlur=4;
    ctx.fillRect(b.x-2,b.y-2,b.w||4,b.h||4);
    ctx.shadowBlur=0;
  });

  // Explosions
  explosions.forEach(e=>{
    const p=e.timer/(e.big?40:24);
    ctx.save();
    ctx.globalAlpha=p;
    const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r*(1-p*0.3));
    g.addColorStop(0,'#fff');
    g.addColorStop(0.3,'#ff8');
    g.addColorStop(0.7,'#f40');
    g.addColorStop(1,'rgba(255,80,0,0)');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Particles
  particles.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.globalAlpha=p.life/50;
    ctx.fillRect(p.x-1,p.y-1,2,2);
  });
  ctx.globalAlpha=1;

  // Score popups
  scorePopups.forEach(s=>{
    ctx.font=(s.big?'8px':'6px')+' "Press Start 2P",monospace';
    ctx.fillStyle=s.color;
    ctx.globalAlpha=Math.min(1,s.life/30);
    ctx.textAlign='center';
    ctx.fillText(s.txt,s.x,s.y);
  });
  ctx.globalAlpha=1;

  drawHUD();
  if(paused) drawPaused();
}

function drawBG(){
  // Stage-based background tint
  const stageBG=[
    '#000810', // stage 1: deep space blue
    '#080010', // stage 2: dark purple
    '#100800', // stage 3: orange/red nebula
    '#001008', // stage 4: green nebula
    '#100010', // stage 5+: deep magenta
  ];
  const nebulaColors=[
    ['#006','#040','#060','#004'],
    ['#308','#204','#406','#104'],
    ['#600','#420','#840','#402'],
    ['#040','#260','#080','#042'],
    ['#606','#404','#808','#204'],
  ];
  const si=Math.min(stage-1, stageBG.length-1);
  ctx.fillStyle=stageBG[si]; ctx.fillRect(0,0,CW,CH);
  // Stars
  stars.forEach(s=>{
    ctx.fillStyle=`rgb(${s.bright},${s.bright},${s.bright})`;
    ctx.fillRect(s.x,s.y,s.r,s.r);
  });
  // Nebula wisps
  ctx.save();
  ctx.globalAlpha=0.05;
  const nc=nebulaColors[si];
  [40,80,140,180].forEach((y,i)=>{
    const x=(bgScroll*0.3+i*90)%CW;
    const g=ctx.createRadialGradient(x,y,0,x,y,60);
    g.addColorStop(0,nc[i%4]);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.fillRect(0,0,CW,CH);
  });
  ctx.restore();
  // Stage 2+: scrolling debris/rocks
  if(stage>=2){
    ctx.save();
    ctx.globalAlpha=0.18;
    ctx.fillStyle=stage>=3?'#883300':'#334466';
    for(let i=0;i<4;i++){
      const x=((bgScroll*(0.6+i*0.15)+i*80))%CW;
      const y=20+i*48;
      const r=5+i*3;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc((x+140)%CW, y+20, r-2, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

function drawAsteroid(e){
  ctx.save();
  ctx.translate(e.x+e.w/2,e.y+e.h/2);
  ctx.rotate(e.rot||0);
  ctx.fillStyle='#887766';
  ctx.beginPath();
  const pts=8;
  for(let i=0;i<pts;i++){
    const a=(i/pts)*Math.PI*2;
    const r=e.w/2*(0.7+0.3*Math.sin(i*2.3));
    if(i===0)ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
    else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#665544';
  ctx.beginPath(); ctx.arc(-2,-2,4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawBossVanguard(x,y,e){
  // ── Stage 1: 十字形戰鬥機 (blue-grey) ──
  const p=0.6+0.4*Math.sin(e.timer*0.15);
  ctx.fillStyle='#2a4a7a';
  // Fuselage (tall center column)
  ctx.fillRect(x+e.w/2-10,y,20,e.h);
  // Cross wing (wide horizontal bar)
  ctx.fillRect(x,y+e.h/2-8,e.w,16);
  // Wing tips
  ctx.fillStyle='#1a3060';
  ctx.fillRect(x,      y+e.h/2-4,12,8);
  ctx.fillRect(x+e.w-12,y+e.h/2-4,12,8);
  // Front cannons (two, left side)
  ctx.fillStyle='#0d1e40';
  ctx.fillRect(x-10,y+e.h/2-14,14,6);
  ctx.fillRect(x-10,y+e.h/2+8, 14,6);
  // Engine exhausts (right side)
  ctx.fillStyle=`rgba(255,${Math.floor(80+100*p)},0,0.9)`;
  ctx.shadowColor='#f80'; ctx.shadowBlur=8*p;
  ctx.fillRect(x+e.w,y+e.h/2-10,6,8);
  ctx.fillRect(x+e.w,y+e.h/2+2, 6,8);
  ctx.shadowBlur=0;
  // Core (center weakpoint)
  ctx.fillStyle=`rgba(255,${Math.floor(160+95*p)},30,1)`;
  ctx.shadowColor='#fa0'; ctx.shadowBlur=10*p;
  ctx.beginPath(); ctx.arc(x+e.w/2,y+e.h/2,9,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
}

function drawBossBehemoth(x,y,e){

  ctx.fillStyle='#5a1500';

  ctx.fillStyle='#440d00';
  for(let i=0;i<3;i++) ctx.fillRect(x+6+i*30,y+10,24,e.h-20);

  ctx.fillStyle='#280800';
  for(let i=0;i<4;i++){
    ctx.fillRect(x+8+i*22,y-6,10,10);

function drawBossInferno(x,y,e){
  // ── Stage 3: 菱形攻擊機 (orange-red, diamond silhouette) ──
  const p=0.5+0.5*Math.sin(e.timer*0.18);
  const cx2=x+e.w/2, cy2=y+e.h/2;
  // Diamond body – nose points LEFT toward player
  ctx.fillStyle='#7a1800';
  ctx.beginPath();
  ctx.moveTo(cx2,     y);           // top
  ctx.lineTo(x-4,     cy2);         // LEFT nose (faces player)
  ctx.lineTo(cx2,     y+e.h);       // bottom
  ctx.lineTo(x+e.w+4, cy2);         // right tail/engine
  ctx.closePath(); ctx.fill();
  // Inner diamond
  ctx.fillStyle='#aa2200';
  ctx.beginPath();
  ctx.moveTo(cx2,     y+8);
  ctx.lineTo(x+8,     cy2);
  ctx.lineTo(cx2,     y+e.h-8);
  ctx.lineTo(x+e.w-4, cy2);
  ctx.closePath(); ctx.fill();
  // Spine detail
  ctx.fillStyle='#551000';
  ctx.fillRect(cx2-4,y+6,8,e.h-12);
  // Nose cannon (LEFT side, facing player)
  ctx.fillStyle='#2a0800';
  ctx.fillRect(x-14,cy2-3,14,6);
  // Engine glow (RIGHT tail)
  ctx.fillStyle=`rgba(255,${Math.floor(80+140*p)},0,1)`;
  ctx.shadowColor='#f50'; ctx.shadowBlur=12*p;
  ctx.beginPath(); ctx.arc(cx2-12,cy2,8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx2+12,cy2,8,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
}

function drawBossLeviathan(x,y,e){
  // ── Stage 4: 高瘦蛇形 (teal, multi-segment serpent) ──
  const p=0.5+0.5*Math.sin(e.timer*0.1);
  const seg=Math.floor(e.h/4);
  // Segments alternating width
  for(let i=0;i<4;i++){
    const sw=i%2===0?e.w:e.w-12;
    const sx2=x+(e.w-sw)/2;
    ctx.fillStyle=i%2===0?'#0a3040':'#0d4055';
    ctx.fillRect(sx2, y+i*seg, sw, seg);
  }
  // Connector lines between segments
  ctx.fillStyle='#062030';
  for(let i=1;i<4;i++) ctx.fillRect(x+e.w/2-4,y+i*seg-2,8,4);
  // Three gun ports (left side)
  ctx.fillStyle='#041520';
  [e.h*0.15, e.h*0.5, e.h*0.85].forEach(dy=>{
    ctx.fillRect(x-10,y+dy-4,12,8);
  });
  // Each segment: spines on right
  ctx.fillStyle='#083348';
  for(let i=0;i<4;i++) ctx.fillRect(x+e.w,y+i*seg+4,6,seg-8);
  // Bridge weakpoint (cyan, top segment)
  ctx.fillStyle=`rgba(0,${Math.floor(160+95*p)},${Math.floor(200+55*p)},1)`;
  ctx.shadowColor='#0df'; ctx.shadowBlur=10*p;
  ctx.fillRect(x+e.w/2-14,y+2,28,seg-4);
  ctx.shadowBlur=0;
}

function drawBossOmega(x,y,e){
  // ── Stage 5: 八角堡壘 (deep purple, fortress) ──
  const p=0.5+0.5*Math.sin(e.timer*0.16);
  const cx2=x+e.w/2, cy2=y+e.h/2, r=e.w/2-4;
  // Octagonal main body
  ctx.fillStyle='#2a0044';
  ctx.beginPath();
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2-Math.PI/8;
    const px2=cx2+Math.cos(a)*r, py2=cy2+Math.sin(a)*r;
    i===0?ctx.moveTo(px2,py2):ctx.lineTo(px2,py2);
  }
  ctx.closePath(); ctx.fill();
  // Inner layer
  ctx.fillStyle='#3d0066';
  ctx.beginPath();
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2-Math.PI/8;
    const px2=cx2+Math.cos(a)*(r-8), py2=cy2+Math.sin(a)*(r-8);
    i===0?ctx.moveTo(px2,py2):ctx.lineTo(px2,py2);
  }
  ctx.closePath(); ctx.fill();
  // 4 external cannon pods
  ctx.fillStyle='#1a0033';
  [0,Math.PI/2,Math.PI,Math.PI*3/2].forEach(a=>{
    const bx=cx2+Math.cos(a)*(r+2)-6;
    const by=cy2+Math.sin(a)*(r+2)-6;
    ctx.fillRect(bx,by,12,12);
    // cannon barrel
    ctx.fillRect(bx+Math.round(Math.cos(a)*12)-3, by+Math.round(Math.sin(a)*12)-3,10,6);
  });
  // Central core (large, magenta)
  ctx.fillStyle=`rgba(${Math.floor(210+45*p)},0,${Math.floor(210+45*p)},1)`;
  ctx.shadowColor='#f0f'; ctx.shadowBlur=16*p;
  ctx.beginPath(); ctx.arc(cx2,cy2,14,0,Math.PI*2); ctx.fill();
  // Inner core ring
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.globalAlpha=0.6*p;
  ctx.beginPath(); ctx.arc(cx2,cy2,20,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function drawBoss(e){
  ctx.save();
  const x=e.x, y=e.y, def=e.def;
  switch(def.id){
    case 'VANGUARD':  drawBossVanguard(x,y,e);  break;
    case 'BEHEMOTH':  drawBossBehemoth(x,y,e);  break;
    case 'INFERNO':   drawBossInferno(x,y,e);   break;
    case 'LEVIATHAN': drawBossLeviathan(x,y,e); break;
    default:          drawBossOmega(x,y,e);      break;
  }
  // Weakzone pulsing border (hint to player)
  const wp=0.4+0.4*Math.sin(e.timer*0.22);
  ctx.strokeStyle=`rgba(255,0,255,${0.5+0.35*wp})`;
  ctx.shadowColor='#f0f'; ctx.shadowBlur=5*wp;
  ctx.lineWidth=1.5;
  ctx.strokeRect(x+def.weakDx,y+def.weakDy,def.weakDw,def.weakDh);
  ctx.shadowBlur=0;
  // HP bar
  ctx.fillStyle='#111';
  ctx.fillRect(x,y-10,e.w,4);
  ctx.fillStyle=e.hp>e.maxHp*0.6?'#0f0':e.hp>e.maxHp*0.3?'#f80':'#f00';
  ctx.fillRect(x,y-10,e.w*(e.hp/e.maxHp),4);
  // Boss name label
  ctx.font='4px "Press Start 2P",monospace';
  ctx.fillStyle='#ccc'; ctx.textAlign='center';
  ctx.fillText(def.id,x+e.w/2,y-13);
  ctx.restore();
}

function drawHUD(){
  // Top bar
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,CW,16);

  ctx.font='7px "Press Start 2P",monospace';
  ctx.textAlign='left';
  ctx.fillStyle='#0cf';
  ctx.fillText('SCORE',4,11);
  ctx.fillStyle='#fff';
  ctx.fillText(String(score).padStart(7,'0'),52,11);

  ctx.fillStyle='#0cf';
  ctx.textAlign='center';
  ctx.fillText('HI',CW/2-20,11);
  ctx.fillStyle='#ff0';
  ctx.fillText(String(hiScore).padStart(7,'0'),CW/2+20,11);

  ctx.fillStyle='#0cf';
  ctx.textAlign='right';
  ctx.fillText('STAGE '+stage,CW-4,11);

  // Power-up bar (bottom)
  const BH=20, BY=CH-BH;
  ctx.fillStyle='rgba(0,0,20,0.85)';
  ctx.fillRect(0,BY,CW,BH);
  ctx.strokeStyle='#0cf4';
  ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(0,BY); ctx.lineTo(CW,BY); ctx.stroke();

  const slotW=Math.floor(CW/WEAPONS.length);
  // Per-weapon accent colours (index matches WEAPONS array)
  const W_COL=['#445566','#88ff88','#ffaa44','#44aaff','#ff44ff','#ffcc00','#44ddff'];
  WEAPONS.forEach((w,i)=>{
    const sx=i*slotW, sy=BY+1;
    const active=weaponCursor===i;
    const lv=weaponLevels[i];
    const maxed=lv>=w.maxLv&&w.maxLv>0;
    const col=W_COL[i]||'#556';
    if(active){
      ctx.fillStyle=maxed?col+'44':col+'33';
      ctx.fillRect(sx+1,sy,slotW-2,BH-2);
    }
    ctx.font='4px "Press Start 2P",monospace';
    ctx.textAlign='center';
    ctx.fillStyle=lv>0?col:active?col+'aa':'#334';
    ctx.fillText(w.label,sx+slotW/2,BY+8);
    // Level squares
    for(let d=0;d<w.maxLv;d++){
      ctx.fillStyle=d<lv?col:'#1a1a2a';
      ctx.fillRect(sx+slotW/2-(w.maxLv-1)*4+d*8-2, BY+12, 4, 4);
    }
    if(active&&!maxed){
      ctx.strokeStyle=col; ctx.lineWidth=1;
      ctx.strokeRect(sx+1,sy,slotW-2,BH-3);
    } else if(maxed){
      ctx.strokeStyle=col+'88'; ctx.lineWidth=1;
      ctx.strokeRect(sx+1,sy,slotW-2,BH-3);
    }
  });

  // Lives
  ctx.fillStyle='#0cf';
  ctx.font='6px "Press Start 2P",monospace';
  ctx.textAlign='left';
  ctx.fillText('× '+lives, 8, BY-6);
  // Mini ship icons
  for(let i=0;i<Math.min(lives-1,5);i++){
    drawMiniShip(32+i*16,BY-12);
  }
  // Capsule counter (right side above HUD)
  ctx.textAlign='right';
  ctx.fillStyle='#ffcc00';
  ctx.fillText('● '+capsuleStored, CW-4, BY-6);
}

(function titleLoop(){
  if(gameRunning)return;
  titleFrame++;
  ctx.fillStyle='#000810'; ctx.fillRect(0,0,CW,CH);

  // ── Deep nebula (max 4 radial fills)
  ctx.save();
  [{x:70, y:95, r:85, c:'rgba(0,18,70,0.6)'},
   {x:240,y:155,r:95, c:'rgba(28,0,55,0.55)'},
   {x:145,y:210,r:75, c:'rgba(0,38,28,0.5)'},
   {x:38, y:175,r:60, c:'rgba(0,8,45,0.45)'},
  ].forEach(n=>{
    const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,n.c); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);
  });
  ctx.restore();

  // ── Stars with twinkle
  stars.forEach(s=>{
    s.x-=s.spd*0.3; if(s.x<0)s.x=CW;
    const b=Math.floor(s.bright*(0.65+0.35*Math.abs(Math.sin(titleFrame*0.04+s.y*0.1))));
    ctx.fillStyle=`rgb(${b},${b},${Math.min(255,b+25)})`;
    ctx.fillRect(s.x,s.y,s.r,s.r);
  });

  // ── Shooting stars
  if(Math.random()<0.007) shootingStars.push({x:CW,y:5+Math.random()*55,vx:-5.5-Math.random()*4,vy:1.5+Math.random(),life:38});
  for(let i=shootingStars.length-1;i>=0;i--){
    const s=shootingStars[i];
    s.x+=s.vx; s.y+=s.vy; s.life--;
    if(s.life<=0){shootingStars.splice(i,1);continue;}
    ctx.save(); ctx.globalAlpha=s.life/38;
    ctx.strokeStyle='#cce8ff'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(s.x-s.vx*6,s.y-s.vy*6); ctx.stroke();
    ctx.restore();
  }

  // ── Large ringed planet (top-right)
  {
    ctx.save();
    const pr=52, pcx=CW-pr+18, pcy=52;
    // Planet body
    const pg=ctx.createRadialGradient(pcx-16,pcy-16,2,pcx,pcy,pr);
    pg.addColorStop(0,'#3a6ecc'); pg.addColorStop(0.55,'#1035aa'); pg.addColorStop(1,'#050820');
    ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(pcx,pcy,pr,0,Math.PI*2); ctx.fill();
    // Surface bands
    ctx.save(); ctx.beginPath(); ctx.arc(pcx,pcy,pr,0,Math.PI*2); ctx.clip();
    ctx.globalAlpha=0.1;
    for(const dy of[-16,-6,4,14,24]){
      ctx.fillStyle='#99bbff'; ctx.fillRect(pcx-pr,pcy+dy,pr*2,6);
    }
    ctx.restore();
    // Atmosphere rim
    const rim=ctx.createRadialGradient(pcx,pcy,pr-5,pcx,pcy,pr+5);
    rim.addColorStop(0,'rgba(80,130,255,0)'); rim.addColorStop(1,'rgba(80,170,255,0.3)');
    ctx.fillStyle=rim; ctx.beginPath(); ctx.arc(pcx,pcy,pr+5,0,Math.PI*2); ctx.fill();
    // Ring (behind half, then front half)
    ctx.save(); ctx.globalAlpha=0.28;
    ctx.strokeStyle='#88aaee'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.ellipse(pcx,pcy+9,pr+26,11,-0.08,0,Math.PI*2); ctx.stroke();
    ctx.restore();
    ctx.restore();
  }

  // ── Small cratered moon (bottom-left)
  {
    ctx.save();
    const mg=ctx.createRadialGradient(45,196,0,46,198,17);
    mg.addColorStop(0,'#5a6a7a'); mg.addColorStop(1,'#1a2030');
    ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(47,198,17,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.arc(43,194,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(53,203,3.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(40,204,2.5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ── Distant star cluster
  {
    ctx.save(); ctx.globalAlpha=0.4;
    for(let i=0;i<12;i++){
      const sx=140+Math.cos(i*0.9)*30, sy=40+Math.sin(i*1.1)*18;
      const bri=150+Math.floor(Math.sin(titleFrame*0.06+i)*40);
      ctx.fillStyle=`rgb(${bri},${bri},${Math.min(255,bri+40)})`;
      ctx.fillRect(sx,sy,i%3===0?2:1,i%3===0?2:1);
    }
    ctx.restore();
  }

  // ── Enemy formation (flies in from right)
  titleEnemies.forEach(e=>{
    e.x-=e.spd*(0.75+0.25*Math.sin(titleFrame*0.012));
    if(e.x<-30){e.x=CW+10+Math.random()*50; e.y=PLAY_TOP+14+Math.random()*(PLAY_BOT-PLAY_TOP-36);}
    ctx.save(); ctx.globalAlpha=0.78;
    // engine trail
    ctx.fillStyle='rgba(255,110,20,0.4)';
    ctx.fillRect(e.x-(6+Math.floor(Math.random()*7)),e.y+(e.type==='dart'?5:e.type==='fighter'?6:8),7,3);
    drawTitleEnemy(e);
    ctx.restore();
  });

  // ── Player ship (hero, hovering left-center)
  {
    const hx=28, hy=Math.round(CH/2-6+Math.sin(titleFrame*0.05)*4);
    // Exhaust glow
    ctx.save();
    const exLen=8+Math.floor(Math.random()*8);
    ctx.fillStyle='rgba(255,140,30,0.5)'; ctx.fillRect(hx-exLen,hy+4,exLen,4);
    ctx.fillStyle='rgba(255,220,80,0.65)'; ctx.fillRect(hx-Math.floor(exLen*0.5),hy+5,Math.floor(exLen*0.5),2);
    ctx.restore();
    // Laser beam
    ctx.save(); ctx.globalAlpha=0.35+0.2*Math.sin(titleFrame*0.12);
    const lg=ctx.createLinearGradient(hx+24,0,CW-30,0);
    lg.addColorStop(0,'#0ff'); lg.addColorStop(1,'rgba(0,255,255,0)');
    ctx.strokeStyle=lg; ctx.lineWidth=2;
    ctx.shadowColor='#0ff'; ctx.shadowBlur=7;
    ctx.beginPath(); ctx.moveTo(hx+24,hy+6); ctx.lineTo(CW-30,hy+6); ctx.stroke();
    ctx.restore();
    // Ship
    ctx.fillStyle='#88ccff';
    ctx.fillRect(hx+6,hy+4,14,4); ctx.fillRect(hx+4,hy+3,18,6);
    ctx.fillStyle='#fff';    ctx.fillRect(hx+20,hy+5,4,2);
    ctx.fillStyle='#0cf';    ctx.fillRect(hx+12,hy+4,6,4);
    ctx.fillStyle='#6699cc'; ctx.fillRect(hx+4,hy+1,8,3); ctx.fillRect(hx+4,hy+8,8,3);
    ctx.fillStyle='#ff8800'; ctx.shadowColor='#ff8800'; ctx.shadowBlur=5;
    ctx.fillRect(hx,hy+4,3,4); ctx.shadowBlur=0;
    // Option drone
    const ox=hx-18, oy=hy+6+Math.round(Math.sin(titleFrame*0.08+1)*5);
    ctx.fillStyle='#ff8c00'; ctx.shadowColor='#ffa500'; ctx.shadowBlur=5;
    ctx.beginPath(); ctx.arc(ox,oy,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.arc(ox,oy,3,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }

  if(!gameRunning)requestAnimationFrame(titleLoop);
})();

showOverlay('');
</script>
</body>
</html>
